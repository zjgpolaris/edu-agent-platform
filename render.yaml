# Render Blueprint — AutoTutor 后端（Docker）
# 用法：Render Dashboard → New → Blueprint → 指向本仓库，自动读取此文件。
# 部署后把后端公网 URL 填到 Vercel 的 NEXT_PUBLIC_API_BASE_URL。
#
# 注：会话/限流当前用进程内存兜底（TTL 1h），demo 无需独立 Redis；
#     如需跨实例持久化，再单独接 Render Key Value 并改造 session_store。
services:
  - type: web
    name: edu-agent-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/debug/llm/health
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: PYTHONUNBUFFERED
        value: "1"
      # 线上前端域名（Vercel 自定义域名时回填；*.vercel.app 已由后端正则放行）
      - key: FRONTEND_ORIGIN
        sync: false
      # Supabase / Postgres 连接串
      - key: DATABASE_URL
        sync: false
      # LLM 凭证 —— 在 Render 面板填写，勿入库。线上聊天走百炼公网。
      - key: LLM_PROVIDER
        value: bailian
      - key: BAILIAN_API_KEY
        sync: false
      - key: BAILIAN_BASE_URL
        sync: false
      # RAG 向量检索：embedding 走 OpenAI-compatible 托管 API（如 Jina），
      # 向量库走 DATABASE_URL 指向的 Postgres + pgvector。离线用
      # scripts/build_pgvector_index.py 建索引后即生效；未建索引/未配 key 时检索返回空。
      - key: EMBED_API_BASE
        value: https://api.jina.ai/v1
      - key: EMBED_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: jina-embeddings-v3
      - key: EMBED_TASK
        value: text-matching
      - key: EMBED_DIM
        value: "1024"
      # 模型名留空走代码内置默认（bailian: deepseek-v4-flash / qwen3.7-plus / qwen3.6-35b-a3b），
      # 与本地一致，无需在面板填写。如要覆盖再设 LLM_MODEL_FAST/QUALITY/FALLBACK。
      # 说明：云端无本地 BGE 模型，故不设 EMBED_MODEL_PATH，
      # RAG 取材会自动降级为模型自有知识出题（auto_tutor 的 degraded 路径），demo 仍可跑通。
