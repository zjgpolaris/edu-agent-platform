grade: 八年级上
book: 中国历史八年级上册（人教版）
units:
- title: 第一单元 中国开始沦为半殖民地半封建社会
  lessons:
  - title: 第1课 鸦片战争
    items:
    - text: 1839年6月，林则徐下令将收缴的鸦片在虎门海滩当众销毁，虎门销烟是中国人民禁烟斗争的伟大胜利，显示了中华民族反抗外来侵略的坚强意志。
      topic: 虎门销烟
      type: textbook
      page: 2
      tags: [虎门销烟, 林则徐, 禁烟运动, 鸦片, 反侵略]
      entities: [林则徐]
      event: 虎门销烟
      period: 晚清
      keywords: [禁烟斗争, 伟大胜利, 反抗外来侵略, 坚强意志]
    - text: 1840年6月，英国舰队开到广东海面，进行挑衅，鸦片战争爆发；1842年8月，清政府被迫与英国签订中国近代史上第一个丧权辱国的不平等条约——中英《南京条约》。
      topic: 鸦片战争爆发
      type: textbook
      page: 4
    - text: 《南京条约》的主要内容有：开放广州、福州、厦门、宁波、上海五处为通商口岸；割香港岛给英国；赔款2100万银元；英商进出口货物应纳税款，必须经过双方协议。
      topic: 南京条约内容
      type: textbook
      page: 6
    - text: 鸦片战争改变了中国历史发展的进程，中国丧失了完整独立的主权，中国社会的自然经济遭到破坏，开始从封建社会变为半殖民地半封建社会，鸦片战争成为中国近代史的开端。
      topic: 鸦片战争影响
      type: textbook
      page: 7
    - text: 臣窃见近来银价递增，每银一两，易制钱一千六百有零，非耗银于内地，实漏银于外夷也。——黄爵滋《请严塞漏卮以培国本折》
      topic: 鸦片走私危害史料
      type: primary
      page: 3
    - text: 半殖民地半封建社会是指形式上独立自主，实际上在政治、经济、军事等方面受帝国主义列强控制的国家形态。
      topic: 半殖民地半封建社会
      type: concept
      page: 7
  - title: 第2课 第二次鸦片战争
    items:
    - text: 1856年10月，英军炮轰广州，挑起战争；1857年，英国和法国联合出兵，攻陷广州；1858年，清政府被迫与俄、美、英、法四国分别签订《天津条约》。
      topic: 第二次鸦片战争爆发
      type: textbook
      page: 8
    - text: 1860年，英法联军占领安定门，控制北京城，并扬言要直捣皇宫；10月，英法联军对北京西北郊著名的皇家园林——圆明园进行了大肆抢劫，之后又放火烧毁。
      topic: 火烧圆明园
      type: textbook
      page: 10
    - text: 第二次鸦片战争前后，沙俄强迫清政府签订一系列不平等条约，共割占了中国东北和西北150多万平方千米领土，是近代侵占中国领土最多的国家。
      topic: 沙俄侵占北方领土
      type: textbook
      page: 11
    - text: 第二次鸦片战争使中国丧失更多主权，英国、法国、美国等西方侵略势力由东南沿海一带深入到长江中下游地区，沙俄占领中国北方大片领土，中国的半殖民地化程度进一步加深。
      topic: 第二次鸦片战争影响
      type: textbook
      page: 12
    - text: 在世界的某个角落，有一个世界奇迹。这个奇迹叫圆明园。……有一天，两个来自欧洲的强盗闯进了圆明园。一个强盗洗劫财物，另一个强盗放火。——[法]维克多·雨果《就英法联军远征中国致巴特勒上尉的信》
      topic: 雨果评火烧圆明园
      type: primary
      page: 10
  - title: 第3课 太平天国运动
    items:
    - text: 1851年1月11日，洪秀全在广西桂平县金田村发动武装起义，建号太平天国，起义军称太平军，太平天国运动爆发。
      topic: 金田起义
      type: textbook
      page: 13
    - text: 1853年3月，太平军攻占南京，将南京改名为天京，作为都城，太平天国定都天京后，颁布了《天朝田亩制度》，规定不分男女，按人口和年龄平均分配土地。
      topic: 定都天京与土地制度
      type: textbook
      page: 15
    - text: 1856年秋，杨秀清逼洪秀全封他为万岁，意图篡位，结果杨秀清被杀，韦昌辉被处死，石达开率部出走，太平军损失惨重，人心士气受到严重影响，天京事变使太平天国由盛转衰。
      topic: 天京事变
      type: textbook
      page: 16
    - text: 1864年夏，洪秀全病逝，湘军轰塌城墙，冲入城内，守城将士与敌人展开巷战，大部分战死，其余突围，天京的陷落，标志着轰轰烈烈的太平天国农民运动的失败。
      topic: 太平天国失败
      type: textbook
      page: 17
    - text: 凡分田照人口，不论男妇。算其家口多寡，人多则分多，人寡则分寡，杂以九等……凡天下田，天下人同耕，此处不足则迁彼处，彼处不足则迁此处。——《天朝田亩制度》
      topic: 天朝田亩制度史料
      type: primary
      page: 15
    - text: 《天朝田亩制度》是太平天国的纲领性文件，反映了千百年来农民要求得到土地的强烈愿望，对于发动和鼓舞广大农民起来参加反封建斗争起了积极作用，但因带有很大的空想色彩而在实践中难以施行。
      topic: 天朝田亩制度评价
      type: concept
      page: 15
- title: 第二单元 近代化的早期探索与民族危机的加剧
  lessons:
  - title: 第4课 洋务运动
    items:
    - text: 第二次鸦片战争后，清朝统治集团内部一些比较开明的官员，主张利用西方先进技术，强兵富国，维护清王朝的统治，这些官员被称为洋务派，在中央以恭亲王奕䜣为代表，在地方以曾国藩、李鸿章、左宗棠、张之洞等人为代表。
      topic: 洋务派兴起
      type: textbook
      page: 20
    - text: 从19世纪60年代到90年代中期，洋务派掀起了一场旨在自强求富的洋务运动，先后创办了安庆内军械所、江南机器制造总局、福州船政局等一批近代军事工业，以及轮船招商局、开平煤矿、汉阳铁厂、湖北织布局等民用企业。
      topic: 洋务运动内容
      type: textbook
      page: 21
    - text: 洋务派还兴办新式学校，培养翻译和军事人才；设立翻译馆，翻译外国科技书籍；派遣留学生出国深造；从19世纪60年代起，洋务派开始组建新式洋枪队，淘汰传统兵器，采用西式兵操练兵。
      topic: 洋务运动教育军事
      type: textbook
      page: 22
    - text: 洋务运动是中国历史上第一次近代化运动，经过30多年的建设，中国近代化的军事工业、民用工业、交通运输业等逐渐发展起来，在客观上促进了中国民族资本主义的产生，对外国资本的入侵起到了一定的抵制作用。
      topic: 洋务运动评价
      type: textbook
      page: 22
    - text: 我办了一辈子的事，练兵也，海军也，都是纸糊的老虎，何尝能实在放手办理？不过勉强涂饰，虚有其表……——吴永《庚子西狩丛谈》
      topic: 李鸿章评洋务运动
      type: primary
      page: 23
    - text: 洋务运动的根本目的是维护和巩固清政府的统治，再加上其内部的腐败和外国势力的挤压，它没有使中国走上富强的道路。
      topic: 洋务运动局限性
      type: concept
      page: 23
  - title: 第5课 甲午中日战争与列强瓜分中国狂潮
    items:
    - text: 1894年，朝鲜发生东学党起义，应朝鲜国王请求，清政府派兵帮助镇压，日本也乘机出兵朝鲜，蓄意挑起战争，7月，日军进攻驻守朝鲜的中国军队，并在牙山口外丰岛海面袭击清军运兵船，清政府被迫对日宣战，1894年是农历甲午年，这场战争被称为甲午中日战争。
      topic: 甲午战争爆发
      type: textbook
      page: 24
    - text: 1894年9月，日军分多路围攻平壤，中国守军奋起反击，清军将领左宝贵中炮牺牲；北洋舰队与日本联合舰队在黄海海面展开激战，致远舰管带邓世昌下令开足马力冲向日舰吉野号，不幸被敌人炮弹击中，200余名将士壮烈殉国。
      topic: 黄海海战
      type: textbook
      page: 25
    - text: 1895年初，日本陆海军进攻山东威海卫，北洋舰队陷入绝境，日本联合舰队司令写信给北洋水师提督丁汝昌，劝其率舰队投降，遭到严词拒绝，在援兵无望的情况下，丁汝昌自杀殉国，北洋舰队全军覆没。
      topic: 威海卫战役
      type: textbook
      page: 26
    - text: 1895年春，清政府派李鸿章为议和全权大臣，前往日本马关议和，双方签订中日《马关条约》，规定清政府割辽东半岛、台湾全岛及所有附属各岛屿、澎湖列岛给日本，赔偿日本兵费白银2亿两，开放沙市、重庆、苏州、杭州为商埠，允许日本在通商口岸开设工厂等。
      topic: 马关条约
      type: textbook
      page: 26
    - text: 日本是披着文明的皮而带有野蛮筋骨的怪兽。日本今已摘下文明的假面具，暴露了野蛮的真面目。——美国纽约《世界报》
      topic: 旅顺屠城史料
      type: primary
      page: 26
    - text: 《马关条约》使外国侵略势力进一步深入中国腹地，大大加深了中国的半殖民地化程度，此后列强在中国掀起了抢夺利权、强租海港、划分势力范围的瓜分中国狂潮。
      topic: 马关条约影响
      type: concept
      page: 27
  - title: 第6课 戊戌变法
    items:
    - text: 1895年春，《马关条约》签订的消息传到北京后，群情激愤，正在京师参加会试的康有为、梁启超等，联合各省1300多名参加会试的举人，上书光绪帝，请求拒和、迁都、变法，这就是著名的公车上书，拉开了变法维新运动的序幕。
      topic: 公车上书
      type: textbook
      page: 28
    - text: 公车上书失败后，维新人士在各地组织学会，创办报刊，宣传变法，推动了维新变法思想的广泛传播，其中影响最大的报刊是上海的《时务报》和天津的《国闻报》。
      topic: 维新思想传播
      type: textbook
      page: 29
    - text: 1898年6月11日，清政府颁布明定国是诏书，宣布实行变法，随后，光绪帝发布了一系列变法诏令，主要内容有：裁撤冗官冗员，允许官民上书言事；鼓励私人兴办工矿企业，发展农、工、商业；改革财政，编制国家预算；废除八股，改试策论，开办新式学堂；裁减绿营，训练新式军队等。
      topic: 百日维新内容
      type: textbook
      page: 30
    - text: 1898年9月21日，慈禧太后等发动政变，囚禁光绪帝，搜捕维新人士，废除变法诏令，康有为、梁启超逃往国外，谭嗣同、刘光第、林旭、杨锐、杨深秀、康广仁六人被捕遇害，史称戊戌六君子，这次变法历时103天，因此又被称为百日维新。
      topic: 戊戌政变
      type: textbook
      page: 31
    - text: 法者天下之公器也，变者天下之公理也。变亦变，不变亦变。——梁启超《变法通议》
      topic: 梁启超变法思想
      type: primary
      page: 29
    - text: 戊戌变法虽然失败了，但在思想文化方面产生了广泛而持久的影响，起到了思想启蒙的作用，为资产阶级民主思想的传播奠定了基础。
      topic: 戊戌变法影响
      type: concept
      page: 31
  - title: 第7课 八国联军侵华与《辛丑条约》签订
    items:
    - text: 义和团由山东、直隶一带的义和拳、民间秘密结社和练拳习武的组织发展而来，19世纪末，随着帝国主义侵略的加剧和外国传教士活动的猖獗，这些组织逐渐由反清的秘密结社或单纯的习武团体，转变为具有广泛群众性的反帝斗争组织，提出扶清灭洋口号。
      topic: 义和团运动
      type: textbook
      page: 32
    - text: 1900年5月底，英、俄等国调遣军队300余人，进驻北京使馆；6月，为镇压义和团运动，英、美、俄、日、法、德、意、奥八国组织联军2000多人，在英国海军司令西摩尔的率领下，从天津向北京进犯。
      topic: 八国联军侵华
      type: textbook
      page: 33
    - text: 1900年8月14日，联军攻陷北京，慈禧太后携光绪帝狼狈西逃，在逃跑途中，慈禧下令剿杀义和团，并无耻地请求八国联军助剿，义和团在中外反动势力的镇压下失败。
      topic: 北京陷落
      type: textbook
      page: 34
    - text: 1901年9月，清政府被迫同英、美、俄、日、法、德、意、奥、比、荷、西11国，签订了丧权辱国的《辛丑条约》，主要内容有：清政府赔款白银4.5亿两，分39年还清，本息共计9.8亿两；清政府保证严禁人民参加各种形式的反帝活动；清政府拆毁大沽炮台，允许外国军队驻扎在从北京到山海关的铁路沿线要地；划定北京东交民巷为使馆界，允许各国派兵驻守，不准中国人居住；改总理衙门为外务部，班列六部之前。
      topic: 辛丑条约
      type: textbook
      page: 35
    - text: 神助拳，义和团，只因鬼子闹中原。……天无雨，地焦旱，全是教堂止住天。……兵法艺，都学全，要平鬼子不费难。拆铁道，拔线杆，紧急毁坏火轮船。大法国，心胆寒，英美德俄尽消然。洋鬼子，尽除完，大清一统靖江山。——《只因鬼子闹中原》揭帖
      topic: 义和团揭帖史料
      type: primary
      page: 32
    - text: 《辛丑条约》是中国近代史上赔款数目最庞大、主权丧失最严重的不平等条约，从此，清政府完全成为帝国主义列强统治中国的工具，中国完全陷入半殖民地半封建社会的深渊。
      topic: 辛丑条约影响
      type: concept
      page: 36
- title: 第三单元 资产阶级民主革命与中华民国的建立
  lessons:
  - title: 第8课 革命先行者孙中山
    items:
    - text: 孙中山名文，号逸仙，旅居日本从事革命活动时，他曾化名中山樵，以后遂以中山名世，少年时代特别爱听太平天国的故事，称赞洪秀全是反清英雄第一人。
      topic: 孙中山早年
      type: textbook
      page: 38
    - text: 1894年11月，孙中山在檀香山联合华侨，成立兴中会，提出振兴中华的宗旨，号召驱除鞑虏，恢复中国，创立合众政府；1895年，孙中山回到香港，联络陆皓东等人成立香港兴中会总会，同时开展筹款、联络会党和军队等秘密工作，准备在广州发动武装起义，建立革命据点。
      topic: 兴中会成立
      type: textbook
      page: 39
    - text: 《辛丑条约》签订后，清政府沦为帝国主义统治中国的工具，国内革命情绪日趋高涨，资产阶级革命思想得到迅速传播，出现了章炳麟的《驳康有为论革命书》、邹容的《革命军》、陈天华的《猛回头》和《警世钟》等宣传民族民主革命的著作。
      topic: 革命思想传播
      type: textbook
      page: 40
    - text: 1905年8月，孙中山联合兴中会、华兴会、光复会等革命团体的成员，在日本东京成立了中国同盟会，确定了驱除鞑虏，恢复中华，创立民国，平均地权的政治纲领，选举孙中山为同盟会总理，建立领导机构，中国同盟会是第一个全国规模的、统一的资产阶级革命政党。
      topic: 同盟会成立
      type: textbook
      page: 41
    - text: 孙中山在《民报》发刊词中，将同盟会的政治纲领阐发为民族、民权、民生三大主义，合称三民主义，三民主义成为孙中山领导资产阶级革命的指导思想。
      topic: 三民主义
      type: textbook
      page: 41
    - text: 三民主义是孙中山提出的资产阶级民主革命纲领，民族主义即驱除鞑虏，恢复中华，民权主义即创立民国，民生主义即平均地权，三者相互联系，成为辛亥革命的理论指导。
      topic: 三民主义内涵
      type: concept
      page: 41
  - title: 第9课 辛亥革命
    items:
    - text: 1911年4月，黄兴提前发动广州起义，终因众寡悬殊，起义失败，很多革命党人壮烈牺牲，后来，将收殓到的七十二具烈士遗骸，合葬于广州黄花岗，称作黄花岗七十二烈士，历史上也将这次起义称为黄花岗起义。
      topic: 黄花岗起义
      type: textbook
      page: 42
    - text: 1911年10月10日晚，武昌城内新军工程营的革命党人首先起义，他们夺取军械库，打开城门迎接驻守城外的炮兵入城，然后步炮联合，进攻总督衙门，一夜之间，武昌全城被起义军占领，随后，汉阳、汉口的新军起义响应，革命在武汉三镇取得胜利，10月11日，起义军成立湖北军政府，推举新军将领黎元洪为都督。
      topic: 武昌起义
      type: textbook
      page: 43
    - text: 武昌起义胜利后，各省纷纷响应，到11月下旬，全国已有一半以上的省份宣布独立，支持革命，1911年是农历辛亥年，历史上称这次革命为辛亥革命。
      topic: 辛亥革命发展
      type: textbook
      page: 44
    - text: 辛亥革命推翻了清王朝的反动统治，宣告了中国两千多年君主专制制度的终结，它开创了完全意义上的近代民族民主革命，极大推动了中华民族的思想解放，打开了中国进步潮流的闸门。
      topic: 辛亥革命意义
      type: textbook
      page: 45
    - text: 是役也，碧血横飞，浩气四塞，草木为之含悲，风云因而变色，全国久蛰之人心，乃大兴奋，怨愤所积，如怒涛排壑，不可遏抑，不半载而武昌之大革命以成。——孙中山《黄花岗烈士事略序》
      topic: 黄花岗起义史料
      type: primary
      page: 42
  - title: 第10课 中华民国的创建
    items:
    - text: 1912年1月1日，孙中山在南京宣誓就职，宣告中华民国临时政府成立，以1912年为民国元年，改用公历，随后，选举黎元洪为副总统，成立临时参议院，各省的会议代表任参议员，南京临时政府的成立是孙中山领导的资产阶级民主革命的重要成果。
      topic: 中华民国成立
      type: textbook
      page: 46
    - text: 1912年2月12日，在袁世凯软硬兼施的逼迫下，宣统帝下诏退位，清朝260多年的统治结束，2月13日，孙中山向临时参议院提出辞职，并推荐袁世凯继任临时大总统，2月15日，临时参议院选举袁世凯为临时大总统，3月，袁世凯在北京就任中华民国临时大总统，4月，孙中山正式解除临时大总统职务，临时政府迁往北京，辛亥革命的胜利果实被袁世凯窃取。
      topic: 袁世凯窃取果实
      type: textbook
      page: 47
    - text: 1912年3月11日，孙中山以临时大总统名义颁布了由参议院制定的《中华民国临时约法》，约法规定：中华民国的主权属于全体国民；国民不分种族、阶级、宗教信仰，一律平等；国民有人身、居住、言论、出版、集会、结社、宗教信仰及请愿、考试、选举、参政等自由和权利；参议院行使立法权，国务员辅佐临时大总统行使行政权并负其责任，司法独立等。
      topic: 临时约法
      type: textbook
      page: 48
    - text: 《中华民国临时约法》是中国历史上第一部具有资产阶级共和国宪法性质的重要文件，它肯定了资产阶级民主共和制度和民主自由原则，是辛亥革命的重要成果。
      topic: 临时约法意义
      type: textbook
      page: 49
    - text: 中华民国之主权，属于国民全体。……中华民国人民，一律平等，无种族、阶级、宗教之区别。——《中华民国临时约法》
      topic: 临时约法史料
      type: primary
      page: 48
    - text: 袁世凯就任临时大总统后，为了建立独裁统治，公然背弃誓言，一再破坏责任内阁制，1913年春，袁世凯指使心腹收买刺客，刺杀了准备北上组阁的宋教仁，这就是民国初年震惊全国的宋案。
      topic: 宋教仁案
      type: concept
      page: 50
  - title: 第11课 北洋政府的统治与军阀割据
    items:
    - text: 宋案发生后，袁世凯遭到国内舆论的谴责，他决定以武力镇压国民党，下令罢免由国民党人担任的江西、广东、安徽三省都督，并派兵南下，孙中山和黄兴等号召南方各省起来反袁，发动二次革命，但国民党力量涣散，二次革命很快被袁世凯镇压下去。
      topic: 二次革命
      type: textbook
      page: 50
    - text: 镇压二次革命后，袁世凯强迫国会选举他为正式大总统，随即又下令解散国民党，1914年初，袁世凯解散国会，不久，他又废除《中华民国临时约法》，颁布《中华民国约法》，改责任内阁制为总统制，接着，修改总统选举法，规定总统可无限期连任，可指定继承人，至此，袁世凯想当皇帝的野心昭然若揭。
      topic: 袁世凯独裁
      type: textbook
      page: 51
    - text: 1915年末，袁世凯下令以1916年为中华帝国洪宪元年，准备在元旦举行登基大典，袁世凯的复辟活动，令举国哗然，孙中山发表《讨袁檄文》，号召爱国豪杰共同奋起，维护共和制度，1915年底，蔡锷、李烈钧、唐继尧在云南宣告独立，组织护国军北上讨袁，护国战争爆发。
      topic: 护国战争
      type: textbook
      page: 52
    - text: 袁世凯死后，北洋军阀分裂，以冯国璋和曹锟为首的直系军阀，控制着江苏、江西、湖北等省；以段祺瑞为首的皖系军阀掌握着北京政府，并控制着安徽、浙江、山东、福建等省；以张作霖为首的奉系军阀盘踞东北，其他各省也被大大小小的军阀所控制，他们为了争夺地盘和巩固政权，不惜出卖国家利益，依附帝国主义，大小军阀连年混战，中国陷入了军阀割据纷争的动乱之中。
      topic: 军阀割据
      type: textbook
      page: 53
    - text: 万户涕泪，一人冠冕，其心尚有共和二字存耶？既忘共和，即称民贼。……誓死戮此民贼，以拯吾民。——孙中山《讨袁檄文》
      topic: 讨袁檄文史料
      type: primary
      page: 52
- title: 第四单元 新民主主义革命的开始
  lessons:
  - title: 第12课 新文化运动
    items:
    - text: 1915年，陈独秀在上海创办《青年杂志》，并在创刊号上发表《敬告青年》一文，正式吹响了新文化运动的号角，1917年初，陈独秀接受新任北京大学校长蔡元培的聘请，出任北京大学文科学长，《新青年》杂志社不久也迁往北京。
      topic: 新文化运动兴起
      type: textbook
      page: 56
    - text: 《新青年》的主要撰稿人有胡适、李大钊、鲁迅等，大多任教于北京大学，他们热情宣传西方的民主与科学思想，猛烈抨击封建的旧道德和旧文化，《新青年》和北京大学成为新文化运动最为重要的阵地。
      topic: 新青年与北大
      type: textbook
      page: 57
    - text: 新文化运动抨击旧道德和旧文化，针对北洋政府统治时期猖獗一时的尊孔复古逆流，《新青年》发表了大量文章，猛烈抨击以孔子为代表的儒家传统道德和文化，鲁迅的白话小说《狂人日记》，以新文学的形式深刻揭露了封建礼教的吃人本质，号召人民起来推翻黑漆漆的吃人社会。
      topic: 抨击旧道德
      type: textbook
      page: 57
    - text: 新文化运动提倡民主与科学，民主与科学是新文化运动所标举的两大口号，由陈独秀首先提出，他还将它们形象地称为德先生和赛先生；新文化运动也是一场文学革命，1917年，胡适在《新青年》发表《文学改良刍议》一文，主张以白话文作为新文学的语言，陈独秀紧接着发表《文学革命论》一文，主张推倒陈腐、雕琢、艰涩的旧文学，建设新鲜、平易、通俗的新文学。
      topic: 民主科学与文学革命
      type: textbook
      page: 58
    - text: 新文化运动动摇了封建道德礼教的统治地位，使中国人民接受了一次民主与科学的洗礼，为随后爆发的五四运动起了思想宣传和铺垫的作用，尽管新文化运动对于中国传统文化的看法带有一定的片面性，但它仍然是一次伟大的思想解放运动。
      topic: 新文化运动评价
      type: textbook
      page: 58
    - text: 西洋人因为拥护德、赛两先生，闹了多少事，流了多少血，德、赛两先生才渐渐从黑暗中把他们救出，引到光明世界。——陈独秀《本志罪案之答辩书》
      topic: 德先生赛先生史料
      type: primary
      page: 58
  - title: 第13课 五四运动
    items:
    - text: 1919年5月4日，北京3000多名学生汇集在天安门前，发表宣言，揭露帝国主义列强的侵略行径，并举行示威游行，学生们提出外争主权，内除国贼誓死力争，还我青岛废除二十一条拒绝在和约上签字等口号，要求严惩亲日派卖国贼曹汝霖、陆宗舆、章宗祥。
      topic: 五四运动爆发
      type: textbook
      page: 59
    - text: 北洋军阀政府出动军警镇压，逮捕了30多名爱国学生，第二天，北京学生举行总罢课，6月3日，北京学生再次走上街头，开展大规模的爱国宣传活动，遭到军警镇压，先后有800多名学生被捕，6月5日，上海工人罢工，商人罢市，罢市风潮随即席卷全国十几个商业中心城市，唐山、长辛店等地工人也举行罢工，声援学生的爱国斗争。
      topic: 五四运动扩大
      type: textbook
      page: 60
    - text: 五四运动是一次彻底地反对帝国主义和封建主义的爱国运动，在这次运动中，中国工人阶级开始登上政治舞台，展现了伟大的力量，一些初步接受了马克思主义的知识分子和青年学生，在运动中起了重要的作用，五四运动是中国新民主主义革命的开端。
      topic: 五四运动意义
      type: textbook
      page: 61
    - text: 务望全国工商各界，一律起来设法开国民大会，外争主权，内除国贼，中国存亡，就在此一举了！——《北京学界全体宣言》
      topic: 五四宣言史料
      type: primary
      page: 59
    - text: 新民主主义革命是指在帝国主义和无产阶级革命时代，殖民地半殖民地国家中的无产阶级领导的资产阶级民主革命，其性质是资产阶级民主革命，但领导阶级是无产阶级。
      topic: 新民主主义革命
      type: concept
      page: 61
  - title: 第14课 中国共产党诞生
    items:
    - text: 1917年，俄国十月社会主义革命的胜利，使中国先进知识分子看到了曙光，经过五四运动，宣传新思想、新文化的刊物如雨后春笋般大量涌现，越来越多的先进知识分子开始关注马克思主义，1919年，《新青年》出版马克思主义研究专号，刊载了李大钊的文章《我的马克思主义观》，对马克思主义作了较为系统的介绍。
      topic: 马克思主义传播
      type: textbook
      page: 62
    - text: 1920年夏，在共产国际的帮助下，陈独秀在上海建立了中国第一个共产党早期组织，接着，北京、长沙、武昌等地也先后建立了共产党早期组织，各地共产党早期组织的建立，是中国共产党成立的组织基础。
      topic: 共产党早期组织
      type: textbook
      page: 63
    - text: 1921年7月，中国共产党第一次全国代表大会在上海秘密召开，参加大会的有毛泽东、董必武、李达等13位代表，代表全国50多个党员，共产国际代表马林等出席了会议，大会通过了中国共产党历史上第一个党纲，党纲确定党的名称为中国共产党，奋斗目标是推翻资产阶级政权，建立无产阶级专政，实现共产主义。
      topic: 中共一大
      type: textbook
      page: 64
    - text: 大会确定党的中心工作是领导和组织工人运动，成立了党的中央领导机构中央局，陈独秀当选为中央局书记，这样，中国无产阶级的先锋队——中国共产党诞生了。
      topic: 中共一大内容
      type: textbook
      page: 65
    - text: 中国共产党的诞生，是中国历史上开天辟地的大事，自从有了中国共产党，中国革命的面貌就焕然一新了，中国共产党的诞生不是偶然的，是适应近代以来中国社会进步和革命发展的客观需要，是近代历史选择的必然结果。
      topic: 中共成立意义
      type: textbook
      page: 65
    - text: 试看将来的环球，必是赤旗的世界。——李大钊《布尔什维主义的胜利》
      topic: 李大钊宣传马克思主义
      type: primary
      page: 62
- title: 第五单元 从国共合作到国共对立
  lessons:
  - title: 第15课 国共合作与北伐战争
    items:
    - text: 1923年6月，中国共产党召开第三次全国代表大会，正式决定同孙中山领导的国民党合作，建立革命统一战线，共产党员以个人身份加入国民党，把国民党改组为工人、农民、小资产阶级和民族资产阶级的革命同盟。
      topic: 中共三大
      type: textbook
      page: 70
    - text: 1924年1月，在孙中山主持下，中国国民党第一次全国代表大会在广州召开，大会通过的宣言对三民主义作出了新的解释，把旧三民主义发展为新三民主义，在实际上确立了联俄、联共、扶助农工三大政策，中国国民党第一次全国代表大会的召开，标志着国共两党合作的正式建立。
      topic: 国民党一大
      type: textbook
      page: 70
    - text: 在苏联和中国共产党的帮助下，1924年5月，孙中山在广州黄埔创办中国国民党陆军军官学校，亦称黄埔军校，孙中山兼任军校总理，蒋介石任校长，周恩来不久后担任政治部主任，在短短几年时间里，黄埔军校招收学生一万多名，培养出大批军事和政治人才，为国民革命军的建立和随后的北伐战争作了准备。
      topic: 黄埔军校
      type: textbook
      page: 71
    - text: 1926年，广州国民政府决定北伐，以推翻吴佩孚、孙传芳、张作霖等北洋军阀的统治，统一全国，7月，国民革命军十万人誓师北伐，蒋介石任北伐军总司令，湖南、湖北是北伐战争初期的主要战场，北伐军出师不到半年，从珠江流域打到长江流域，震动全国。
      topic: 北伐战争
      type: textbook
      page: 72
    - text: 1927年4月，蒋介石在上海发动了震惊中外的四一二反革命政变，并在南京建立国民政府，7月，汪精卫在武汉召开分共会议，大肆屠杀共产党人和工农群众，轰轰烈烈的国民革命失败了。
      topic: 国民革命失败
      type: textbook
      page: 73
    - text: 新三民主义是孙中山在国民党一大上重新解释的三民主义，民族主义增加了反帝内容，民权主义强调民主权利为一般平民所共有，民生主义增加了节制资本和耕者有其田的内容，成为国共合作的政治基础。
      topic: 新三民主义
      type: concept
      page: 70
  - title: 第16课 毛泽东开辟井冈山道路
    items:
    - text: 1927年8月1日，周恩来、贺龙、叶挺、朱德、刘伯承等人领导革命军在南昌发动武装起义，占领南昌城，随后起义部队按计划撤出南昌，南下广东，准备在那里建立根据地，但在途中遭到敌人的封堵，损失严重，朱德、陈毅率领南昌起义的部分队伍，转战湘南，坚持斗争，南昌起义打响了武装反抗国民党反动统治的第一枪。
      topic: 南昌起义
      type: textbook
      page: 75
    - text: 1927年8月7日，中共中央在汉口召开紧急会议，即八七会议，通过了土地革命和武装反抗国民党反动统治的总方针，决定在秋收时节发动武装起义，在会上，毛泽东提出了政权是由枪杆子中取得的著名论断。
      topic: 八七会议
      type: textbook
      page: 76
    - text: 1927年9月，毛泽东在湘赣边界打出了工农革命军的旗号，举行秋收起义，起义开始时比较顺利，攻占了一些县城，但由于城里敌人力量强大，起义军受到严重挫折，为保存革命力量，毛泽东决定放弃攻打中心城市长沙的计划，改向敌人统治力量薄弱的山区进军。
      topic: 秋收起义
      type: textbook
      page: 76
    - text: 1927年10月，毛泽东率领起义部队到达井冈山地区，创建了第一个农村革命根据地，井冈山革命根据地的创建，是中国共产党探索农村包围城市、武装夺取政权这一正确道路的开始。
      topic: 井冈山根据地
      type: textbook
      page: 77
    - text: 1928年4月，朱德、陈毅率领南昌起义的部分军队和湘南的工农武装，与毛泽东率领的工农革命军在井冈山会师，两军会师后，合编为中国工农革命军第四军，不久改称为中国工农红军第四军，朱德任军长，毛泽东任党代表。
      topic: 井冈山会师
      type: textbook
      page: 77
    - text: 工农武装割据是指在中国共产党领导下，以武装斗争为主要形式，以土地革命为中心内容，以农村革命根据地为战略基地的三者紧密结合的革命道路。
      topic: 工农武装割据
      type: concept
      page: 77
  - title: 第17课 中国工农红军长征
    items:
    - text: 1933年秋，蒋介石调集50万军队，对中央革命根据地发动第五次围剿，由于中共临时中央负责人博古和军事顾问李德等人在军事指挥上左的错误，红军英勇奋战一年，付出了重大牺牲，也没能打破敌人的围剿，反而陷入极其危险的境地，中共中央和中央红军被迫放弃中央革命根据地，进行战略转移。
      topic: 第五次反围剿
      type: textbook
      page: 81
    - text: 1934年10月，中共中央率领中央红军八万多人突围西进，开始长征，敌人调集兵力对红军实行围追堵截，红军拼死冲杀，冲破了敌人的四道封锁线，渡过湘江后，红军损失过半，只剩三万多人，博古等人执意要去湘西与红二、红六军团会合，但敌人已在去湘西的路上布下了重兵，在这危急时刻，毛泽东果断建议红军改向敌人力量薄弱的贵州前进。
      topic: 长征开始
      type: textbook
      page: 81
    - text: 1935年1月，中共中央在遵义召开政治局扩大会议，集中全力纠正博古等人在军事上和组织上左的错误，肯定了毛泽东的正确军事主张，选举毛泽东为中央政治局常委，取消了博古、李德的军事最高指挥权，遵义会议开始确立以毛泽东为主要代表的马克思主义正确路线在中共中央的领导地位，在极其危急的情况下，挽救了党，挽救了红军，挽救了中国革命，是中国共产党历史上一个生死攸关的转折点。
      topic: 遵义会议
      type: textbook
      page: 82
    - text: 遵义会议后，红军经过整编，提高了战斗力，毛泽东指挥红军，声东击西，四渡赤水，佯攻贵阳，打乱了敌人的追剿计划，然后挥师北进，渡过金沙江，跳出了敌人的重重包围，接着，红军强渡大渡河，飞夺泸定桥，翻过大雪山，走过草地，1935年10月，中共中央带领中央红军历经艰难险阻，终于到达陕甘革命根据地的吴起镇，与陕北红军胜利会师。
      topic: 长征历程
      type: textbook
      page: 83
    - text: 1936年10月，红二方面军和红四方面军到达甘肃会宁地区，与前来接应的红一方面军胜利会师，红军三大主力会师，宣告长征胜利结束，红军长征的胜利，粉碎了国民党反动派消灭红军的企图，保存了党和红军的基干力量，使中国革命转危为安，红军长征播下了革命种子，铸就了长征精神，打开了中国革命的新局面。
      topic: 长征胜利
      type: textbook
      page: 84
    - text: 长征是历史纪录上的第一次，长征是宣言书，长征是宣传队，长征是播种机。——毛泽东
      topic: 毛泽东评长征
      type: primary
      page: 84
- title: 第六单元 中华民族的抗日战争
  lessons:
  - title: 第18课 从九一八事变到西安事变
    items:
    - text: 1931年9月18日夜，日本关东军炸毁沈阳北郊柳条湖附近南满铁路的一段路轨，反诬中国军队破坏，并以此为借口，突然袭击中国东北军驻地北大营，炮轰沈阳城，九一八事变爆发了，第二天清晨，日军占领沈阳，短短4个多月，东北100多万平方千米的锦绣河山，全部沦于敌手。
      topic: 九一八事变
      type: textbook
      page: 86
    - text: 九一八事变后，中国共产党派杨靖宇等人在东北组织游击队，开展抗日游击战争，中国人民的局部抗战开始了，1936年初，东北各抗日部队开始改编为由中国共产党领导的东北抗日联军，与日军战斗在白山黑水之间。
      topic: 局部抗战
      type: textbook
      page: 87
    - text: 1935年下半年，日本策动所谓华北自治运动，妄图使华北五省脱离中国版图，国民政府对日采取不抵抗的妥协政策，中华民族面临亡国灭种的危险，1935年12月9日，在中国共产党的领导下，北平数千名学生冒着严寒聚集在新华门前，向国民党当局请愿，他们高呼打倒日本帝国主义反对华北自治停止内战，一致抗日等口号，并举行示威游行，这就是著名的一二九运动。
      topic: 一二九运动
      type: textbook
      page: 88
    - text: 1936年12月12日，张学良、杨虎城在西安扣押蒋介石，实行兵谏，并通电全国，要求停止内战，联共抗日，这就是震惊中外的西安事变，西安事变发生后，中国共产党从全民族的利益出发，主张和平解决，联蒋抗日，派周恩来到西安参加谈判，与各方面进行协商，经过中国共产党和各方面的努力，蒋介石被迫接受停止内战、联共抗日等条件，西安事变和平解决。
      topic: 西安事变
      type: textbook
      page: 89
    - text: 西安事变的和平解决，揭开了国共两党由内战到联合抗日的序幕，成为扭转时局的关键，从此，十年内战基本停止，抗日民族统一战线初步形成。
      topic: 西安事变影响
      type: textbook
      page: 89
    - text: 抗日民族统一战线是指在中国共产党倡导下，以国共两党合作为基础，包括各民主党派、人民团体、一切爱国人士和海外侨胞在内的全民族抗日统一战线。
      topic: 抗日民族统一战线
      type: concept
      page: 89
  - title: 第19课 七七事变与全民族抗战
    items:
    - text: 1937年7月7日晚，日军借口一名士兵失踪，要求进入宛平城搜查，遭到中国守军的严词拒绝，早有准备的日军悍然炮轰我军防地，驻卢沟桥和宛平城的中国守军奋起抵抗，这就是七七事变，又称卢沟桥事变，七七事变标志着中国全民族抗战的开始。
      topic: 七七事变
      type: textbook
      page: 91
    - text: 1937年7月底，北平、天津相继失陷，保卫北平的战斗异常激烈，赵登禹、佟麟阁两位将军壮烈殉国，1937年8月13日，日军一名军官带兵强行闯过上海虹桥机场警戒线，被中国守军击毙，日本以此为借口，在上海挑起事端，中国军队奋起反击，淞沪会战爆发。
      topic: 北平天津失陷与淞沪会战
      type: textbook
      page: 92
    - text: 1937年9月，国民党中央通讯社公开发表了中共中央提交的国共合作宣言，蒋介石也发表谈话，实际上承认了中国共产党在全国的合法地位，这样，以国共为主导的抗日民族统一战线正式建立，国共团结御侮、全民族抗战的局面开始形成。
      topic: 抗日民族统一战线正式建立
      type: textbook
      page: 93
    - text: 1937年12月13日，日军攻陷南京，国民政府迁往重庆，把重庆作为战时的陪都，日军占领南京后，对南京人民进行了血腥大屠杀，犯下了滔天罪行，据战后中国南京审判日本战犯军事法庭查证，日军占领南京后六周之内，屠杀手无寸铁的中国居民和放下武器的士兵达30万人以上。
      topic: 南京大屠杀
      type: textbook
      page: 93
    - text: 战云密布下，卢沟桥的中国军队向日军开枪射击，日军当即开枪还击，双方展开激战。——日本《朝日新闻》
      topic: 七七事变报道史料
      type: primary
      page: 91
  - title: 第20课 正面战场的抗战
    items:
    - text: 1938年3月，日军向台儿庄发起攻击，中国守军奋起抵抗，在中国军队内外夹击下，日军被迫撤退，中国军队乘胜追击，台儿庄战役共歼敌1万余人，是抗战以来中国正面战场取得的最大的一场胜仗，振奋了中国军民的精神，坚定了抗战意志和信念。
      topic: 台儿庄战役
      type: textbook
      page: 96
    - text: 1938年6月开始，日军先后集结40多万兵力进攻武汉，为了保卫大武汉，中国军队共部署100多万人参战，利用大别山、鄱阳湖和长江两岸有利地形，构筑工事，逐次抵抗，消耗敌人，武汉会战历时4个多月，日本企图迅速灭亡中国的既定战略彻底破灭。
      topic: 武汉会战
      type: textbook
      page: 97
    - text: 广州、武汉失陷后，日军的兵力已严重不足，物力财力都感觉困难，抗日战争进入相持阶段，1941年12月，日军调集10余万兵力，以空军为掩护，对长沙发动第三次进攻，中国军队调集重兵防御，拼死抵抗，中国军队发起全线反击，歼灭大批日军，获得会战胜利，第三次长沙会战时，英美盟军在太平洋战场接连败退，这次会战的胜利，在国内外产生了积极影响。
      topic: 长沙会战
      type: textbook
      page: 97
    - text: 1944年初，日军向国民党正面战场发动了大规模的豫湘桂战役，国民党军队一溃千里，丢失了河南、湖南、广西等省的大部分和贵州省的一部分。
      topic: 豫湘桂战役
      type: textbook
      page: 98
    - text: 正面战场是指抗日战争时期，国民党军队在日军进攻的正面所进行的抵抗，以大型会战为主要作战形式，是抗日战争的重要组成部分。
      topic: 正面战场
      type: concept
      page: 96
  - title: 第21课 敌后战场的抗战
    items:
    - text: 1937年9月，八路军第一一五师在师长林彪率领下，在平型关一带隐蔽设伏，当日军1000多人进入伏击圈时，八路军从不同方向全线开火，日军乱作一团，又跳又窜，八路军冲杀下去，同日军展开肉搏战，经过近一天的激战，将日军全部歼灭，平型关大捷是全民族抗战以来中国军队取得的第一个胜利，粉碎了日军不可战胜的神话。
      topic: 平型关大捷
      type: textbook
      page: 100
    - text: 全面抗战爆发后，八路军、新四军挺进敌后，建立抗日根据地，将敌人的后方变成抗日的前线，晋察冀、晋绥、晋冀豫、山东、苏南等抗日根据地先后建立起来，陕甘宁边区首府、中共中央所在地延安成为敌后战场的战略总后方和指挥中枢。
      topic: 抗日根据地建立
      type: textbook
      page: 100
    - text: 1940年下半年，为了粉碎日军对敌后抗日根据地的扫荡和封锁，振奋抗战军民的士气，八路军总部在彭德怀指挥下，组织100多个团，在华北广阔的地域，对日军发动了一场大规模进攻，史称百团大战，这次战役的主要目标是破袭日军交通线，摧毁敌人交通线两侧及抗日根据地内的日伪据点，百团大战历时数月，战果辉煌，有力打击了日军的侵略气焰，提高了共产党和八路军的威望，振奋了全国军民争取抗战胜利的信心。
      topic: 百团大战
      type: textbook
      page: 101
    - text: 为巩固根据地，争取抗战胜利，中国共产党制定了各项政策和措施，根据地建立抗日民主政权，实行减租减息的土地政策，发展生产，使根据地成为敌后游击战得以长期坚持并取得最后胜利的基地。
      topic: 根据地建设
      type: textbook
      page: 102
    - text: 敌后战场是指中国共产党领导的八路军、新四军和其他人民抗日武装，在日军占领区后方开辟的战场，以游击战为主要作战形式，与正面战场相互配合，构成了中国抗日战争的整体。
      topic: 敌后战场
      type: concept
      page: 100
  - title: 第22课 抗日战争的胜利
    items:
    - text: 1941年1月，皖南事变爆发，国民党顽固派对新四军军部发动突然袭击，新四军军长叶挺谈判被扣，副军长项英遇难，中国共产党进行了针锋相对的斗争，坚持抗战，并在各敌后抗日根据地掀起了大生产运动，自己动手，丰衣足食，打破日伪军的封锁。
      topic: 皖南事变
      type: textbook
      page: 104
    - text: 1945年4月，中国共产党在延安召开了第七次全国代表大会，大会总结了中国共产党领导中国民主革命曲折发展的历史经验，特别是总结了抗日战争的丰富经验，制定了党的政治路线：放手发动群众，壮大人民力量，在中国共产党的领导下，打败日本侵略者，解放全国人民，建立一个新民主主义的中国，大会选举产生了中央领导机关，毛泽东在七届一中全会上当选为中共中央主席，大会确立毛泽东思想为中国共产党的指导思想并写入党章。
      topic: 中共七大
      type: textbook
      page: 105
    - text: 1945年8月6日和9日，美国先后向日本广岛和长崎各投下一枚原子弹，8月8日，苏联政府对日本宣战，次日，苏联红军出兵中国东北，对日本关东军发起进攻，8月9日，毛泽东发表《对日寇的最后一战》声明，号召中国人民的一切抗日力量举行全国规模的反攻，彻底打败日本侵略者。
      topic: 抗战反攻
      type: textbook
      page: 106
    - text: 1945年8月15日，日本天皇被迫宣布无条件投降，9月2日，日本政府正式签署投降书，中国抗日战争经历了14年艰难曲折的斗争，特别是8年全民族艰苦卓绝的浴血奋战，取得了最后的胜利，台湾也回到祖国怀抱，世界反法西斯战争胜利结束。
      topic: 抗战胜利
      type: textbook
      page: 106
    - text: 抗日战争是中国近代以来反抗外敌入侵第一次取得完全胜利的民族解放战争，它促进了中华民族的觉醒，为中国共产党带领中国人民实现彻底的民族独立和人民解放奠定了重要基础，中国战场是世界反法西斯战争的东方主战场，对世界反法西斯战争的胜利、维护世界和平作出了巨大贡献，中国的国际地位得到提高。
      topic: 抗战胜利意义
      type: textbook
      page: 107
    - text: 毛泽东思想是马克思列宁主义在中国的运用和发展，是被实践证明了的关于中国革命和建设的正确的理论原则和经验总结，是中国共产党集体智慧的结晶。
      topic: 毛泽东思想
      type: concept
      page: 105
- title: 第七单元 解放战争
  lessons:
  - title: 第23课 内战爆发
    items:
    - text: 1945年8月，蒋介石先后三次电邀毛泽东到重庆面商国家大计，蒋介石的目的，一方面是为发动内战争取时间，另一方面是想在政治舆论上获得主动，把不愿和平的罪名强加到中国共产党身上，为了尽一切可能争取和平，毛泽东高瞻远瞩，以惊人的胆魄亲赴重庆，与国民党进行和平谈判。
      topic: 重庆谈判背景
      type: textbook
      page: 110
    - text: 经过谈判，1945年10月10日，国共双方签署了《政府与中共代表会谈纪要》，即双十协定，双方同意以和平、民主、团结、统一为基础，长期合作，坚决避免内战，建设独立、自由和富强的新中国，召开政治协商会议，邀集各党派代表和社会贤达协商国是，讨论和平建国方案。
      topic: 双十协定
      type: textbook
      page: 111
    - text: 1946年1月10日，政治协商会议在重庆举行，会议讨论了建立联合政府、和平建国纲领、召开国民大会、修改宪法草案、整编军队等问题，再一次确定了避免内战、和平建国的方针。
      topic: 政治协商会议
      type: textbook
      page: 111
    - text: 1946年6月，蒋介石公然违背双十协定，撕毁政协决议，全力围攻中原解放区，发动了全面内战，国民党凭借优势兵力，向中原解放区发动疯狂进攻，全面内战爆发。
      topic: 全面内战爆发
      type: textbook
      page: 112
    - text: 面对国民党军队的疯狂进攻和敌强我弱的实际情况，毛泽东提出了一切反动派都是纸老虎的著名论断，中共中央号召解放区军民以自卫战争粉碎国民党军队的进攻，并制定了以运动战为主要方式，以歼灭敌人有生力量为主要目标，集中优势兵力各个歼灭敌人的作战原则和方针。
      topic: 粉碎全面进攻
      type: textbook
      page: 112
    - text: 一切反动派都是纸老虎。看起来，反动派的样子是可怕的，但是实际上并没有什么了不起的力量。——毛泽东
      topic: 纸老虎论断史料
      type: primary
      page: 112
  - title: 第24课 人民解放战争的胜利
    items:
    - text: 1947年，中国共产党召开全国土地会议，颁布《中国土地法大纲》，大纲规定：没收地主土地，废除封建剥削的土地制度，实行耕者有其田，按照农村人口平均分配土地，随后，制定了土地改革总路线：依靠贫雇农，团结中农，有步骤地、有分别地消灭封建性剥削的土地制度，发展农业生产，解放区的土地改革，使农村的阶级关系和土地占有状况发生了根本性变化，激发了农民革命和生产的积极性，翻身农民踊跃参军参战，为人民解放战争的胜利提供了重要的人力、物力保障。
      topic: 解放区土地改革
      type: textbook
      page: 114
    - text: 1947年夏，刘伯承、邓小平率领晋冀鲁豫解放军主力，在山东西南强渡黄河天险，千里挺进大别山，直接威胁到南京、武汉，揭开了人民解放军战略进攻的序幕，随后，其他战场的人民解放军也相继转入进攻，迫使国民党主力退守沈阳、北平、徐州等孤城，被动防御作战。
      topic: 挺进大别山
      type: textbook
      page: 115
    - text: 1948年9月，辽沈战役打响，林彪、罗荣桓指挥东北人民解放军首先攻占辽宁锦州，一举切断了敌人向关内的退路，随后，攻占长春、沈阳，解放东北全境，辽沈战役歼灭国民党军47万余人，解放了东北全境。
      topic: 辽沈战役
      type: textbook
      page: 116
    - text: 1948年11月，中原野战军与华东野战军在以徐州为中心的广大地区发起淮海战役，淮海战役的胜利，解放了长江中下游以北的广大地区，1948年11月，东北人民解放军挥师入关，与华北人民解放军共同发起平津战役，北平国民党守军总司令傅作义在中国共产党的争取下，接受和平改编，1949年初，北平和平解放，平津战役的胜利，使华北全境基本解放。
      topic: 淮海平津战役
      type: textbook
      page: 116
    - text: 三大战役共歼灭和改编国民党军队150多万人，国民党军队的主力基本被消灭，大大加速了人民解放战争在全国的胜利。
      topic: 三大战役意义
      type: textbook
      page: 117
    - text: 1949年4月，人民解放军百万雄师兵分三路，横渡长江，占领南京，结束了国民党在大陆的统治，国民党残余势力退往台湾。
      topic: 渡江战役南京解放
      type: textbook
      page: 117
