grade: 七年级上
book: 中国历史七年级上册（人教版）
units:
  - title: 第一单元 史前时期：原始社会与中华文明的起源
    lessons:
      - title: 第1课 远古时期的人类活动
        items:
          - text: "元谋人距今约170万年，是我国境内目前已确认的最早的古人类，发现于云南元谋县，能够制作工具并使用火。"
            topic: 元谋人
            type: textbook
            page: 2
          - text: "北京人遗址位于北京西南周口店龙骨山上，距今约70万—20万年，保留了猿的某些特征，能够直立行走，使用打制石器，过着群居生活，已经学会使用火并长时间保存火种。"
            topic: 北京人
            type: textbook
            page: 3
          - text: "北京人遗址是迄今所知世界上内涵最丰富、材料最齐全的直立人遗址之一，为人类起源的研究提供了可靠的证据。"
            topic: 北京人遗址
            type: textbook
            page: 5
          - text: "山顶洞人距今约3万年，模样和现代人基本相同，已经掌握磨光和钻孔技术，会人工取火，靠采集、狩猎为生，还会捕鱼，会缝制衣服，有爱美意识，也会埋葬逝者。"
            topic: 山顶洞人
            type: textbook
            page: 5
          - text: "化石是研究远古人类历史的重要证据，碳-14年代测定法可用于测定5万年以内的生物体年代。"
            topic: 考古方法
            type: concept
            page: 7
      - title: 第2课 原始农业与史前社会
        items:
          - text: "距今约10000年前，中华大地进入新石器时代，先民开始定居生活，制作陶器和磨制石器，农业、畜牧业和手工业逐渐产生和发展。"
            topic: 新石器时代
            type: textbook
            page: 8
          - text: "距今约10000年左右，我国出现了最早的人工栽培的农作物，长江中下游的先民开始栽培稻，北方地区的先民开始栽培粟和黍，目前世界上最早的栽培稻、粟和黍均发现于中国。"
            topic: 原始农业
            type: textbook
            page: 8
          - text: "河姆渡人生活在距今约7000年的长江流域，居住干栏式建筑，种植水稻，使用骨耜，会制作陶器、玉器和简单的乐器骨哨，还运用雕刻等技术制作艺术品，懂得使用天然漆。"
            topic: 河姆渡人
            type: textbook
            page: 10
          - text: "半坡人生活在距今约6000年的黄河流域，居住半地穴式圆形房屋，种植粟，制作彩陶，以红底黑色纹饰为主，纹饰多是几何图案，还有动植物纹饰，会简单的纺织、制衣。"
            topic: 半坡人
            type: textbook
            page: 11
          - text: "农作物种植、家畜饲养的出现以及聚落、磨制石器的发展，是原始农业兴起和发展的重要标志，原始农业为古代文明社会的形成奠定了重要的物质基础。"
            topic: 原始农业标志
            type: concept
            page: 9
          - text: "距今约5000年的良渚古城遗址位于浙江杭州，由宫殿区、内城和外城组成，有大型水利工程，出土了玉琮、玉璧和玉钺等礼器，反映了当时社会阶级分化已经相当明显，2019年7月6日被列入《世界遗产名录》。"
            topic: 良渚遗址
            type: primary
            page: 13
      - title: 第3课 中华文明的起源与形成
        items:
          - text: "五六千年前，中国进入部落联盟时期，黄河流域活动着炎帝、黄帝、蚩尤等部落，黄帝联合一些部落，在阪泉与炎帝展开大规模战争，炎帝失败归顺黄帝，两大部落结成联盟。"
            topic: 炎黄联盟
            type: textbook
            page: 14
          - text: "后来炎黄部落与东方的蚩尤部落在涿鹿激战，黄帝部落打败蚩尤，黄帝被推举为部落联盟首领，这一部落联盟以后逐渐形成为华夏族，后人尊崇炎帝和黄帝为中华民族的人文初祖。"
            topic: 人文初祖
            type: textbook
            page: 14
          - text: "相传炎帝教民开垦耕种，制作生产工具，种植五谷和蔬菜，制作陶器，发明纺织，会煮盐，教人们交换物品，还制作乐器琴瑟，并具有最早的天文和历法知识。"
            topic: 炎帝发明
            type: textbook
            page: 15
          - text: "相传黄帝能建造宫室以避寒暑，制作衣裳，挖掘水井，制造船只，会炼铜，并发明了弓箭，其妻子嫘祖会缫丝，擅长纺织，仓颉创造文字，伶伦制作音律，隶首发明算盘。"
            topic: 黄帝发明
            type: textbook
            page: 15
          - text: "尧、舜、禹依次成为部落联盟首领，当时实行禅让制，即将联盟首领的位子传给贤德之人，尧鼓励人们开垦农田，发展历法，舜制定刑法，完善制度，稳定局势，又派禹治水，禹采用疏导的方法，开凿河渠疏导洪水入海，三过家门而不入，经过10多年努力终于消除水患。"
            topic: 禅让制
            type: textbook
            page: 17
          - text: "考古学者在河南、陕西、山西、甘肃、浙江等地发掘出距今8000—6000年的独木舟、骨笛、蚕茧和丝织品等，反映了我国原始社会晚期的社会发展水平，说明远古传说有一定的科学根据。"
            topic: 考古印证
            type: primary
            page: 16
  - title: 第二单元 夏商周时期：早期国家与社会变革
    lessons:
      - title: 第4课 夏商西周王朝的更替
        items:
          - text: "约公元前2070年，禹建立夏王朝，这是中国历史上的第一个王朝，禹最初想传位于伯益，但禹的儿子启凭借强大势力，在禹死后继承了他的位置，从此世袭制代替禅让制，夏朝建立了军队，制定刑法，设置监狱。"
            topic: 夏朝建立
            type: textbook
            page: 20
          - text: "夏朝的中心地区主要在今河南中西部、山西南部一带，考古学者在洛阳平原发掘出年代相当于夏王朝后期的一座都城遗址——二里头遗址，这里有宫殿建筑群、大型墓葬和手工业作坊，反映了夏王朝的阶级分化和等级界限。"
            topic: 二里头遗址
            type: primary
            page: 21
          - text: "约公元前1600年，汤建立商朝，都城建在亳，商王汤任用贤才，发展农业、手工业和商业，使经济得到发展，人民生活相对安定，商朝很快强大起来，受战乱、环境变化等因素影响，商朝多次迁都，到商王盘庚时迁到殷，此后保持了相对的稳定。"
            topic: 商朝建立
            type: textbook
            page: 21
          - text: "公元前1046年，武王联合各地势力，组成庞大的政治联盟，与商军在牧野决战，商军倒戈，周军占领商都，商朝灭亡，周武王建立周朝，定都镐京，史称西周。"
            topic: 西周建立
            type: textbook
            page: 23
          - text: "为稳定周初的政治形势，巩固疆土，周王根据血缘关系远近和功劳大小，将宗亲和功臣等分封到各地，授予他们管理土地和人民的权力，建立诸侯国，以保证周王朝对地方的控制，同时稳定政局，扩大统治范围，确立了周王朝的社会等级制度'分封制'，周代的贵族等级分为天子、诸侯、卿大夫、士。"
            topic: 分封制
            type: textbook
            page: 23
          - text: "公元前841年，周厉王与民争利，引起'国人暴动'，厉王逃亡，到周幽王时，朝政腐败，社会各种矛盾激化，公元前771年，西周王朝被犬戎族所灭，后来周平王东迁洛邑，史称东周。"
            topic: 西周灭亡
            type: textbook
            page: 24
      - title: 第5课 动荡变化中的春秋时期
        items:
          - text: "公元前770年，周平王将国都从镐京东迁洛邑，中国历史从此进入东周时期，东周前期被称为春秋时期，一般指从公元前770年至公元前476年。"
            topic: 春秋时期
            type: textbook
            page: 29
          - text: "春秋后期，铁制农具和牛耕出现，促进了农业上的深耕细作，并为开发山林、扩大耕地创造了条件，手工业的规模不断扩大，青铜业、冶铁业、纺织业、煮盐业以及漆器制作等都有所发展，商业活动逐渐活跃，很多城市出现了商品交换市场，金属货币被更多地使用。"
            topic: 经济发展
            type: textbook
            page: 29
          - text: "春秋时期的社会处于动荡状态，西周的各种制度在春秋时期逐渐遭到破坏，一些诸侯国不再把土地分封给卿大夫，而是设置县、郡，委派官员管理，职位也不再世袭，由此加强对地方的控制，这样就使分封制逐步瓦解。"
            topic: 分封制瓦解
            type: textbook
            page: 30
          - text: "周平王东迁后，周王室的统治力大减，直接管辖的地区仅在洛邑一带，周王虽然在名义上仍是天下'共主'，但已无力控制诸侯，诸侯国势力崛起，不再听从王命，各自为政，也不再定期向天子纳贡，致使周王室在财政上陷入困境，甚至要依赖诸侯国的经济支持。"
            topic: 王室衰微
            type: textbook
            page: 30
          - text: "春秋时期有众多的诸侯国，其中比较强大的有十几个，由于政治、经济发展不平衡，各诸侯国为了自身的利益，相互之间展开激烈的争斗，齐桓公、晋文公、秦穆公、楚庄王等先后称霸，号令诸侯，到春秋末期，长江下游的吴国和越国也先后北上争霸。"
            topic: 诸侯争霸
            type: textbook
            page: 30
          - text: "齐桓公任用管仲为相，执掌国政，他采纳管仲的建议，改革内政，发展生产，训练军队，使齐国的经济和军事实力大为提高，齐桓公打着'尊天子，攘四夷'的旗号，号令诸侯，成为春秋时期第一个霸主。"
            topic: 齐桓公称霸
            type: textbook
            page: 31
      - title: 第6课 战国时期的社会变革
        items:
          - text: "东周后期被称为战国时期，一般指从公元前475年至公元前221年，因西汉刘向整理校订《战国策》一书而得名，经过春秋近300年的纷争，大部分小诸侯国被兼并，几个大诸侯国左右着政局，维系周王室统治的各种制度已经完全崩溃。"
            topic: 战国时期
            type: textbook
            page: 33
          - text: "战国初年，晋国被韩、赵、魏三家大夫瓜分，齐国由大夫田氏取代，当时的诸侯国有十几个，其中齐、楚、燕、韩、赵、魏、秦七国的势力较强，史称'战国七雄'。"
            topic: 战国七雄
            type: textbook
            page: 33
          - text: "战国时期，强大的诸侯已不再打着'尊王攘夷'的旗号，而是各自为政，扩充军队，力图拓展疆域，七国都拥有强大的军队，相互之间展开战争，当时的战争规模很大，参战兵力多，交战区域广，持续时间长，中国历史上的一些著名战役，如桂陵之战、马陵之战、长平之战等都发生在这一时期。"
            topic: 兼并战争
            type: textbook
            page: 34
          - text: "公元前356年，秦孝公任用商鞅主持变法，商鞅推行一系列改革措施，使秦国的国力大为增强，提高了军队的战斗力，一跃成为最强盛的诸侯国，为以后秦国统一全国奠定了基础。"
            topic: 商鞅变法
            type: textbook
            page: 35
            tags: [商鞅变法, 变法, 秦国, 富国强兵, 统一基础]
            entities: [商鞅, 秦孝公, 秦国]
            event: 商鞅变法
            period: 战国
            keywords: [国力增强, 军队战斗力, 统一全国, 改革措施]
          - text: "商鞅变法在政治方面确立县制，由国君直接派官吏治理，废除贵族的世袭特权，改革户籍制度，加强对人民的管理，严明法度，禁止私斗；在经济方面废除井田制，允许土地自由买卖，鼓励耕织，生产粮食、布帛多的人可免除徭役，统一度量衡；在军事方面奖励军功，对有军功者授予爵位并赏赐土地。"
            topic: 变法内容
            type: textbook
            page: 35
            tags: [商鞅变法, 变法内容, 县制, 废井田, 奖励军功]
            entities: [商鞅, 秦国]
            event: 商鞅变法
            period: 战国
            keywords: [确立县制, 废除贵族特权, 允许土地自由买卖, 鼓励耕织, 统一度量衡, 奖励军功]
          - text: "公元前256年，蜀郡郡守李冰主持，在成都附近的岷江上修建了都江堰，由渠首和灌溉网两大系统工程构成，渠首分为鱼嘴、宝瓶口和飞沙堰三个主体工程，发挥出防洪、灌溉、水运等多方面的作用，建成之后，成都平原成为沃野，被称为'天府之国'，2200多年来一直发挥着巨大的作用。"
            topic: 都江堰
            type: primary
            page: 36
      - title: 第7课 百家争鸣
        items:
          - text: "老子是春秋后期楚国人，道家学派的创始人，姓李名耳，做过周朝的史官，管理王室的典籍，他认为万物运行有其自然的法则，人们应顺应自然，世间的事物都有其对立面，对立的双方是可以相互转化的，善于从正反两方面思考问题，在政治上主张'无为而治'，学说集中在《老子》（又称《道德经》）一书中。"
            topic: 老子
            type: textbook
            page: 38
          - text: "孔子是春秋后期鲁国人，出身下层贵族，从小学习礼乐，年轻时做过小吏，后收徒办学，成为知名学者，核心思想是'仁'，提出'仁者爱人'，'己所不欲，勿施于人'，'己欲立而立人，己欲达而达人'，在政治上推崇西周的制度，主张以德治国，反对苛政，认为统治者只有实行德政，使人民心悦诚服，社会才会稳定。"
            topic: 孔子
            type: textbook
            page: 38
          - text: "孔子不仅是大思想家，而且还是大教育家，他创办私学，打破了贵族和王室垄断教育的局面，主张'有教无类'，招收不同出身的学生，先后培养了三千弟子，促进了教育在民间的发展，注重道德教育和文化知识教育，发现和总结出许多教育规律，提出了一系列教学原则和方法。"
            topic: 孔子教育
            type: textbook
            page: 39
          - text: "战国时期，旧的社会制度进一步瓦解，新的社会制度逐步确立，学术思想领域非常活跃，形成了不同的学派，各陈其说，史称'诸子百家'，其中墨家、儒家、道家、法家等学派影响最大。"
            topic: 诸子百家
            type: concept
            page: 40
          - text: "墨子是墨家的创始人，主张'兼爱''非攻'，要求人们互爱互利，反对各国相互攻伐兼并、残害生命，选贤能的人治理国家，批判贵族的奢侈生活，提倡节俭；孟子主张实行'仁政'，提出'民为贵，社稷次之，君为轻'的思想，反对一切非正义的战争；荀子主张实行'礼治'，明确尊卑等级，以维系社会秩序。"
            topic: 墨家儒家
            type: textbook
            page: 40
          - text: "庄子强调治国要顺应自然和民心，人生应追求精神自由，保持独立的人格；韩非是法家的集大成者，反对空谈仁义，强调以法治国，树立君主的权威，建立中央集权专制统治；各家学派代表人物聚众讲学，研讨学术，著书立说，相互辩论，相互影响，取长补短，形成了思想文化的繁荣局面，史称'百家争鸣'。"
            topic: 百家争鸣
            type: textbook
            page: 41
  - title: 第三单元 秦汉时期：统一多民族封建国家的建立和巩固
    lessons:
      - title: 第9课 秦统一中国
        items:
          - text: "公元前230年至公元前221年，秦王嬴政先后攻灭韩、赵、魏、楚、燕、齐六国，完成统一大业，建立秦朝，定都咸阳，秦的统一，结束了春秋战国以来长期争战混乱的局面，建立起我国历史上第一个统一的多民族的封建国家。"
            topic: 秦统一
            type: textbook
            page: 44
          - text: "为加强对全国的统治，秦朝创立了大一统的中央集权制度，国家的最高统治者称为皇帝，拥有至高无上的权威，总揽全国的一切军政大权，嬴政自称'始皇帝'，史称'秦始皇'，皇帝之下设有中央政权机构，由丞相、太尉、御史大夫统领，分别掌管行政、军事和监察事务，最后的决断权由皇帝掌控。"
            topic: 中央集权
            type: textbook
            page: 45
          - text: "在地方上，秦朝进一步废除西周以来实行的分封制，建立由中央直接管辖的郡县制，全国分为36郡，后增至40多郡，郡的行政长官称郡守，在郡下设县，县的长官称县令或县长，郡县的长官都由朝廷直接任免，县以下又设乡、亭、里等基层组织，郡县制的实行，开创了此后我国历代王朝地方行政的基本模式。"
            topic: 郡县制
            type: textbook
            page: 46
          - text: "秦始皇为巩固统一，统一文字，制定笔画规整的小篆，作为通用文字颁行全国，统一货币，以秦国的圆形方孔半两钱作为标准货币，在全国流通，统一度量衡制度，统一车辆和道路的宽窄，并修筑贯通全国的道路，开凿灵渠，统一岭南及东南沿海地区，派蒙恬北击匈奴，修筑西起临洮、东到辽东的'万里长城'。"
            topic: 巩固统一措施
            type: textbook
            page: 46
          - text: "秦朝的疆域，东至东海，西到陇西，北至长城一带，南达南海，是当时世界上的大国之一。"
            topic: 秦朝疆域
            type: textbook
            page: 47
      - title: 第10课 秦末农民大起义
        items:
          - text: "秦始皇完成了统一中国的事业，实行了各项巩固统一的措施，并创立了郡县制等后世沿用的制度，但他的统治也具有急于求成和暴虐的特点，对农民征收沉重的赋税，大规模地征调民力服徭役和兵役，法律非常严苛，刑罚极其残酷，实行'焚书坑儒'，钳制了思想，摧残了文化。"
            topic: 秦朝暴政
            type: textbook
            page: 50
          - text: "公元前209年夏，有900多个农民被征发去渔阳戍守长城，走到大泽乡时，遇上大雨，道路泥泞，被迫停止前行，不能按期到达，按照秦法，戍守误期要被处死，陈胜、吴广号召大家'且壮士不死即已，死即举大名耳，王侯将相宁有种乎'，杀死押队的军官，举行起义，史称'大泽乡起义'。"
            topic: 大泽乡起义
            type: textbook
            page: 50
          - text: "陈胜、吴广起义是中国历史上第一次大规模的农民起义，他们的革命首创精神，鼓舞了后世千百万劳动人民起来反抗残暴的统治，起义失败后，项羽、刘邦领导的军队逐渐壮大，分别对秦军作战，项羽在巨鹿之战中以少胜多，将秦军的主力歼灭，刘邦抓住时机，率军直抵秦都咸阳。"
            topic: 农民起义
            type: textbook
            page: 51
          - text: "公元前207年，秦朝的统治者在起义军的包围下，被迫出城投降，威名显赫的秦朝，仅存在十几年就灭亡了。"
            topic: 秦朝灭亡
            type: textbook
            page: 51
          - text: "秦朝灭亡后，项羽自称西楚霸王，封刘邦为汉王，双方为争夺帝位，展开争战，史称'楚汉之争'，项羽虽势力强大，却刚愎自用，一味依赖武力，刘邦注重收揽民心，善用人才，力量逐渐由弱变强，最终刘邦的军队将项羽及部下包围在垓下，项羽兵败自刎，刘邦取得了最终的胜利。"
            topic: 楚汉之争
            type: textbook
            page: 52
      - title: 第11课 西汉建立和'文景之治'
        items:
          - text: "公元前202年，刘邦建立汉朝，定都长安，史称西汉，刘邦就是汉高祖，汉高祖吸取秦朝因暴政导致速亡的教训，采取了休养生息的政策，下令'兵皆罢归家'，让士兵还乡务农，将那些因战乱、饥荒而成为奴婢的人释放为平民，以增加农业劳动力，采取轻徭薄赋的政策，减轻农民的赋税，相应地减免徭役及兵役。"
            topic: 西汉建立
            type: textbook
            page: 54
          - text: "汉高祖死后，继任的统治者继续实行休养生息政策，注重农业生产，使汉初的经济逐渐得以恢复和发展，社会局势稳定下来，西汉王朝到了汉文帝和汉景帝时期，继续推行休养生息政策，提倡以农为本，要求各级官吏关心农桑，进一步减轻赋税和徭役，重视'以德化民'，提倡勤俭治国，反对奢侈浮华。"
            topic: 休养生息
            type: textbook
            page: 55
          - text: "文景时期，政治清明，经济发展，人民生活安定，当时的国力有了很大的增强，国家积累了大量的钱粮，库存的粮食和铜钱非常充盈，这一时期的统治局面，历史上称为'文景之治'，文景之治为汉武帝时期的强盛奠定了物质基础。"
            topic: 文景之治
            type: textbook
            page: 55
      - title: 第12课 大一统王朝的巩固
        items:
          - text: "汉武帝即位后，在思想上接受董仲舒'罢黜百家，独尊儒术'的建议，把儒家学说立为正统思想，使儒家忠君守礼的思想成为大一统政权的精神支柱，在长安兴办太学，以儒家的《诗》《书》《礼》《易》《春秋》作为教材，培养统治阶级需要的儒学人才，儒士也进入各级政权机构，从此，儒学居于主导地位，为历代王朝所推崇，影响深远。"
            topic: 独尊儒术
            type: textbook
            page: 57
          - text: "汉武帝采纳主父偃的'推恩'建议，下诏规定诸侯王除以嫡长子继承王位外，可将封地再次分封给其子弟作为侯国，由皇帝制定封号，这样，侯国越来越多，诸侯王的封地和势力越来越小，汉武帝还建立刺史制度，把全国划分为13个州部，每州部派刺史一人，代表朝廷监视州部内的地方官吏、豪强及其子弟，严禁他们为非作歹。"
            topic: 推恩令
            type: textbook
            page: 58
          - text: "汉武帝把铸币权收归中央，统一铸造五铢钱，还在全国各地设盐铁官，把煮盐、冶铁等经营权收归国有，实行盐铁官营、专卖，又在全国范围内统一调配物资，平抑物价，使国家的财政状况有了很大改善，为汉武帝许多政策的推行奠定了经济基础。"
            topic: 经济措施
            type: textbook
            page: 58
          - text: "公元前119年，汉武帝派大将卫青、霍去病率精骑出击匈奴，经过漠北战役的沉重打击，匈奴再无力与西汉对抗，部分匈奴人开始西迁，汉武帝从政治、思想、经济和军事等方面巩固了大一统的局面，使西汉王朝开始进入鼎盛时期。"
            topic: 北击匈奴
            type: textbook
            page: 59
      - title: 第13课 东汉的兴衰
        items:
          - text: "公元9年，外戚王莽夺取政权，建立新朝，西汉灭亡，王莽的施政加剧了社会动荡，激起各地农民起义，王莽政权被农民起义推翻后，西汉宗室刘秀在公元25年称帝，定都洛阳，史称东汉，刘秀就是光武帝，光武帝为了巩固统治，采取了一系列稳定社会局面的措施，到光武帝统治后期，社会出现了比较安定的局面，经济得到恢复和发展，史称'光武中兴'。"
            topic: 东汉建立
            type: textbook
            page: 63
          - text: "东汉中期以后，继位的皇帝大多年幼，不能主政，大权就由皇帝的母亲太后主持，太后重用自己的亲戚，导致外戚的势力膨胀，皇帝长大后，不甘心被外戚摆布，想亲自行使君权，就依赖身边的宦官，设法除掉外戚，宦官由此得到宠信，把持朝政，如此循环往复，形成了东汉后期外戚与宦官交替专权的局面，动摇了东汉的统治，东汉王朝走向衰亡。"
            topic: 外戚宦官
            type: textbook
            page: 64
          - text: "东汉后期，朝政越来越腐败，时局动荡不安，社会上大批贫民流离失所，加上自然灾害频繁发生，广大人民再也不能忍受这种黑暗统治了，184年，张角创立太平道，经过10多年在社会底层传教，信徒已有数十万人，一场有组织、有准备的农民大起义终于爆发，起义军头裹黄巾，在全国各地同时向东汉王朝发动猛烈进攻，史称'黄巾起义'。"
            topic: 黄巾起义
            type: textbook
            page: 65
          - text: "黄巾起义虽然失败了，但其余部坚持斗争了20多年，沉重打击了东汉的统治，使其一蹶不振。"
            topic: 起义影响
            type: textbook
            page: 65
      - title: 第14课 沟通中外文明的丝绸之路
        items:
          - text: "公元前138年，汉武帝派张骞出使西域，联络大月氏夹击匈奴，张骞率领随从西出长安，踏上了前往西域的征程，在途中被匈奴抓住，被扣留了10余年，他不忘使命，设法逃脱，辗转到达大月氏，但大月氏西迁已久，安居乐业，不愿再与匈奴打仗，张骞只好返回，公元前119年，张骞再次率领300多人的使团，带着万头牛羊，以及金币、丝绸等财物，走访了乌孙等西域许多国家，西域各国也认识到汉朝的富足与强大，纷纷派使节来到长安，促进了汉朝与西域各国之间的相互了解与往来。"
            topic: 张骞通西域
            type: textbook
            page: 67
            tags: [张骞, 出使西域, 西域, 汉武帝, 丝绸之路]
            entities: [张骞, 汉武帝, 大月氏, 匈奴, 乌孙]
            event: 张骞出使西域
            period: 西汉
            keywords: [促进了解与往来, 西出长安, 联络大月氏, 汉朝与西域]
          - text: "张骞出使西域后，汉朝和西域的使者开始相互往来，东西方的经济文化交流日趋频繁，商人们载着汉朝的丝绸等货物，从长安出发，穿过河西走廊，经西域运往中亚、西亚，再转运到更远的欧洲，又把西域的物产和奇珍异宝运到中原，这条沟通欧亚的陆上交通道路，就是著名的'丝绸之路'。"
            topic: 丝绸之路
            type: textbook
            page: 68
            tags: [丝绸之路, 张骞, 西域, 中外交流, 陆上交通]
            entities: [张骞, 汉朝, 西域, 中亚, 西亚, 欧洲]
            event: 丝绸之路开通
            period: 西汉
            keywords: [东西方经济文化交流, 长安, 河西走廊, 沟通欧亚]
          - text: "通过丝绸之路，汉朝的丝绸、漆器等物品，以及开渠、凿井、铸铁等技术传到西域，西域的良种马、香料、玻璃、宝石等，以及核桃、葡萄、石榴、苜蓿等植物，以至多种乐器和歌舞等传入中原，丝绸之路是古代东西方往来的大动脉，对于中国同其他国家和地区的贸易与文化交流，起到了极大的促进作用。"
            topic: 丝路交流
            type: textbook
            page: 69
          - text: "西汉朝廷设置西域都护，作为管理西域的最高长官，管辖西域36国，都护府设在乌垒城，西域都护颁行汉朝的号令，调遣军队，征发粮草，对西域地区进行有效的管辖，西域都护的设置，标志着西域正式归属中央政权，其管辖范围包括今新疆及巴尔喀什湖以东、以南的广大地区。"
            topic: 西域都护
            type: textbook
            page: 70
          - text: "东汉明帝时，派兵出击匈奴，并派班超出使西域，班超克服重重困难，使西域各国重新与汉朝建立联系，他得到西域各国的信任，长期留守西域，还派甘英出使大秦（即罗马帝国），甘英到达安息后受阻，未能继续前行，但此行开辟了通往西亚的路线，班超去世后，他的儿子班勇继承父业，再次出使西域。"
            topic: 班超经营西域
            type: textbook
            page: 71
      - title: 第15课 秦汉时期的科技与文化
        items:
          - text: "西汉时期，人们已经懂得了造纸的基本方法，东汉时，宦官蔡伦总结前人经验，改进造纸工艺，用树皮、麻头、破布、旧渔网等植物纤维为原料造纸，纸的质量大大提高，这种纸原料易找，价格便宜，易于推广，此后纸的使用日益普遍，逐渐取代简帛，成为人们广泛使用的书写材料，也便利了典籍的流传，世界各国的造纸术大都是从中国辗转流传过去的，造纸术的发明，是中国对世界文明的伟大贡献之一。"
            topic: 造纸术
            type: textbook
            page: 72
          - text: "张仲景是东汉末年的名医，虚心向名医求教，广泛收集民间药方，在总结前人经验的基础上，结合自己的临床实践，写成了《伤寒杂病论》一书，发展了中医学的理论和治疗方法，总结了各种疾病的症候，提出在诊断上要辨证分析病情，然后对症治疗，还发展了'治未病'的思想，提倡预防疾病，张仲景是中医临床理论体系的开创者，为中医药学的发展作出巨大贡献，被后世称为'医圣'。"
            topic: 张仲景
            type: textbook
            page: 73
          - text: "华佗是东汉末年的另一位名医，不仅擅长用针灸、汤药为人治病，而且能实施外科手术，发明了'麻沸散'，让病人和酒服下，失去知觉，然后进行各种手术，还创编出了'五禽戏'，帮助人们强身健体。"
            topic: 华佗
            type: textbook
            page: 73
          - text: "西汉史学家司马迁编写的《史记》，是中国古代第一部纪传体通史，记述了从传说中的黄帝到汉武帝时约3000年的史事，书中记录了帝王将相的历史活动，肯定他们的功绩，也揭露了他们的腐朽和罪恶，还为许多下层人物写了传记，公正记事，爱憎分明，秉笔直书，对中国史学发展产生了深远的影响，《史记》文笔优美，所记人物形象生动，在文学史上也有崇高的地位，被鲁迅誉为'史家之绝唱，无韵之离骚'。"
            topic: 史记
            type: textbook
            page: 74
          - text: "东汉末年，张角创立了太平道，尊奉黄帝和老子，也吸收了流行在社会上的一些神仙方术，他以治病来传道，对贫苦民众有很大的吸引力，太平道传播很快，道教产生于中国本土，东汉时，起源于古印度的佛教传入中国，佛教的传入，丰富了中国文化，在社会、思想、文学以及建筑、雕刻、绘画等方面产生深远影响。"
            topic: 道教佛教
            type: textbook
            page: 75
  - title: 第四单元 三国两晋南北朝时期：政权分立与民族交融
    lessons:
      - title: 第16课 三国鼎立
        items:
          - text: "东汉末年，曹操挟天子以令诸侯，取得政治上的主动，招揽各种人才，在经济上采用屯田的措施，组织军队和流亡的民众从事农业生产，既解决了大批流民的生计，又筹集了军粮，曹操与袁绍在官渡展开决战，曹操采取声东击西、各个击破的战术，偷袭袁军的粮囤，烧掉其全部军粮，迅速歼灭袁军主力，为以后统一北方打下基础。"
            topic: 官渡之战
            type: textbook
            page: 80
          - text: "208年，曹操挥师南下，准备进而消灭南方的割据势力，统一全国，孙权听从将军周瑜和诸葛亮的意见，决定与刘备联合迎战曹军，孙刘联军在赤壁与曹军对峙，针对曹军不习水战、船舰连接在一起的弱点，周瑜采纳部下黄盖的建议，由黄盖向曹操诈降并用火攻，曹军大溃，曹操带着败兵北撤，赤壁之战对当时整个局势有关键性的影响，为三国鼎立局面的形成奠定了基础。"
            topic: 赤壁之战
            type: textbook
            page: 81
          - text: "220年，曹操的儿子曹丕废掉汉献帝，在洛阳称帝，国号魏，221年，刘备在成都称帝，国号汉，史称蜀汉，229年，孙权在建业称帝，吴国建立，三国鼎立的局面形成。"
            topic: 三国鼎立
            type: textbook
            page: 82
          - text: "曹魏重视农业生产，大力兴修水利，孙吴开发江东，造船业发达，发展了海外贸易，230年，孙权派将军卫温率领万人船队到达夷洲，加强了大陆与台湾的联系，蜀汉在丞相诸葛亮的治理下，发展经济，改善民族关系，加速了西南地区的开发。"
            topic: 三国经济
            type: textbook
            page: 82
      - title: 第17课 西晋的短暂统一和北方各族的内迁
        items:
          - text: "三国后期，魏国实力增强，吴、蜀两国日益衰落，263年，魏灭蜀，曹魏中期，太尉司马懿参与辅佐新即位的小皇帝，不久，司马懿逐渐控制了魏国的军政大权，司马懿死后，他的两个儿子相继专权，魏国皇帝形同傀儡，266年，司马懿的孙子司马炎自立为帝，改国号为晋，以洛阳为都，史称西晋，司马炎就是晋武帝，280年，西晋灭吴，统一了全国。"
            topic: 西晋建立
            type: textbook
            page: 85
          - text: "西晋的皇室及许多大臣是大地主、大贵族出身，在生活上以豪华奢侈为荣，追求享乐，晋武帝在位时，大封同姓诸王，又陆续派遣诸王据守州郡重镇，这些出镇的宗室诸王，既手握重兵，又掌管民事，势力日益强大，晋武帝的儿子晋惠帝昏庸无能，他在位时，手握重兵的八个封王为了争夺中央政权，先后起兵，相互混战，史称'八王之乱'，这场内乱对社会造成巨大灾害，西晋从此衰落，中原人口大量死亡，幸存者纷纷逃离，形成我国古代历史上第一次大规模的人口迁徙高潮。"
            topic: 八王之乱
            type: textbook
            page: 86
          - text: "东汉、魏、晋时期，我国北方的游牧民族不断内迁，氐族和羌族由西向东迁入陕西关中，匈奴族和羯族由北向南迁到山西一带，鲜卑族有一部分迁到辽宁，有一部分迁到陕西及河套地区，西晋时，山西、陕西内迁的各族人口，已经占当地总人口的一半，内迁的少数民族人民与汉族人民长期接触，在生产技术和生活习俗上相互影响，民族界限日益缩小。"
            topic: 北方民族内迁
            type: textbook
            page: 87
      - title: 第18课 东晋南朝政治和江南地区开发
        items:
          - text: "316年，内迁的匈奴人灭掉西晋，随后，镇守长江下游的皇族司马睿于317年重建晋王朝，以建康为都城，史称东晋，司马睿当皇帝，得益于王导为首的南北大贵族的拥戴，时人称之为'王与马，共天下'，东晋初期，多次进行北伐，曾收复了黄河以南的部分地区，由于朝廷对北伐将领心存疑虑，多方牵制，使北伐缺少后援，最终未能恢复中原，东晋在淝水之战中战胜前秦，解除了来自北方的威胁，相对稳定的局势，使社会经济有所发展，江南出现了'荆扬晏安，户口殷实'的景象。"
            topic: 东晋建立
            type: textbook
            page: 89
          - text: "420年，东晋灭亡，南方相继出现宋、齐、梁、陈四个王朝，历史上统称为'南朝'，四个王朝均定都建康，其中宋朝疆域最大，南朝时，镇守地方的贵族和将领势力很大，梁武帝萧衍从地方起兵夺取帝位后，放纵皇室成员和官僚大地主盘剥平民百姓，政治日益败坏，后来发生大规模的叛乱，建康失守，江东最富庶的地区遭到烧杀抢掠，导致千里绝烟，人迹罕见，从此，在南北实力对比中，南朝处于明显劣势。"
            topic: 南朝更替
            type: textbook
            page: 90
          - text: "秦汉时期，黄河流域经济发达，是全国经济重心，江南地区地广人稀，农业生产落后，西晋末年以来，大批北方人民为躲避战祸南下，到东晋后期，长江中下游地区布满了南迁的流民，尤以江苏一带为多，有一部分流民继续南下，进入今天的浙江、福建和广东等地，北方人的南迁，给江南地区输送了大量的劳动力，也带来了中原先进的生产工具和生产技术，从而使自然条件优越的江南地区得到开发，经济迅速发展。"
            topic: 江南开发
            type: textbook
            page: 91
          - text: "江南地区得到开发，农业上大量荒地被开垦出来，耕地面积不断增加，并兴修了很多水利工程，农业生产技术也有了很大的改进，包括推广和改进犁耕，实行精耕细作，以及推广选种、育种、田间管理和施用粪肥等比较先进的生产技术，水稻由原来的直播变成育秧移栽，普遍实行了麦稻兼作，五岭以南地区还种植了双季稻，南方的手工业也有了快速的进步，在缫丝、织布、制瓷、冶铸、造船、造纸、制盐等方面都有显著的发展，农业和手工业的发展，同时促进了商业的交流和城市的繁荣，南朝时的建康，人口众多，是当时商业最为活跃的大都市。"
            topic: 经济发展
            type: textbook
            page: 92
      - title: 第19课 北朝政治和北方民族大交融
        items:
          - text: "4世纪后期，游牧在阴山地区的鲜卑族拓跋部迅速崛起，建立北魏，439年，北魏统一北方，结束了十六国以来分裂割据的局面，北魏孝文帝即位后，立志用文治移风易俗，力排众议，494年迁都洛阳，把百余万包括鲜卑族在内的北方各族人民迁到中原，进一步推行汉化措施，规定官员在朝廷中必须使用汉语，禁用鲜卑语，以汉服代替鲜卑服，改鲜卑姓为汉姓，鼓励鲜卑贵族与汉人贵族联姻。"
            topic: 北魏孝文帝改革
            type: textbook
            page: 93
          - text: "孝文帝改革促进了民族交融，也增强了北魏的实力，北魏孝文帝改革后，北方各民族不仅在经济上密切交往，在文化上的交流也日益频繁，西北民族的乐器、歌舞等也受到汉族人民的喜爱，尤其是在民族心理上，以往的'胡''汉'观念逐渐淡薄，民族之间的隔阂与偏见逐渐减少，为中华民族的发展注入了新的活力，进一步丰富了中华民族的物质文化和精神文化，并为隋唐时期多民族国家的繁荣与发展奠定了基础。"
            topic: 改革影响
            type: textbook
            page: 95
          - text: "北魏分裂后，北方先后出现东魏、西魏、北齐、北周四个王朝，北魏和四个王朝统称为北朝，北周外戚杨坚夺取政权，建立隋朝，589年，隋军南下，灭掉了南朝最后一个朝代陈，南北重归统一。"
            topic: 北朝更替
            type: textbook
            page: 95
      - title: 第20课 三国两晋南北朝时期的科技与文化
        items:
          - text: "北朝贾思勰撰写的《齐民要术》，是我国现存最早的一部完整的农书，这部农书总结了农、林、牧、副、渔等方面的生产技术，内容十分丰富，贾思勰强调农业生产要遵循自然规律，种植农作物必须因地制宜，不误农时，要改进生产技术和工具，还提出了多种经营和商品生产等宝贵思想，这部农业科学技术著作，突显了中国古代科学家以民生为本的务实精神，反映出当时农业生产技术已经达到很高的水平，对后世农学的发展有深远的影响，在世界农学史上占有重要地位。"
            topic: 齐民要术
            type: textbook
            page: 97
          - text: "南朝科学家祖冲之，在数学方面，把圆周率精确到小数点以后的第七位数字，即3.1415926和3.1415927之间，这项成果领先世界近千年，他制定出当时最先进的历法《大明历》，还设计制造出了指南车、水碓磨、千里船等，史书上称他造的千里船能'日行百余里'，指南车'圆转不穷，而司方如一'。"
            topic: 祖冲之
            type: textbook
            page: 98
          - text: "锺繇和胡昭是曹魏时期的书法名家，锺繇独创楷书书法，刚柔兼备，点画之间，多有异趣，后人称他的楷书为绝世之作，西晋设置书博士，教学生学习书法，规定用锺、胡书法作为标准书体，东晋的王羲之将书法艺术提高到一个新阶段，王羲之的代表作《兰亭集序》，达到收放自如、浑然天成的境界，被称为'天下第一行书'，王羲之由于在书法艺术上的杰出成就，被后人誉为'书圣'。"
            topic: 书法艺术
            type: textbook
            page: 99
          - text: "东晋的顾恺之是最著名的画家，他擅长的人物画，线条优美活泼，人物传神，富有个性，顾恺之一生的创作很多，流传下来的作品有摹本《女史箴图》和《洛神赋图》，均为古画中的珍品。"
            topic: 绘画艺术
            type: textbook
            page: 100
          - text: "南北朝时期，统治阶级为宣扬佛教，在一些地方的山崖上，开凿了许多石窟，其中最著名的是山西大同的云冈石窟和河南洛阳的龙门石窟，这两处石窟群里，雕刻着成千上万的佛像，周围石壁上满刻着浮雕，这些宏伟精巧的雕像，继承了秦汉以来我国雕塑艺术的优良传统，也吸收了外来佛教造型艺术的特点，堪称宏伟精巧的雕刻艺术品。"
            topic: 石窟艺术
            type: primary
            page: 101
