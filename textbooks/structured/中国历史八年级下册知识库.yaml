grade: 八年级下
book: 中国历史八年级下册（人教版）
units:
- title: 第一单元 中华人民共和国的成立和巩固
  lessons:
  - title: 第1课 中华人民共和国成立
    items:
    - text: 1949年9月，中国人民政治协商会议第一届全体会议在北平召开，662名代表参加会议，讨论成立新中国的问题。
      topic: 政治协商会议
      type: textbook
      page: 2
    - text: 会议通过了《中国人民政治协商会议共同纲领》，规定中华人民共和国是新民主主义即人民民主主义国家，实行工人阶级领导的、以工农联盟为基础的人民民主专政。
      topic: 共同纲领
      type: textbook
      page: 2
    - text: 会议决定改北平为北京作为首都，以《义勇军进行曲》为代国歌，以五星红旗为国旗，采用公元纪年。
      topic: 国旗国歌首都
      type: textbook
      page: 3
    - text: 1949年10月1日下午3点，毛泽东等国家领导人登上天安门城楼，首都30万军民齐集天安门广场，隆重举行开国典礼。
      topic: 开国大典
      type: textbook
      page: 4
    - text: 毛泽东向全世界庄严宣告：'中华人民共和国中央人民政府今天成立了！'他按动电钮，五星红旗伴随着《义勇军进行曲》冉冉升起，54门礼炮齐鸣28响。
      topic: 开国大典宣告
      type: primary
      page: 4
    - text: 中国人民政治协商会议的成功召开，标志着中国共产党领导的多党合作和政治协商制度正式确立。
      topic: 政治协商制度
      type: concept
      page: 3
  - title: 第2课 抗美援朝
    items:
    - text: 1950年6月25日，朝鲜内战爆发，美国政府作出武装干涉朝鲜内战的决定，并派遣第七舰队侵入台湾海峡。
      topic: 朝鲜战争爆发
      type: textbook
      page: 8
    - text: 1950年10月，应朝鲜党和政府请求，中国党和政府决定入朝作战，毛泽东派遣以彭德怀为司令员兼政治委员的中国人民志愿军开赴朝鲜战场。
      topic: 志愿军入朝
      type: textbook
      page: 8
    - text: 中国人民志愿军同朝鲜军民并肩作战，连续发动五次大规模战役，把美国侵略军赶回到三八线附近。
      topic: 五次战役
      type: textbook
      page: 9
    - text: 1952年10月，美国侵略军发动上甘岭战役，志愿军坚守阵地，击退敌军900多次冲击，最终取得上甘岭战役的胜利。
      topic: 上甘岭战役
      type: textbook
      page: 10
    - text: 1953年7月，美国不得不在停战协定上签字，中朝军队打败了武装到牙齿的对手，打破了美军不可战胜的神话。
      topic: 停战协定
      type: primary
      page: 11
    - text: 抗美援朝战争伟大胜利，是中国人民站起来后屹立于世界东方的宣言书，是中华民族走向伟大复兴的重要里程碑。
      topic: 抗美援朝意义
      type: concept
      page: 11
  - title: 第3课 土地改革
    items:
    - text: 1950年，中央人民政府颁布《中华人民共和国土地改革法》，规定废除地主阶级封建剥削的土地所有制，实行农民的土地所有制。
      topic: 土地改革法
      type: textbook
      page: 13
    - text: 到1952年底，除部分民族地区外，全国大陆基本上完成了土地改革，约3亿无地少地的农民分到了约7亿亩土地和大量的农具、牲畜和房屋等。
      topic: 土地改革完成
      type: textbook
      page: 14
    - text: 土地改革的完成，彻底摧毁了我国存在2000多年的封建土地制度，消灭了地主阶级，农民翻了身，得到了土地，成为土地的主人。
      topic: 土地改革意义
      type: textbook
      page: 15
    - text: 土地改革使人民政权更加巩固，也大大解放了农村生产力，农业生产获得迅速恢复和发展，为国家的工业化建设准备了条件。
      topic: 土地改革影响
      type: textbook
      page: 15
    - text: 废除地主阶级封建剥削的土地所有制，实行农民的土地所有制，借以解放农村生产力，发展农业生产，为新中国的工业化开辟道路。
      topic: 土地改革法条文
      type: primary
      page: 14
    - text: 土地改革法注意保存富农经济，在政治上中立富农，与过去的土改政策有所不同，有利于稳定城市中的民族资产阶级，孤立地主阶级。
      topic: 富农政策
      type: concept
      page: 14
- title: 第二单元 社会主义制度的建立与社会主义建设的探索
  lessons:
  - title: 第4课 新中国工业化的起步和人民代表大会制度的确立
    items:
    - text: 为了有计划地进行社会主义建设，我国政府编制了发展国民经济的第一个五年计划，基本任务是集中主要力量发展重工业，建立国家工业化和国防现代化的初步基础。
      topic: 第一个五年计划
      type: textbook
      page: 18
    - text: 第一个五年计划从1953年开始执行，以苏联帮助兴建的156个项目为中心，先后施工1万多个工业项目，钢铁、煤炭、电力、机械制造等各个领域快速发展。
      topic: 一五计划实施
      type: textbook
      page: 19
    - text: 到1957年底，第一个五年计划绝大部分指标大幅度超额完成，我国开始改变工业落后的面貌，向社会主义工业化迈进。
      topic: 一五计划成就
      type: textbook
      page: 20
    - text: 1954年9月，第一届全国人民代表大会第一次会议在北京召开，大会通过了《中华人民共和国宪法》，这是我国第一部社会主义类型的宪法。
      topic: 人民代表大会制度
      type: textbook
      page: 21
    - text: 中华人民共和国的一切权力属于人民，人民行使权力的机关是全国人民代表大会和地方各级人民代表大会。
      topic: 宪法条文
      type: primary
      page: 21
    - text: 人民代表大会制度是我国的根本政治制度，为社会主义民主政治建设奠定了基础。
      topic: 人民代表大会制度
      type: concept
      page: 22
  - title: 第5课 三大改造
    items:
    - text: 国家对农业进行社会主义改造，主要是把分散的个体农民组织起来，引导他们参加农业生产合作社，走集体化和共同富裕的社会主义道路。
      topic: 农业合作化
      type: textbook
      page: 23
    - text: 农业合作化经历了由农业互助组、初级农业生产合作社到高级农业生产合作社三个阶段，1955年全国掀起农业合作化的高潮。
      topic: 合作化阶段
      type: textbook
      page: 24
    - text: 从1954年起，国家对资本主义工商业的社会主义改造，逐步发展为企业的公私合营，1956年初出现全行业公私合营的高潮。
      topic: 公私合营
      type: textbook
      page: 25
    - text: 在改造过程中，国家对资本家占有的生产资料实行赎买政策，即按全行业公私合营时资本家的资本发给定息，这种赎买政策实现了和平过渡，是中国社会主义改造的创举。
      topic: 赎买政策
      type: textbook
      page: 25
    - text: 到1956年底，国家基本上完成了对农业、手工业和资本主义工商业的社会主义改造，实现了生产资料私有制向社会主义公有制的转变。
      topic: 三大改造完成
      type: primary
      page: 26
    - text: 社会主义基本制度在我国建立起来，这是中国历史上最深刻的社会变革，我国从此进入社会主义初级阶段。
      topic: 社会主义初级阶段
      type: concept
      page: 26
  - title: 第6课 艰辛探索与建设成就
    items:
    - text: 1956年，中国共产党在北京召开第八次全国代表大会，大会分析了当时国内的主要矛盾，指出党和人民的主要任务是集中力量把我国尽快地从落后的农业国变为先进的工业国。
      topic: 中共八大
      type: textbook
      page: 27
    - text: 1958年，中共八大二次会议提出'鼓足干劲、力争上游、多快好省地建设社会主义'的总路线，接着全国掀起了'大跃进'的高潮和人民公社化运动。
      topic: 大跃进
      type: textbook
      page: 27
    - text: 1959年至1961年，我国的国民经济发生严重困难，中共中央开始调整国民经济，提出了'调整、巩固、充实、提高'的八字方针。
      topic: 八字方针
      type: textbook
      page: 28
    - text: 全面的社会主义建设事业开始后，中国人民在中国共产党的领导下，建成武汉、包头两大钢铁基地，大庆油田、胜利油田和大港油田，到1965年我国实现了原油和石油产品的全部自给。
      topic: 建设成就
      type: textbook
      page: 30
    - text: 1962年1月11日至2月7日，中共中央在北京召开了扩大的中央工作会议，这次会议通常被称为'七千人大会'，是中国共产党成立以来举行的规模最大的一次工作会议。
      topic: 七千人大会
      type: primary
      page: 28
    - text: 社会主义建设在探索中曲折发展，既有巨大成就，也出现了'大跃进'和'文化大革命'那样的失误和曲折。
      topic: 曲折探索
      type: concept
      page: 27
- title: 第三单元 中国特色社会主义道路
  lessons:
  - title: 第7课 伟大的历史转折
    items:
    - text: 1978年，思想理论界展开了一场真理标准问题的大讨论，这是一场深刻的思想解放运动，使人们认识到只有实践才是检验真理的唯一标准。
      topic: 真理标准讨论
      type: textbook
      page: 34
    - text: 1978年12月，中共十一届三中全会在北京召开，这次全会冲破长期'左'的错误的严重束缚，确定了解放思想、开动脑筋、实事求是、团结一致向前看的指导方针。
      topic: 十一届三中全会
      type: textbook
      page: 35
    - text: 中共十一届三中全会果断结束'以阶级斗争为纲'，重新确立马克思主义的思想路线、政治路线、组织路线，作出把党和国家工作中心转移到经济建设上来、实行改革开放的历史性决策。
      topic: 工作中心转移
      type: textbook
      page: 35
    - text: 中共十一届三中全会是新中国成立以来党的历史上具有深远意义的伟大转折，开启了改革开放和社会主义现代化建设新时期，实际上形成了以邓小平为核心的党的第二代中央领导集体。
      topic: 伟大转折
      type: textbook
      page: 35
    - text: 解放思想，开动脑筋，实事求是，团结一致向前看，首先是解放思想。只有思想解放了，我们才能正确地以马列主义、毛泽东思想为指导。
      topic: 邓小平讲话
      type: primary
      page: 35
    - text: 拨乱反正是伴随着思想解放的巨大潮流在全国全面展开的，'文化大革命'中受到迫害的各级党、政、军机关干部陆续得到平反。
      topic: 拨乱反正
      type: concept
      page: 36
  - title: 第8课 经济体制改革
    items:
    - text: 1978年，安徽凤阳小岗村农民实行分田包干到户，自负盈亏，农民有了生产自主权，生产积极性大大提高了，第一年秋粮食产量比上年增长6倍多。
      topic: 家庭联产承包责任制
      type: textbook
      page: 38
    - text: 家庭联产承包责任制是在土地公有制的基础上，把土地长期包给各家各户使用，农业生产基本上变为分户经营、自负盈亏。
      topic: 承包责任制特点
      type: textbook
      page: 39
    - text: 在中央的支持和倡导下，家庭联产承包责任制逐步在全国推开，到1983年已基本在全国农村普遍实行，激发了农民的劳动热情，带来农村生产力的大解放。
      topic: 承包责任制推广
      type: textbook
      page: 39
    - text: 1984年10月，中共十二届三中全会通过了《中共中央关于经济体制改革的决定》，要求加快以城市为重点的经济体制改革的步伐。
      topic: 城市经济体制改革
      type: textbook
      page: 39
    - text: 交够国家的，留足集体的，剩下都是自己的。
      topic: 农民俗语
      type: primary
      page: 39
    - text: 经济体制改革从农村到城市逐步展开，农村乡镇企业的迅速发展，为农民致富和实现现代化开辟了一条新路。
      topic: 乡镇企业
      type: concept
      page: 39
  - title: 第9课 对外开放
    items:
    - text: 1980年，中央决定在广东、福建两省兴办深圳、珠海、汕头、厦门4个经济特区，实行特殊的经济政策和经济管理体制。
      topic: 经济特区
      type: textbook
      page: 42
    - text: 深圳在短短的几年内，建设成为一座繁华的现代化城市，成为经济特区的代表和对外开放的'窗口'。
      topic: 深圳发展
      type: textbook
      page: 42
    - text: 1984年，中国进一步开放大连、天津、青岛、上海、福州、广州等14个沿海城市，1985年把长江三角洲、珠江三角洲和闽南三角地区开辟为沿海经济开放区。
      topic: 沿海开放
      type: textbook
      page: 43
    - text: 1988年，海南岛经济特区建立，1990年上海浦东开发区也建立起来，随后对外开放的地域又向沿江、沿边和内陆城市推进。
      topic: 浦东开发
      type: textbook
      page: 43
    - text: 深圳的发展和经验证明，我们建立经济特区的政策是正确的。
      topic: 邓小平题词
      type: primary
      page: 42
    - text: 中国形成了'经济特区—沿海开放城市—沿海经济开放区—内地'的全方位、多层次、宽领域的对外开放格局。
      topic: 对外开放格局
      type: concept
      page: 43
  - title: 第10课 建设中国特色社会主义
    items:
    - text: 1982年，在中国共产党第十二次全国代表大会上，邓小平明确提出：我们的现代化建设，必须从中国的实际出发，'把马克思主义的普遍真理同我国的具体实际结合起来，走自己的道路，建设有中国特色的社会主义'。
      topic: 十二大
      type: textbook
      page: 46
    - text: 1987年，中国共产党第十三次全国代表大会系统阐述了社会主义初级阶段的理论，明确概括了党在社会主义初级阶段的基本路线。
      topic: 十三大
      type: textbook
      page: 47
    - text: 1992年初，邓小平到南方视察，发表一系列重要谈话，强调党的基本路线要管一百年，动摇不得，社会主义的本质是解放生产力，发展生产力。
      topic: 南方谈话
      type: textbook
      page: 48
    - text: 1992年，中国共产党第十四次全国代表大会明确提出要建立社会主义市场经济体制，把社会主义基本制度和市场经济结合起来。
      topic: 十四大
      type: textbook
      page: 49
    - text: 计划多一点还是市场多一点，不是社会主义与资本主义的本质区别，计划经济不等于社会主义，资本主义也有计划；市场经济不等于资本主义，社会主义也有市场。
      topic: 南方谈话论述
      type: primary
      page: 48
    - text: 邓小平理论阐明了在中国建设社会主义、巩固和发展社会主义的基本问题，是马克思主义在中国发展的新阶段。
      topic: 邓小平理论
      type: concept
      page: 50
  - title: 第11课 为实现中国梦而努力奋斗
    items:
    - text: 2012年11月，习近平在参观《复兴之路》展览时提出：'实现中华民族伟大复兴，就是中华民族近代以来最伟大的梦想。'
      topic: 中国梦提出
      type: textbook
      page: 53
    - text: 2013年，习近平在十二届全国人大一次会议上深刻阐述了中国梦的宏伟蓝图，强调中国梦就是要实现国家富强、民族振兴、人民幸福。
      topic: 中国梦内涵
      type: textbook
      page: 53
    - text: 以习近平同志为核心的党中央提出并形成了全面建成小康社会、全面深化改革、全面依法治国、全面从严治党的'四个全面'战略布局。
      topic: 四个全面
      type: textbook
      page: 54
    - text: 2015年10月，中共十八届五中全会对全面建成小康社会作出重要部署，提出要牢固树立创新、协调、绿色、开放、共享的新发展理念。
      topic: 新发展理念
      type: textbook
      page: 55
    - text: 实现中华民族伟大复兴的中国梦，就是要实现国家富强、民族振兴、人民幸福，既深深体现了今天中国人的理想，也深深反映了我们先人们不懈追求进步的光荣传统。
      topic: 中国梦论述
      type: primary
      page: 53
    - text: 中国特色社会主义理论体系包括邓小平理论、'三个代表'重要思想、科学发展观以及习近平新时代中国特色社会主义思想。
      topic: 中国特色社会主义理论体系
      type: concept
      page: 56
- title: 第四单元 民族团结与祖国统一
  lessons:
  - title: 第12课 民族大团结
    items:
    - text: 根据我国民族问题的历史特点和现实情况，中国共产党将民族区域自治制度确立为解决我国民族问题的基本政策。
      topic: 民族区域自治制度
      type: textbook
      page: 60
    - text: 1949年通过的《中国人民政治协商会议共同纲领》将实行民族区域自治作为一项基本政治制度确定下来，1984年《中华人民共和国民族区域自治法》颁布实施。
      topic: 民族区域自治法
      type: textbook
      page: 60
    - text: 民族区域自治是在国家统一领导下，在少数民族聚居的地方实行区域自治，按照民族聚居的人口多少和区域大小，设立不同级别的民族自治区域和自治机关。
      topic: 民族区域自治内容
      type: textbook
      page: 60
    - text: 目前，全国已经建立了内蒙古、新疆、广西、宁夏、西藏5个民族自治区，30个民族自治州，120个民族自治县（旗）。
      topic: 民族自治区
      type: textbook
      page: 61
    - text: 中华人民共和国各民族一律平等，国家保障各少数民族的合法的权利和利益，维护和发展各民族的平等团结互助和谐关系。
      topic: 宪法条文
      type: primary
      page: 60
    - text: 民族区域自治制度是我国的一项基本政治制度，体现了国家充分尊重和保障各少数民族管理本民族内部事务权利的精神。
      topic: 民族区域自治制度
      type: concept
      page: 60
  - title: 第13课 香港和澳门回归祖国
    items:
    - text: 进入改革开放新时期后，邓小平从维护祖国和中华民族根本利益出发，创造性地提出了'一国两制'的伟大构想。
      topic: 一国两制
      type: textbook
      page: 65
    - text: '''一国两制''就是在祖国统一的前提下，国家的主体坚持社会主义制度，同时在台湾、香港、澳门保持原有的资本主义制度和生活方式长期不变。'
      topic: 一国两制内涵
      type: textbook
      page: 65
    - text: 1984年12月，中英两国政府正式签署联合声明，宣布中华人民共和国政府将于1997年7月1日对香港恢复行使主权。
      topic: 香港回归
      type: textbook
      page: 66
    - text: 1987年4月，中葡两国政府签署联合声明，宣布中华人民共和国政府将于1999年12月20日对澳门恢复行使主权。
      topic: 澳门回归
      type: textbook
      page: 66
    - text: 1997年7月1日，中英两国政府在香港如期举行香港政权交接仪式，中国对香港恢复行使主权，中华人民共和国香港特别行政区正式成立。
      topic: 香港政权交接
      type: primary
      page: 66
    - text: 香港、澳门回归祖国，标志着中国人民洗雪了百年国耻，在完成祖国统一大业的道路上迈出了重要一步。
      topic: 回归意义
      type: concept
      page: 67
  - title: 第14课 海峡两岸的交往
    items:
    - text: 新中国成立以后，党和政府明确提出要解放台湾，20世纪50年代中期，又确立了争取用和平方式解放台湾的思想。
      topic: 对台政策演变
      type: textbook
      page: 70
    - text: 改革开放以后，党和政府确立了和平统一祖国的大政方针，在邓小平提出'一国两制'的科学构想基础上，形成了'和平统一、一国两制'的对台基本方针。
      topic: 对台方针
      type: textbook
      page: 70
    - text: 1987年，台湾当局开始被迫调整'三不'政策，开放台湾居民赴大陆探亲，并在经济、文化交流等方面逐步采取了一些开放措施，海峡两岸同胞近40年的隔绝状态终于被打破。
      topic: 两岸关系突破
      type: textbook
      page: 71
    - text: 1992年，海峡两岸关系协会与台湾海峡交流基金会达成各自以口头方式表述'海峡两岸均坚持一个中国原则'的共识，这就是'九二共识'。
      topic: 九二共识
      type: textbook
      page: 71
    - text: 1993年，海协会会长汪道涵与海基会董事长辜振甫在新加坡举行第一次会谈，将'加强两岸经济交流，互补互利'写入协议，并就开展两岸经济、科技、文化交流达成共识。
      topic: 汪辜会谈
      type: primary
      page: 72
    - text: 2005年，中国国民党主席连战率'和平之旅'访问团访问中国大陆，胡锦涛会见连战一行，双方重申坚持'九二共识'，反对'台独'。
      topic: 两岸交流
      type: concept
      page: 72
- title: 第五单元 国防建设与外交成就
  lessons:
  - title: 第15课 钢铁长城
    items:
    - text: 新中国成立前夕，中国人民解放军的第一支海军部队——华东军区海军建立，新中国成立后，又相继建立了东海、南海和北海舰队。
      topic: 人民海军
      type: textbook
      page: 76
    - text: 人民空军是在陆军的基础上建立起来的，20世纪50年代初，空军部队已拥有各种飞机3000多架，在抗美援朝战争中取得了辉煌战绩。
      topic: 人民空军
      type: textbook
      page: 76
    - text: 1966年，中国组建第二炮兵部队，2015年更名为火箭军，主要担负遏制他国对中国使用核武器、遂行核反击和常规导弹精确打击任务。
      topic: 导弹部队
      type: textbook
      page: 77
    - text: 2014年，全军政治工作会议在福建古田召开，强调军队政治工作要为新形势下的强军目标提供坚强政治保证。
      topic: 古田会议
      type: textbook
      page: 78
    - text: 2016年，中国人民解放军成立五大战区，即东部战区、南部战区、西部战区、北部战区、中部战区，构建军队联合作战体系。
      topic: 五大战区
      type: primary
      page: 78
    - text: 国防和军队改革取得历史性突破，形成军委管总、战区主战、军种主建的新格局，军队组织架构和力量体系实现革命性重塑。
      topic: 军队改革
      type: concept
      page: 78
  - title: 第16课 独立自主的和平外交
    items:
    - text: 新中国成立以后，奉行独立自主的和平外交政策，毛泽东在新中国成立的那一天，就向全世界宣告：'凡愿遵守平等、互利及互相尊重领土主权等项原则的任何外国政府，本政府均愿与之建立外交关系。'
      topic: 外交政策
      type: textbook
      page: 81
    - text: 1953年底，周恩来在接见印度代表团时，首次提出和平共处五项原则，作为处理两国关系的原则，即互相尊重主权和领土完整、互不侵犯、互不干涉内政、平等互利、和平共处。
      topic: 和平共处五项原则
      type: textbook
      page: 81
    - text: 1955年，周恩来率中国代表团参加在印度尼西亚万隆召开的亚非会议，提出'求同存异'的方针，促进了会议的圆满成功。
      topic: 万隆会议
      type: textbook
      page: 82
    - text: 1971年10月，第26届联合国大会通过决议，恢复中华人民共和国在联合国的一切合法权利，并立即把国民党集团的代表从联合国及其所属一切机构中驱逐出去。
      topic: 恢复联合国席位
      type: textbook
      page: 83
    - text: 中国代表团是来求团结而不是来吵架的，中国代表团是来求同而不是来立异的。
      topic: 求同存异
      type: primary
      page: 82
    - text: 和平共处五项原则在国际上产生深远影响，被世界上越来越多的国家接受，成为处理国与国之间关系的基本准则。
      topic: 和平共处五项原则
      type: concept
      page: 81
  - title: 第17课 外交事业的发展
    items:
    - text: 1972年，尼克松总统访问中国，毛泽东会见了尼克松，周恩来与尼克松举行了会谈，中美双方正式签署并发表了《联合公报》，两国关系开始走向正常化。
      topic: 尼克松访华
      type: textbook
      page: 85
    - text: 1979年，中美正式建立外交关系，美国承认只有一个中国，台湾是中国领土的一部分，承认中华人民共和国政府是中国的唯一合法政府。
      topic: 中美建交
      type: textbook
      page: 86
    - text: 1972年，日本首相田中角荣访华，中日两国正式建立外交关系，紧接着，许多国家纷纷与中国建立外交关系，出现了与中国建交的高潮。
      topic: 中日建交
      type: textbook
      page: 86
    - text: 中国特色大国外交全面推进，形成全方位、多层次、立体化的外交布局，中国已与世界上170多个国家建交，参加了100多个政府间国际组织的工作。
      topic: 全方位外交
      type: textbook
      page: 87
    - text: 1971年，美国乒乓球代表团正式访问中国，这是新中国成立以来第一个美国代表团访问中国，'小球转动大球'的'乒乓外交'推动了中美关系的发展。
      topic: 乒乓外交
      type: primary
      page: 85
    - text: 中国积极发展全球伙伴关系，秉持共商共建共享的全球治理观，推动构建人类命运共同体。
      topic: 人类命运共同体
      type: concept
      page: 88
- title: 第六单元 科技文化与社会生活
  lessons:
  - title: 第18课 科技文化成就
    items:
    - text: 1964年10月16日，我国第一颗原子弹爆炸成功，1967年，我国第一颗氢弹爆炸成功，1970年，我国成功地发射了第一颗人造地球卫星——东方红一号。
      topic: 两弹一星
      type: textbook
      page: 90
    - text: 1999年11月，神舟一号无人飞船成功完成载人航天工程的第一次飞行试验，开启了我国的飞天之旅，2003年10月，航天员杨利伟乘坐神舟五号飞船升入太空。
      topic: 载人航天
      type: textbook
      page: 91
    - text: 20世纪70年代，袁隆平成功培育出籼型杂交水稻，比常规稻增产20%左右，为解决我国这样一个人口大国的吃饭问题和保障我国的粮食安全作出了巨大贡献。
      topic: 袁隆平
      type: textbook
      page: 92
    - text: 20世纪70年代初，中国药学家屠呦呦领导科研团队发现了能够有效抵抗疟疾的青蒿素，开创了治疗疟疾的新方法，2015年屠呦呦获得诺贝尔生理学或医学奖。
      topic: 屠呦呦
      type: textbook
      page: 92
    - text: 青蒿素类药物对疟疾的治愈率很高，得到世界卫生组织的认可和大力推广，使全球数亿人受益，对人类生命健康事业作出了巨大贡献。
      topic: 青蒿素影响
      type: primary
      page: 92
    - text: '''两弹一星''的成功，是在党和国家领导下，以钱学森、邓稼先为代表的一大批中国科学家自力更生、克服重重困难取得的伟大成就。'
      topic: 科学家精神
      type: concept
      page: 91
  - title: 第19课 社会生活的变迁
    items:
    - text: 改革开放前，经济发展水平较低，不能满足人们生活需要，人们买衣服要凭布票，不仅数量有限，色彩和样式也很单调，吃的方面饮食结构比较单一，有些农村甚至没有解决温饱问题。
      topic: 改革开放前生活
      type: textbook
      page: 97
    - text: 改革开放后，随着经济的快速发展和思想观念的解放，人们的衣着变得丰富多彩起来，服饰不仅仅是满足御寒等需要的工具，更是人们显示风度、展示个性的方式。
      topic: 衣着变化
      type: textbook
      page: 97
    - text: 改革开放后，十几亿人口的吃饭问题基本上得到了解决，人们不但能'吃饱'，而且还要'吃好'，讲究营养均衡、粗细搭配，绿色食品等科学卫生的概念也日益深入人心。
      topic: 饮食变化
      type: textbook
      page: 98
    - text: 改革开放以来，我国的交通条件有了明显的改善，铁路、公路、民用航空、水运和地下轨道交通建设飞速发展，已形成综合交通运输网。
      topic: 交通发展
      type: textbook
      page: 99
    - text: 通信事业的发展和通信方式的变迁，使信息的传递变得快捷和简便，深刻地改变着人们的思想观念和生活方式。
      topic: 通信发展
      type: textbook
      page: 100
    - text: 改革开放以来，城乡居民收入不断增加，消费总量不断增长，消费结构也不断优化，随着人民生活水平的提高，休闲娱乐成为人们日常生活的一部分。
      topic: 生活变迁
      type: concept
      page: 98
