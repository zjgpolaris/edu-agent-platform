grade: 七年级下
book: 中国历史七年级下册（人教版）
units:
- title: 第一单元 隋唐时期：繁荣与开放的时代
  lessons:
  - title: 第1课 隋朝的统一与灭亡
    items:
    - text: 581年，杨坚夺取北周政权，建立隋朝，定都长安；589年，隋文帝灭掉陈朝，统一全国，结束了长期分裂的局面。
      topic: 隋朝统一
      type: textbook
      page: 2
    - text: 隋炀帝时期开凿的大运河以洛阳为中心，北抵涿郡，南至余杭，连接了海河、黄河、淮河、长江和钱塘江五大水系，全长2700多千米，加强了南北地区政治、经济和文化交流。
      topic: 大运河
      type: textbook
      page: 4
    - text: 隋炀帝时，进士科的创立，标志着科举制的正式确立；科举制加强了皇帝在选官和用人上的权力，扩大了官吏选拔的范围，此后成为历朝选拔官吏的主要制度，一直维持了约1300年。
      topic: 科举制创立
      type: textbook
      page: 3
    - text: 皮日休在《汴河怀古》中写道："尽道隋亡为此河，至今千里赖通波。若无水殿龙舟事，共禹论功不较多。"
      topic: 大运河评价
      type: primary
      page: 2
    - text: 隋炀帝好大喜功，不恤民力，营建东都洛阳、开凿大运河、修筑长城和驰道，又三次征辽东，致使民不聊生，社会矛盾激化，最终引发大规模农民起义。
      topic: 隋朝灭亡
      type: textbook
      page: 4
    - text: 科举制是中国古代选官制度的一大变革，它使有才学的人能够由此参政，促进了社会阶层的流动，同时也推动了教育的发展。
      topic: 科举制影响
      type: concept
      page: 3
  - title: 第2课 从"贞观之治"到"开元盛世"
    items:
    - text: 618年，李渊称帝，建立唐朝，定都长安；626年，李世民即位，次年改年号为"贞观"，他就是唐太宗。
      topic: 唐朝建立
      type: textbook
      page: 6
    - text: 唐太宗吸取隋朝速亡的历史教训，勤于政事，虚心纳谏，从善如流，大臣魏征敢于直言，前后进谏200多次；唐太宗广纳贤才，知人善任，房玄龄善于谋略，杜如晦敢于决断。
      topic: 贞观之治
      type: textbook
      page: 7
      tags: [贞观之治, 唐太宗, 纳谏, 用人, 治世]
      entities: [唐太宗, 李世民, 魏征, 房玄龄, 杜如晦]
      event: 贞观之治
      period: 唐朝
      keywords: [勤于政事, 虚心纳谏, 从善如流, 广纳贤才, 知人善任]
    - text: 唐太宗曾对大臣说："为君之道，必须先存百姓，若损百姓以奉其身，犹割胫以啖腹，腹饱而身毙。"他还常引用古人的话："舟所以比人君，水所以比黎庶，水能载舟，亦能覆舟。"
      topic: 民本思想
      type: primary
      page: 8
    - text: 武则天是中国历史上唯一的女皇帝，她大力发展科举制，创立殿试制度，亲自面试考生，不拘一格选拔人才，社会经济得以持续发展，为后来"开元盛世"局面的出现奠定了基础。
      topic: 武则天
      type: textbook
      page: 9
    - text: 唐玄宗在位前期，年号为"开元"，当时政治稳定，经济繁荣，国库充盈，民众生活安定，唐朝的国力达到前所未有的强大，进入了鼎盛时期，历史上称为"开元盛世"。
      topic: 开元盛世
      type: textbook
      page: 9
    - text: '"贞观之治"是指唐太宗统治期间，政治比较清明，经济得到进一步发展，国力增强，文教昌盛的治世局面。'
      topic: 贞观之治概念
      type: concept
      page: 8
      tags: [贞观之治, 唐太宗, 治世, 唐朝盛世]
      entities: [唐太宗]
      event: 贞观之治
      period: 唐朝
      keywords: [政治清明, 经济发展, 国力增强, 文教昌盛]
  - title: 第3课 盛唐气象
    items:
    - text: 唐朝前期，垦田面积逐渐扩大，农业生产技术不断改进，发明并推广了曲辕犁和筒车等重要生产工具，在全国各地修建了很多水利工程。
      topic: 农业繁荣
      type: textbook
      page: 11
    - text: 唐朝的手工业发展到很高水平，纺织业品种繁多，蜀锦以色彩艳丽、纹饰精美冠于全国；陶瓷器生产水平也很高，越窑青瓷如冰如玉，邢窑白瓷类雪似银，唐三彩造型精美，色彩亮丽。
      topic: 手工业发展
      type: textbook
      page: 12
    - text: 唐太宗实行开明的民族政策，得到周边各族的拥戴，当时北方和西北地区的各族首领尊奉唐太宗为各族的"天可汗"；641年，文成公主入藏嫁给吐蕃赞普松赞干布，带去了蔬菜种子、茶叶、丝绸、工艺品以及佛经、医药、历法、科学技术等方面的书籍。
      topic: 民族交往
      type: textbook
      page: 14
    - text: 唐朝是中国历史上诗歌创作的黄金时期，仅《全唐诗》辑录的诗歌就有近5万首，最著名的诗人有李白、杜甫、白居易等；李白的诗飘逸洒脱，享有"诗仙"美誉，杜甫的诗风淳朴厚重，被誉为"诗圣"，白居易的诗平易近人，通俗易懂。
      topic: 唐诗繁荣
      type: textbook
      page: 16
    - text: 唐朝时期的社会风气比较开放，充满活力，人们多显示出一种昂扬进取、积极向上的精神风貌；当时的妇女受过文学、音乐等方面的教育，喜好骑马、打球、拔河、射箭、弈棋等活动。
      topic: 社会风气
      type: textbook
      page: 15
    - text: '"天可汗"是唐朝时期北方和西北各族首领对唐太宗的共同尊称，意即各族共同的君主，体现了唐朝开明的民族政策和强大的影响力。'
      topic: 天可汗
      type: concept
      page: 14
  - title: 第4课 唐朝的中外文化交流
    items:
    - text: 唐朝时期，中国和日本的交流非常频繁，为了学习中国的先进文化，日本派遣使节到中国，当时称为"遣唐使"；日本派出的遣唐使有十几批，最多的一次有500多人，他们把唐朝先进的制度、天文历法、文字、典籍、书法艺术、建筑技术等传回日本。
      topic: 遣唐使
      type: textbook
      page: 19
    - text: 鉴真是扬州大明寺的高僧，接受日本僧人的邀请东渡日本，前5次都因种种原因没有成功，辛劳过度而双目失明，但他矢志不渝，继续进行第6次东渡，终于在754年抵达日本，在日本传授佛经，还传播中国的医药、文学、书法、建筑、绘画等。
      topic: 鉴真东渡
      type: textbook
      page: 20
    - text: 贞观初年，高僧玄奘西行前往天竺取经，不畏艰险，历经磨难，经过4年的长途跋涉到达天竺；10多年后，玄奘携带大量佛经回到长安，此后主持译经工作，根据他的口述，由弟子记录成书的《大唐西域记》，记载了他游历过的100多个国家和地区的山川风物及社会习俗。
      topic: 玄奘西行
      type: textbook
      page: 21
    - text: 唐朝时，世界上有70多个国家或地区与中国有往来，繁盛的唐朝在世界上声望很高，各国称中国人为"唐人"。
      topic: 唐朝国际影响
      type: textbook
      page: 22
    - text: '"天竺"是唐朝时对印度的称呼，包括今印度、巴基斯坦、孟加拉等国；玄奘在求法时发现这些称呼都不准确，认为译为"印度"比较合适，他回国后，这一译法逐渐流行，沿用至今。'
      topic: 天竺
      type: concept
      page: 21
    - text: 《大唐西域记》是研究中外交流史的珍贵文献，记载了他游历过的100多个国家和地区的山川风物及社会习俗。
      topic: 大唐西域记
      type: primary
      page: 21
  - title: 第5课 安史之乱与唐朝衰亡
    items:
    - text: 755年，安禄山借口朝廷出现奸臣，和部将史思明一起发动叛乱，史称"安史之乱"；安史叛军从河北大举南下，先攻占东都洛阳，又攻下潼关，逼近长安，唐玄宗仓皇逃往四川。
      topic: 安史之乱爆发
      type: textbook
      page: 23
    - text: 持续八年之久的安史之乱，对社会经济造成极大的破坏，尤其是北方地区遭到浩劫；唐朝的国势从此由盛转衰，各种矛盾越来越尖锐，唐朝的中央权力衰微，安史旧将和内地节度使权势加大，逐渐形成藩镇割据的局面。
      topic: 安史之乱影响
      type: textbook
      page: 24
    - text: 杜甫在《垂老别》一诗中描绘安史之乱造成的惨状："万国尽征戍，烽火被冈峦。积尸草木腥，流血川原丹。"
      topic: 安史之乱惨状
      type: primary
      page: 23
    - text: 唐朝后期，统治腐朽，宦官专权，藩镇割据的态势越来越严重，人民赋役繁重，生活困苦，发动了大规模起义；起义军在黄巢的率领下，转战南北，并攻入长安，建立政权，给唐朝统治以致命的打击。
      topic: 黄巢起义
      type: textbook
      page: 24
    - text: 907年，原为农民起义军将领的朱温建立了后梁政权，唐朝至此灭亡；唐朝灭亡后，北方黄河流域先后出现后梁、后唐、后晋、后汉、后周五个政权，南方地区出现九个政权，再加上北方的北汉，史称"五代十国"。
      topic: 唐朝灭亡
      type: textbook
      page: 25
    - text: '"藩镇割据"是指安史之乱期间及以后，唐朝增设了许多节度使，不少节度使管辖的地区名义上是唐朝的藩镇，实际上是割据势力，这样就出现了藩镇割据的局面。'
      topic: 藩镇割据
      type: concept
      page: 24
- title: 第二单元 辽宋夏金元时期：民族关系发展和社会变化
  lessons:
  - title: 第6课 北宋的政治
    items:
    - text: 960年，后周大将赵匡胤在陈桥驿发动兵变，他的部下拥立他当皇帝，赵匡胤随即回师夺取后周政权，改国号为宋，以开封为东京，作为都城，史称北宋，赵匡胤就是宋太祖。
      topic: 北宋建立
      type: textbook
      page: 28
    - text: 宋太祖深知唐末以来武将专权的积弊，首先解除禁军高级将领的兵权，牢牢地控制了军队；他还控制对军队的调动，使禁军将领有握兵之重而无发兵之权，还经常调换军队将领，定期换防，割断将领与士兵和地方的联系，使兵不识将，将不专兵。
      topic: 杯酒释兵权
      type: textbook
      page: 29
    - text: 在中央，宋太祖为防止宰相权力过大，采取分化事权的办法，削弱相权；宋朝的宰相往往不止一人，在宰相之下又设相当于副宰相的若干人，与宰相共同议政；还设立多重机构，分割宰相的军政、财政大权。
      topic: 削弱相权
      type: textbook
      page: 29
    - text: 宋太祖即位后的一天，与石守信等大将饮酒时说："我当上皇帝全靠你们，可现在我整夜都睡不安宁。"众将忙问其故，宋太祖答道："如果有一天，你们也被部下黄袍加身，你们也会身不由己啊。"
      topic: 杯酒释兵权典故
      type: primary
      page: 29
    - text: 为防止唐末以来武将专横跋扈的弊端重现，宋太祖有意重用文臣掌握军政大权，后继的宋太宗继续采取抑制武将、提升文官地位的政策，使文臣统兵的格局逐渐形成，文官担任中央和地方的要职，甚至主持军务，地位和待遇高于武将。
      topic: 重文轻武
      type: textbook
      page: 30
    - text: '"重文轻武"是宋朝的基本国策，指宋朝统治者有意抑制武将、提升文官地位的政策，这一政策扭转了五代十国时期尚武轻文的风气，杜绝了武将跋扈和兵变政移的情况发生，有利于政权的稳固和社会的安定，但也导致军队战斗力减弱。'
      topic: 重文轻武政策
      type: concept
      page: 30
  - title: 第7课 辽、西夏与北宋的并立
    items:
    - text: 10世纪初，契丹族首领耶律阿保机统一契丹各部，建立政权，都城在上京临潢府；阿保机建国后，发展生产，创制文字，国力不断增强。
      topic: 辽的建立
      type: textbook
      page: 33
    - text: 11世纪前期，党项族首领元昊称大夏皇帝，定都兴庆府，史称西夏；元昊仿效唐宋制度，订立官制、军制和法律，并鼓励垦荒，发展农牧经济，还创制了西夏文字。
      topic: 西夏建立
      type: textbook
      page: 34
    - text: 宋真宗时，辽军大举攻宋，一直打到黄河岸边的澶州城下，威胁都城开封；宰相寇准力劝皇帝亲征，宋真宗勉强来到澶州城，宋军士气大振，打退辽军，之后辽与宋议和，辽军撤回，宋朝给辽岁币，史称"澶渊之盟"。
      topic: 澶渊之盟
      type: textbook
      page: 35
    - text: 澶渊之盟后，朝中大臣排挤寇准，寇准被罢去相职，当时京城里流传着民谣："欲得天下好，莫如召寇老。"
      topic: 寇准民谣
      type: primary
      page: 36
    - text: 元昊称帝后，多次亲率军队进攻北宋，宋朝被动挨打，节节败退；后来北宋与西夏进行和谈，订立了宋夏和约，元昊向宋称臣，宋给西夏岁币，议和后宋夏边界贸易兴旺。
      topic: 宋夏和约
      type: textbook
      page: 36
    - text: '"岁币"是指北宋每年送给辽、西夏的银、绢等钱物，是北宋与辽、西夏议和的重要条件，也是北宋财政负担加重的原因之一。'
      topic: 岁币
      type: concept
      page: 35
  - title: 第8课 金与南宋的对峙
    items:
    - text: 11世纪末，完颜部的首领阿骨打进一步完成了女真各部的统一；1115年，阿骨打正式建立女真政权，国号大金，他就是金太祖；金太祖模仿中原王朝制度，改革女真部落军政体制，颁行女真文字，发展生产，女真势力迅速壮大。
      topic: 金的建立
      type: textbook
      page: 37
    - text: 1125年，辽被金灭亡；1127年，金军攻破开封，北宋灭亡，史称"靖康之变"；北宋灭亡后，宋钦宗的弟弟赵构登上皇位，赵构就是宋高宗，后来定都临安，史称南宋。
      topic: 北宋灭亡
      type: textbook
      page: 38
    - text: 南宋初年，金军几次大举南下，南宋军民奋起抵抗；岳飞等抗金将领率军北伐，从金军手中收复许多失地，岳飞统率的"岳家军"在郾城大败金军主力，并乘胜追击，迫使金军后撤。
      topic: 岳飞抗金
      type: textbook
      page: 39
    - text: 在有望收复中原之时，宋高宗和权臣秦桧害怕抗金力量壮大，危及他们的统治，便向金求和，下令岳飞班师，并以"莫须有"的罪名杀害了岳飞。
      topic: 岳飞被害
      type: textbook
      page: 39
    - text: 宋金达成和议，南宋向金称臣，并给金岁币，双方以淮水至大散关一线划定分界线，宋金对峙局面形成；后来金迁都燕京，改名为中都，南宋统治者满足于现状，偏安江南一隅。
      topic: 宋金和议
      type: textbook
      page: 39
    - text: '"靖康之变"是指1127年金军攻破北宋都城开封，俘虏宋徽宗、宋钦宗，北宋灭亡的历史事件，这一事件标志着北宋的终结和南宋的开始。'
      topic: 靖康之变
      type: concept
      page: 38
  - title: 第9课 宋代经济的发展
    items:
    - text: 两宋时期，人口增加，垦田面积扩大，耕作技术提高，农业获得前所未有的发展；由越南传入的占城稻，成熟早，抗旱力强，北宋时推广到东南地区，水稻产量跃居粮食作物首位。
      topic: 农业发展
      type: textbook
      page: 41
    - text: 宋代南方各地普遍种植茶树，产茶的州县比以往有所增加；北宋至南宋初，植棉地区尚限于广东和福建，到南宋后期，棉花种植区已向北推进到江淮和川蜀一带。
      topic: 经济作物
      type: textbook
      page: 42
    - text: 北宋时，南方的丝织业胜过北方，四川、江浙地区的丝织生产发达；南宋后期，棉纺织业兴起，海南岛已有比较先进的棉纺织工具，棉纺织品种类较多。
      topic: 手工业发展
      type: textbook
      page: 42
    - text: 宋代商业的繁荣超过了前代，黄河、长江及运河沿岸兴起了很多商业城市，最大的是开封和杭州，人口多达百万；随着城市人口的增长，商业日益繁盛，城市中的店铺不断增加，街道以及宅巷之内到处可以开设店铺。
      topic: 商业繁荣
      type: textbook
      page: 43
    - text: 北宋前期，四川地区出现"交子"，这是世界上最早的纸币；南宋时，纸币发展成与铜钱并行的货币，纸币的产生有利于商业的发展。
      topic: 交子
      type: textbook
      page: 44
    - text: '"经济重心南移"是指从唐朝中期开始的经济重心南移，到南宋时最后完成，那时中央的财政收入，主要来自南方，特别是东南地区，这一变化对后世产生了深远影响。'
      topic: 经济重心南移
      type: concept
      page: 44
  - title: 第10课 蒙古族的兴起与元朝的建立
    items:
    - text: 1206年，铁木真完成了蒙古草原的统一，建立了蒙古政权，他被拥立为大汗，被尊称为成吉思汗；成吉思汗率领蒙古军队首先进攻西夏，西夏向金朝求援被拒，在蒙古军队的进攻下，1227年西夏灭亡。
      topic: 蒙古统一
      type: textbook
      page: 47
    - text: 成吉思汗在进攻西夏时，在六盘山去世，他临终前留下遗言，要借道宋境进攻金朝；此后，蒙古和南宋结盟，南北夹击金朝，1234年，蒙古灭金。
      topic: 蒙古灭金
      type: textbook
      page: 48
    - text: 1260年，忽必烈继承汗位；1271年，忽必烈改国号为元，次年定都于大都；忽必烈就是元世祖，他接受了汉族儒臣提出的"行汉法""行仁政""不嗜杀"的建议，施行"治国安民"的方略。
      topic: 元朝建立
      type: textbook
      page: 48
    - text: 1276年，元军攻入临安，南宋灭亡；南宋大臣陆秀夫、文天祥等人拥立南逃的宋宗室成员，继续展开抗元斗争；1279年，元军攻灭南宋残部，完成了全国的统一。
      topic: 元朝统一
      type: textbook
      page: 49
    - text: 文天祥在《过零丁洋》中写道："人生自古谁无死，留取丹心照汗青。"
      topic: 文天祥诗句
      type: primary
      page: 49
    - text: 元朝的统一结束了我国历史上较长时期的分裂割据局面，为统一多民族国家的进一步发展奠定了基础，也促进了各民族之间的经济文化交流。
      topic: 元朝统一意义
      type: concept
      page: 49
  - title: 第11课 元朝的统治
    items:
    - text: 元朝是我国历史上第一个由少数民族贵族为主建立的全国性的统一王朝，元朝疆域"北逾阴山，西极流沙，东尽辽左，南越海表"，超越汉朝和唐朝，是我国历史上最大的。
      topic: 元朝疆域
      type: textbook
      page: 51
    - text: 元朝把山东、山西和河北称作"腹里"，直属于中央的中书省；其他地区，除了吐蕃、畏兀儿地区之外，设置了岭北、辽阳、河南、陕西、四川、甘肃、云南、江浙、江西、湖广10个行省，在行省之下，继承前代的制度，设置路、府、州、县。
      topic: 行省制度
      type: textbook
      page: 52
    - text: 元朝建立后，对西藏地区行使行政管理权，在这一地区设立宣慰使司都元帅府，由宣政院直接统辖，掌管西藏的军民各项事务；朝廷还在当地设置地方机构，任命官员征收赋税，屯驻军队，实行充分和有效的管理，从此中央政府对西藏正式行使行政管辖。
      topic: 管辖西藏
      type: textbook
      page: 52
    - text: 元朝在澎湖岛设置了澎湖巡检司，负责管辖澎湖和琉球，这是历史上中央政府首次在台湾地区正式建立的行政机构。
      topic: 管辖台湾
      type: textbook
      page: 53
    - text: 元朝时候，边疆各族包括蒙古族，大量迁入中原和江南，同汉族等杂居相处；原先进入黄河流域的契丹、女真等族，经过长期共同生活，已同汉族没有什么区别；唐朝以来，不少来自波斯、阿拉伯的人，同汉、蒙、畏兀儿等族，长期杂居相处，互通婚姻，逐渐交融，开始形成一个新的民族——回族。
      topic: 民族交融
      type: textbook
      page: 53
    - text: '"行省制度"是元朝创立的地方行政管理制度，行省是地方最高行政机构，这一制度加强了中央对地方的管理，巩固了多民族国家的统一，是中国省制的开端，对后世影响深远。'
      topic: 行省制度概念
      type: concept
      page: 52
  - title: 第12课 宋元时期的都市和文化
    items:
    - text: 北宋时的开封、南宋时的临安、元朝时的大都，都是当时世界上著名的大都市；在北宋的开封，最为繁华的是大相国寺，场地宽阔，可容万人，每月举办多次庙会，寺庙内外人流如潮，进行各种商品交易。
      topic: 都市繁荣
      type: textbook
      page: 54
    - text: 随着城市的繁荣，宋代的市民阶层不断壮大，市民文化生活也丰富起来，开封城内有许多娱乐兼营商业的场所，叫作"瓦子"，瓦子中圈出许多专供演出的圈子，称为"勾栏"。
      topic: 瓦子勾栏
      type: textbook
      page: 55
    - text: 词是一种新体诗歌，句子有长有短，也称长短句，便于歌唱，词在唐朝时已经出现，经五代到两宋，得到很大发展，成为宋代主要的文学形式之一；宋代的词人层出不穷，杰出的有苏轼、李清照、辛弃疾等。
      topic: 宋词
      type: textbook
      page: 56
    - text: 元朝戏剧空前发达，出现了元曲，元曲包括散曲、杂剧和南戏等，杂剧把音乐、歌舞、动作、念白融合在一起，成为一种综合性的艺术；元代最优秀的戏剧家是关汉卿，代表作是悲剧《窦娥冤》。
      topic: 元曲
      type: textbook
      page: 57
    - text: 苏轼的词风豪迈而飘逸，把写景、抒情和议论结合在一起，收到引人人胜、激发情感的艺术效果；李清照的词风委婉、细腻、清秀；辛弃疾继承了苏轼以来的豪放词风和报国情怀，使词境变得更为雄奇阔大。
      topic: 宋词流派
      type: textbook
      page: 56
    - text: '"瓦子"是宋代城市中娱乐兼营商业的场所，"勾栏"是瓦子中圈出的专供演出的圈子，瓦子和勾栏的出现反映了宋代城市商品经济的繁荣和市民文化生活的丰富。'
      topic: 瓦子
      type: concept
      page: 55
  - title: 第13课 宋元时期的科技与中外交通
    items:
    - text: 北宋时，毕昇发明了活字印刷术，他用胶泥刻字，然后用火烧制，使字模变硬，制版时，在一块四周有框的铁板上撒上松脂、石蜡和纸灰等，将烧制好的字模在铁板上排成版，用火将铁板中的松脂熔化，将字版压平，这样就可以印书了。
      topic: 活字印刷术
      type: textbook
      page: 59
    - text: 战国时人们做成指南工具"司南"，宋代开始用人造磁铁制成指南的工具，后来人们把这种有磁性的钢针安置在刻有度数的盘中，于是就制成了罗盘；北宋末年，中国的海船上开始使用指南针，乘坐中国海船的阿拉伯商人将指南针传到阿拉伯国家，后来又传到欧洲，大大促进了世界远洋航海技术的发展。
      topic: 指南针
      type: textbook
      page: 60
    - text: 唐朝时，中国人已经发明了火药，唐朝末年，火药开始运用到军事领域；宋元时期，火药武器广泛用于战争，当时人们主要利用火药的特性，制成爆炸性武器，或者用来制成管形火器；中国的火药和烟火在13世纪传入阿拉伯地区，14世纪初又经阿拉伯人传到了欧洲。
      topic: 火药
      type: textbook
      page: 61
    - text: 沈括在《梦溪笔谈》中记载了毕昇发明的活字印刷术，这是关于活字印刷术的最早记载。
      topic: 梦溪笔谈
      type: primary
      page: 59
    - text: 宋元时期造船和航海技术有了较大的发展，中国的航海家除了使用指南针外，也初步掌握了潮汛、信风、气象的规律，当时海上交通发达，海外贸易繁荣。
      topic: 中外交通
      type: textbook
      page: 62
    - text: '"四大发明"是指中国古代的造纸术、印刷术、指南针和火药，其中印刷术、指南针和火药在宋元时期得到重大发展和广泛应用，对世界文明发展产生了深远影响。'
      topic: 四大发明
      type: concept
      page: 59
- title: 第三单元 明清时期：统一多民族国家的巩固与发展
  lessons:
  - title: 第14课 明朝的统治
    items:
    - text: 1368年，朱元璋称帝，建立明朝，定都应天府，他就是明太祖；随后明军攻占元大都，结束了元朝对全国的统治。
      topic: 明朝建立
      type: textbook
      page: 66
    - text: 在地方，朱元璋取消行中书省，设立"三司"，将原来行中书省的权力一分为三，互不统属，从而使行省的权力分散；在中央，朱元璋为进一步集中权力，废除了以往长期存在的丞相制度和中书省，提升吏、户、礼、兵、刑、工六部的职权，并使六部直接向皇帝负责。
      topic: 废丞相设三司
      type: textbook
      page: 67
    - text: 为监视官民，朱元璋设立了由皇帝直接指挥的锦衣卫，掌管侍卫、缉捕、刑狱诸事，保护皇帝，镇压官民；后来明成祖又成立了同类机构东厂，这两个机构合称"厂卫"，成为皇帝的耳目和爪牙。
      topic: 厂卫制度
      type: textbook
      page: 68
    - text: 明朝提倡尊孔崇儒，明朝严格规定考试的题目必须来自"四书""五经"，考生对题目的解释，必须是以朱熹的《四书集注》为标准，不得自己随意发挥；明朝科举对考试答卷的文体格式、段落划分，都有严格的规定，要求答卷由八个部分组成，其中后四个部分为主体，每部分要有两股对仗的文字，因此称为"八股文"。
      topic: 八股取士
      type: textbook
      page: 68
    - text: 八股文内容空疏，形式呆板，又脱离实际，禁锢思想，应试的人为了能够被录取，只有死读"四书""五经"，成为皇帝旨意的顺从者。
      topic: 八股取士影响
      type: textbook
      page: 68
    - text: '"八股取士"是明朝科举考试的一种文体格式，要求答卷由破题、承题、起讲、入手、起股、中股、后股、束股八个部分组成，后四个部分为主体，每部分要有两股对仗的文字，这种形式禁锢了知识分子的思想。'
      topic: 八股文
      type: concept
      page: 68
  - title: 第15课 明朝的对外关系
    items:
    - text: 1405年到1433年，郑和率船队7次下"西洋"，规模之浩大，在世界历史上前所未有；郑和的船队先后到达亚洲和非洲的30多个国家和地区，最远到达非洲东海岸和红海沿岸。
      topic: 郑和下西洋
      type: textbook
      page: 70
    - text: 郑和所率的船队，满载着中国的优质丝绸、精美瓷器、上等茶叶和漆器等各类物品，以及大量的金银货币，这些物品有的用于慷慨送礼，展现大国风度，发展相互之间的友好关系，有的用于贸易，互通有无，互补互利。
      topic: 郑和船队
      type: textbook
      page: 71
    - text: 郑和的远航，时间之长，规模之大，堪称世界航海史上的空前壮举，不仅增进了中国与亚非国家和地区的相互了解和友好往来，而且开创了西太平洋与印度洋之间的亚非海上交通线，为人类的航海事业作出了伟大贡献。
      topic: 郑和下西洋意义
      type: textbook
      page: 71
    - text: 明朝中期，随着日本国内社会动荡加剧，特别是由于明朝国力减弱，海防松懈，倭寇与中国海盗、奸商等相互勾结，对中国沿海的武装抢劫日益猖獗，所到之处杀居民，劫财货，无恶不作，沿海各地遭到重大破坏，时称"倭患"。
      topic: 倭患
      type: textbook
      page: 72
    - text: 戚继光率领"戚家军"抗击倭寇，在台州九战九捷，平定了浙东地区的倭患，此后戚继光又率军进入福建、广东地区，与其他抗倭将领一起带领广大军民与倭寇激战，先后消灭了两地的倭寇，使东南沿海的倭患基本解除。
      topic: 戚继光抗倭
      type: textbook
      page: 72
    - text: '"西洋"在明朝时期是指今文莱以西的东南亚和印度洋沿岸地区，郑和下西洋的壮举展示了明朝强大的国力和先进的航海技术。'
      topic: 西洋
      type: concept
      page: 70
  - title: 第16课 明朝的科技、建筑与文学
    items:
    - text: 李时珍是明代杰出的医药学家，他编写出《本草纲目》这部规模空前的药物学著作，全书约190万字，记载了药物1800多种，其中新增药物374种，对各种药物进行了新的分类，这部巨著总结了我国古代药物学成就，丰富了我国医药学宝库，在世界医药史上占有重要的地位。
      topic: 本草纲目
      type: textbook
      page: 76
    - text: 宋应星编写的《天工开物》是一部科技巨著，这部书的内容非常丰富，把各生产部门分为18类，几乎涵盖了当时中国农业和手工业的所有生产、加工部门，宋应星在具体介绍各种物品、生产工具及生产流程时，还绘有120多幅插图，画面直观生动，描绘了生产过程和各行业劳动人民的形象。
      topic: 天工开物
      type: textbook
      page: 77
    - text: 徐光启编写的《农政全书》是有关国计民生的科技名著，全书60卷，约70万字，分为农本、田制、农事、水利、农器、树艺、蚕桑、种植、牧养等大类，全面总结了我国古代农业生产的先进经验、技术革新和作者关于农学的创新研究成果。
      topic: 农政全书
      type: textbook
      page: 77
    - text: 明朝北京城有宫城、皇城、内城和外城，宫城即紫禁城，是北京城的核心，整个北京城平面呈"凸"字形，由一条中轴线纵贯南北，从宫城到外城都以这条中轴线对称展开，均衡布局，形成了完整而和谐的巨大建筑群。
      topic: 北京城
      type: textbook
      page: 78
    - text: 明长城东起鸭绿江边、西至嘉峪关，总长万余里，以城墙为主体，由关隘、城台、烽火台等组成，沿线设立卫所，驻守军队，开展屯田，进行生产，并修建了相连的道路，形成为一个完整的军事防御体系。
      topic: 明长城
      type: textbook
      page: 79
    - text: 《天工开物》被外国学者誉为"中国17世纪的工艺百科全书"，它详细记载了中国古代农业和手工业的生产技术，是研究明代科技的重要文献。
      topic: 天工开物评价
      type: concept
      page: 77
  - title: 第17课 明朝的灭亡
    items:
    - text: 明朝中后期，政治日益腐败，皇帝多沉迷享乐，疏于朝政，皇室内部又纷争不已，大臣们结党营私，争权夺利；朝政的混乱造成中央对社会的控制力不断下降，法纪松弛，各级官吏贪赃枉法，对民众百般盘剥。
      topic: 政治腐败
      type: textbook
      page: 84
    - text: 明朝末年，政治腐败越发严重，国家财政危机深重，朝廷不断加派赋税，民众不堪重负，怨声载道，阶级矛盾异常尖锐；当时陕西北部一带连年大旱，庄稼颗粒无收，饥民遍野，官府不顾民众死活，催征如故，灾难深重的广大农民再也无法忍受下去，纷纷举行起义，反抗朝廷的统治。
      topic: 农民起义背景
      type: textbook
      page: 84
    - text: 李自成率领农民起义军进入中原以后，提出"均田免赋"的口号，得到广大农民的热烈拥护，队伍很快发展到100多万人；1643年，李自成率军攻入西安，建立政权，国号大顺。
      topic: 李自成起义
      type: textbook
      page: 85
    - text: 1644年4月，百万大军在李自成的统一指挥下，对北京城发起猛烈进攻，不到两天就攻进城内，明朝末帝崇祯在绝望中自缢，统治长达276年的明王朝，最终被农民起义推翻了。
      topic: 明朝灭亡
      type: textbook
      page: 85
    - text: 明朝灭亡以后，正当李自成力图推进全国统一的时候，驻守重镇山海关的明军将领吴三桂降清，引清兵入关，并与清军联合夹击李自成的军队，李自成在山海关交战失利，退回北京，随即离京西行，转战各地，最后失败。
      topic: 清军入关
      type: textbook
      page: 86
    - text: '"均田免赋"是李自成农民起义军提出的口号，"均田"即平均分配土地，"免赋"即免除赋税，这一口号反映了广大农民对土地的渴望和减轻负担的要求，具有鲜明的反封建性质。'
      topic: 均田免赋
      type: concept
      page: 85
  - title: 第18课 统一多民族国家的巩固和发展
    items:
    - text: 清朝统治者进入北京后，以北京为都城，清军随后南下，消灭了明朝政权的残余势力和各地反清的力量，逐步建立起对全国的统治；在此后的统治中，清朝在政治制度方面基本上沿袭中原历代王朝的做法，进一步加强中央集权，维护政治上的大一统。
      topic: 清朝建立
      type: textbook
      page: 88
    - text: 1662年，郑成功从荷兰殖民者手中收复台湾，被荷兰侵略者占据了38年的台湾，重新回到祖国的怀抱，郑成功是我国历史上的民族英雄。
      topic: 郑成功收复台湾
      type: textbook
      page: 89
    - text: 1683年，清军两万人进攻台湾，郑氏军队战败，台湾归入清朝的版图；1684年，清朝设置台湾府，隶属福建省，台湾府的设置，加强了中央政府对台湾的管辖，巩固了祖国的东南海防，台湾的社会经济发展也步入了新的历史时期。
      topic: 台湾府设置
      type: textbook
      page: 89
    - text: 郑成功在致荷兰总督的招降书中说："台湾者，中国之土地也，久为贵国所踞，今余既来索，则地当归我。"
      topic: 郑成功书信
      type: primary
      page: 89
    - text: 清朝对西藏地区的有效管辖：顺治帝赐予五世达赖"达赖喇嘛"的封号，康熙帝册封五世班禅为"班禅额尔德尼"，此后历代达赖和班禅都必须经过中央政府的册封；1727年，清朝开始在西藏设置驻藏大臣，监督西藏地方政务。
      topic: 管辖西藏
      type: textbook
      page: 90
    - text: 清朝对新疆地区的管辖：康熙帝三次率军亲征，平定噶尔丹叛乱，稳定了西北部边疆地区；乾隆帝平定大小和卓叛乱，设置伊犁将军，管辖包括巴勒喀什池在内的整个新疆地区，清军驻扎新疆各地，设置哨所，加强了对西北地区的管辖。
      topic: 管辖新疆
      type: textbook
      page: 91
  - title: 第19课 清朝前期社会经济的发展
    items:
    - text: 清初的统治者认识到恢复经济，尤其是恢复和发展农业生产，是"国之大计"，顺治、康熙、雍正、乾隆诸位帝王，都十分重视农业生产，大力推行垦荒政策，使农业生产很快得到恢复，并有了较大的发展，为清朝前期的兴盛奠定了基础。
      topic: 农业恢复
      type: textbook
      page: 96
    - text: 清朝前期，耕地面积不断扩大，大片荒芜的土地得到开垦，许多荒山旷野改造成农田，边远地区也得到了开发；在水利兴修方面，对黄河、淮河等大河以及大运河进行治理，还组织人力修建了许多堤坝、渠堰、海塘。
      topic: 农业发展
      type: textbook
      page: 96
    - text: 清朝前期，丝织业、棉织业、印染业、矿冶业、制瓷业、制糖业、制茶业等手工业都有很大的发展，尤其是丝织、棉织、印染、制瓷等方面，品种繁多，产品精良。
      topic: 手工业发展
      type: textbook
      page: 97
    - text: 清朝前期的商业很发达，陆路和水路的商旅往来频繁，各地的商品贸易十分兴盛，形成了由农村集市、城镇市场、区域性市场和全国性市场组成的商业网；一些农村地区发展为工商业市镇，有的地方居民超过万户，比县城的规模还大。
      topic: 商业繁荣
      type: textbook
      page: 97
    - text: 乾隆、嘉庆时期，北京西北的圆明园周围，出现了一些繁华的商业街市，被称为"买卖街"，这些商业活动的繁荣，反映了清朝前期社会经济的发展。
      topic: 商业市镇
      type: textbook
      page: 98
    - text: '"康乾盛世"是指清朝康熙、雍正、乾隆三位皇帝统治时期出现的盛世局面，这一时期国家统一，社会安定，经济繁荣，人口增长，是清朝的鼎盛时期。'
      topic: 康乾盛世
      type: concept
      page: 96
  - title: 第20课 清朝君主专制的强化
    items:
    - text: 清朝初期，还保留着专门由满洲贵族组成的议政王大臣会议，一切军国大事都要经过议政王大臣会议讨论，而且一旦作出决定，连皇帝也不能改变；到康熙时，为了抑制满族贵族的一些权力，加强君主专制，设立了南书房，直接为皇帝草拟谕旨和处理奏章，从而绕开议政王大臣会议。
      topic: 议政王大臣会议
      type: textbook
      page: 101
    - text: 雍正年间，朝廷临时设立军机房，处理西北军务，不久改名军机处，成为常设机构，由皇帝选派亲信大臣组成；军机处是辅助皇帝处理政务的最重要的中枢机构，军政大事完全由皇帝裁决，军机大臣照皇帝的旨意拟写成文，经皇帝审阅同意后传达给中央各部和地方机构去执行。
      topic: 军机处
      type: textbook
      page: 101
    - text: 军机处的设立，便于皇帝独断朝政，使皇帝具有至高无上的权威，一切都要服从皇帝的意志，从而使君主专制进一步强化。
      topic: 军机处影响
      type: textbook
      page: 102
    - text: 康熙、雍正和乾隆三朝，经常从知识分子的文章、诗词中摘取只言片语，加以歪曲解释，再借题发挥，罗织罪状，制造了大批冤狱，很多人因此被处死，连亲属、师友都受到迫害，人们把这种做法称为"文字狱"。
      topic: 文字狱
      type: textbook
      page: 102
    - text: 清朝统治者认为天朝物产丰富，无所不有，不需要同外国进行经济交流；当时西方的殖民者正向东方扩展势力，清朝统治者担心国家领土主权受到侵犯，又惧怕沿海人民同外国人交往，会危及自己的统治，于是实行"闭关锁国"政策，严格限制对外贸易。
      topic: 闭关锁国
      type: textbook
      page: 103
    - text: '"闭关锁国"是清朝实行的一种对外政策，指严格限制对外贸易和对外交往，只开放广州一处作为对外通商口岸，并规定由朝廷特许的"广州十三行"统一经营对外贸易，这一政策使中国逐渐落伍于世界历史的发展进程。'
      topic: 闭关锁国政策
      type: concept
      page: 103
  - title: 第21课 清朝前期的文学艺术
    items:
    - text: 清朝的小说创作取得了空前的成就，其中艺术成就最高、影响最深远的是曹雪芹的《红楼梦》，这部长篇小说初名《石头记》，曹雪芹以毕生的精力进行艰苦的创作，生前基本定稿了前80回，后来经高鹗整理续写了后40回，题名《红楼梦》，在乾隆晚期时排印面世。
      topic: 红楼梦
      type: textbook
      page: 107
    - text: 《红楼梦》以贵族青年贾宝玉与林黛玉的爱情悲剧故事为主线，通过贾、史、王、薛四大家族的兴衰变化，深刻地反映了封建社会末期的社会现实和尖锐矛盾，揭露了统治阶级的奢靡与丑陋，从而揭示了封建社会走向衰亡的历史命运。
      topic: 红楼梦内容
      type: textbook
      page: 107
    - text: 《红楼梦》思想性强、艺术性高，至今已被译成多种文字，成为世界文化宝库中不可多得的文学名著。
      topic: 红楼梦影响
      type: textbook
      page: 108
    - text: 昆曲，又称昆剧、昆腔，原是流行于苏州昆山一带的昆山腔，明朝时经过改良，昆曲有了很大的发展，表演艺术日趋成熟，成为一个全国性的剧种，代表作有汤显祖创作的《牡丹亭》。
      topic: 昆曲
      type: textbook
      page: 108
    - text: 清朝中期以后，昆曲逐步陷入因循守旧的境地，上演的剧目也多是逃避现实或歌功颂德的庸俗作品，为宫廷和贵族所观赏，成为统治阶级和社会上层的玩物，由于脱离广大民众和现实生活，昆曲逐渐走向衰落。
      topic: 昆曲衰落
      type: textbook
      page: 109
    - text: 京剧的形成：1790年，乾隆皇帝80岁寿辰时，由徽商出面组织的来自南方的四大徽班先后到北京献艺，徽班的唱词通俗易懂，唱调高亢爽朗，赢得观众喜爱，一时誉满京城；后来徽调不断吸收昆曲、秦腔、京调、汉调等地方戏的优点，加以创造和改进，在道光年间逐渐形成为一个新的剧种"皮黄戏"，以后就被称为"京戏"或"京剧"。
      topic: 京剧形成
      type: textbook
      page: 109
