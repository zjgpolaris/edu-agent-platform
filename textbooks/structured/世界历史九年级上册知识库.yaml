grade: 九年级上
book: 世界历史九年级上册（人教版）
units:
- title: 第一单元 古代亚非文明
  lessons:
  - title: 第1课 古代埃及
    items:
    - text: 古代埃及文明兴起于非洲东北部的尼罗河流域，尼罗河定期泛滥为农业生产提供了肥沃的土壤和灌溉水源，古埃及文明因此被称为"尼罗河的赠礼"。
      topic: 尼罗河文明
      type: textbook
      page: 2
    - text: 约公元前3100年，美尼斯初步统一埃及，建立了古埃及历史上第一个统一王朝，此后埃及经历了早王朝、古王国、中王国、新王国等时期。
      topic: 埃及统一
      type: textbook
      page: 3
    - text: 金字塔是古埃及法老的陵墓，是古埃及文明的象征，其中胡夫金字塔是古埃及最大的金字塔，体现了古埃及国王的无限权力和劳动人民的智慧。
      topic: 金字塔
      type: textbook
      page: 4
    - text: 法老是古埃及国王的尊称，作为全国最高的统治者，集军、政、财、神等大权于一身，在宗教上被认为是"神之子"，具有至高无上的权威。
      topic: 法老专制
      type: textbook
      page: 5
    - text: 古埃及人发明了太阳历，将一年分为12个月，每月30天，年终加5天，共365天，这是人类历史上第一部太阳历；他们还发明了象形文字，用纸莎草书写。
      topic: 古埃及文明成就
      type: textbook
      page: 6
    - text: '"尼罗河是埃及的母亲河"，这一表述体现了尼罗河对古埃及文明形成与发展的决定性作用，尼罗河的定期泛滥塑造了古埃及的农业社会和政治文明。'
      topic: 尼罗河与文明
      type: primary
      page: 2
  - title: 第2课 古代两河流域
    items:
    - text: 古代两河流域文明兴起于西亚的幼发拉底河和底格里斯河流域，又称"美索不达米亚"，意为"两河之间的土地"，大体上位于今天的伊拉克境内。
      topic: 两河流域
      type: textbook
      page: 7
    - text: 约公元前18世纪，古巴比伦王国国王汉谟拉比统一了两河流域中下游地区，建立了统一、强大的奴隶制国家，实行中央集权统治。
      topic: 汉谟拉比统一
      type: textbook
      page: 8
    - text: 《汉谟拉比法典》是迄今已知世界上第一部较为完整的成文法典，刻在黑色石柱上，除前言外共有282条，内容涵盖诉讼、财产、婚姻、继承、奴隶等方面，维护了奴隶主阶级的利益。
      topic: 汉谟拉比法典
      type: textbook
      page: 9
    - text: 两河流域的苏美尔人发明了楔形文字，用削尖的芦苇杆在泥板上刻写，因笔画呈楔形而得名；他们还发明了60进位制，用于计算时间和圆周。
      topic: 楔形文字
      type: textbook
      page: 10
    - text: '"安努与恩利尔为人类福祉计，命令我，荣耀而畏神的君主，汉谟拉比，发扬正义于世，灭除不法邪恶之人，使强不凌弱，使我有如沙马什，昭临黔首，光耀大地。"——《汉谟拉比法典》前言'
      topic: 法典前言
      type: primary
      page: 9
    - text: '"成文法典"是指由国家制定并以文字形式公布的法律典籍，区别于习惯法，标志着法律从口头传统向文字记载的飞跃，是人类法治文明的重要里程碑。'
      topic: 成文法典
      type: concept
      page: 9
  - title: 第3课 古代印度
    items:
    - text: 古代印度文明最早出现于印度河流域，哈拉帕和摩亨佐·达罗是早期文明的代表性城市遗址，约公元前1500年左右，雅利安人侵入印度并建立国家。
      topic: 印度河流域
      type: textbook
      page: 11
    - text: 雅利安人进入印度后，逐渐建立了严格的社会等级制度，即"种姓制度"，将社会成员分为婆罗门、刹帝利、吠舍、首陀罗四个等级，各等级之间贵贱分明，世代相袭。
      topic: 种姓制度
      type: textbook
      page: 12
    - text: 种姓制度中，婆罗门掌管祭祀，刹帝利掌管军事和行政权力，吠舍从事农业、畜牧业和商业，首陀罗主要由被征服居民构成，从事农业、畜牧业、捕鱼业和手工业，为前三个等级服务。
      topic: 种姓等级
      type: textbook
      page: 13
    - text: 公元前6世纪，乔达摩·悉达多创立佛教，他被称为"释迦牟尼"，佛教宣扬"众生平等"，反对婆罗门的特权地位，认为人的生老病死皆为苦，苦的根源在于欲望，消灭欲望必须忍耐顺从。
      topic: 佛教创立
      type: textbook
      page: 14
    - text: 公元前3世纪，阿育王在位时，佛教开始向外传播，向北传入中国、朝鲜、日本等地，向南传入斯里兰卡、缅甸、泰国等地，成为世界性宗教。
      topic: 佛教传播
      type: textbook
      page: 15
    - text: '"众生平等"是佛教的核心教义之一，主张一切生命在佛性面前具有平等地位，这一思想在反对婆罗门等级特权方面具有积极意义，但佛教所倡导的忍耐顺从也起到了维护社会稳定的作用。'
      topic: 众生平等
      type: primary
      page: 14
- title: 第二单元 古代欧洲文明
  lessons:
  - title: 第4课 希腊城邦和亚历山大帝国
    items:
    - text: 古代希腊地理范围包括希腊半岛、爱琴海诸岛、小亚细亚半岛西岸等地区，希腊海岸线曲折，港湾众多，岛屿密布，适宜航海业和海外贸易的发展。
      topic: 希腊地理环境
      type: textbook
      page: 16
    - text: 公元前8世纪，希腊出现了城邦国家，城邦一般以一个城市或市镇为中心，把周围的农村联合起来，组成一个小国，其中斯巴达和雅典是最著名的城邦。
      topic: 希腊城邦
      type: textbook
      page: 17
    - text: 公元前5世纪中后期，伯里克利主政时期，雅典达到全盛，奴隶制民主政治发展到高峰，公民大会是最高权力机构，全体成年男性公民可以参加，决定内政、外交、战争等重大问题。
      topic: 雅典民主政治
      type: textbook
      page: 18
    - text: 公元前334年，马其顿国王亚历山大开始东征，历经10年，灭亡波斯帝国，建立了地跨欧、亚、非三洲的大帝国，促进了东西方文化的大交汇，开启了希腊化时代。
      topic: 亚历山大东征
      type: textbook
      page: 19
    - text: '"我们的制度之所以被称为民主政治，是因为政权是在全体公民手中，而不是在少数人手中。"——伯里克利在阵亡将士葬礼上的演说'
      topic: 伯里克利演说
      type: primary
      page: 18
    - text: '"城邦"是古希腊特有的国家形态，以城市为中心，包括周边乡村，具有小国寡民的特点，公民直接参与国家管理，是西方民主政治的发源地。'
      topic: 城邦
      type: concept
      page: 17
  - title: 第5课 罗马城邦和罗马帝国
    items:
    - text: 公元前1000年左右，罗马城邦从意大利半岛中部的台伯河畔兴起，公元前509年，罗马建立了共和国，国家统治的决策权掌握在由300名贵族组成的元老院手里。
      topic: 罗马共和国
      type: textbook
      page: 20
    - text: 公元前2世纪，罗马成为整个地中海地区的霸主，通过三次布匿战争击败迦太基，通过马其顿战争征服希腊，通过叙利亚战争控制小亚细亚，建立了庞大的地中海帝国。
      topic: 罗马扩张
      type: textbook
      page: 21
    - text: 公元前27年，屋大维首创"元首制"，掌握了最高统治实权，罗马共和国演变为罗马帝国，屋大维采取许多措施解决矛盾，巩固自己的独尊地位，罗马帝国进入了和平发展的时代。
      topic: 罗马帝国建立
      type: textbook
      page: 22
    - text: 2世纪，罗马帝国进入黄金时期，帝国版图横跨欧、亚、非三洲，地中海成为罗马帝国的内湖，帝国境内农业、手工业和商业繁荣，交通发达，城市兴起。
      topic: 罗马帝国鼎盛
      type: textbook
      page: 23
    - text: 罗马法从习惯法发展到成文法，公元前450年左右颁布的《十二铜表法》是罗马第一部成文法，涉及诉讼程序、所有权和债务权、宗教法等内容，使量刑定罪有了文字依据，是罗马法发展的重要里程碑。
      topic: 罗马法
      type: textbook
      page: 24
    - text: '"罗马曾经三次征服世界：第一次以武力，第二次以宗教，第三次以法律。"——德国法学家耶林'
      topic: 罗马法影响
      type: primary
      page: 24
  - title: 第6课 希腊罗马古典文化
    items:
    - text: 希腊神话影响广泛，特点是"神人同形同性"，即神具有人的形态和情感；希腊文学的代表是《荷马史诗》，包括《伊利亚特》和《奥德赛》，是宝贵的文学遗产，也是了解早期希腊社会的主要文献。
      topic: 希腊文学
      type: textbook
      page: 25
    - text: 古希腊雕塑艺术达到很高水平，代表作品有《掷铁饼者》《米罗的维纳斯》等；帕特农神庙是希腊建筑艺术的典型代表，四周以廊柱环绕，柱身有粗有细，具有庄重和谐之美。
      topic: 希腊艺术
      type: textbook
      page: 26
    - text: 古希腊哲学成就突出，德谟克利特提出了"原子论"，认为宇宙万物是由微小的原子组成的；苏格拉底主张"认识你自己"，探讨人的灵魂、美德和幸福等问题；亚里士多德是一位百科全书式的学者，创立了逻辑学等学科。
      topic: 希腊哲学
      type: textbook
      page: 27
    - text: 罗马建筑吸收了希腊建筑的特点，并有所创新，如石拱门、穹顶等，既坚固结实，又华丽宏伟，代表性建筑有大竞技场、万神庙、凯旋门等。
      topic: 罗马建筑
      type: textbook
      page: 28
    - text: 1世纪，基督教产生于罗马帝国统治下的巴勒斯坦地区，创始人是耶稣，基督教宣扬上帝是宇宙的最高主宰，耶稣是救世主，教导人们忍受苦难，死后可以升入天堂。
      topic: 基督教兴起
      type: textbook
      page: 29
    - text: '"吾爱吾师，吾更爱真理"——亚里士多德，这句话体现了古希腊学者追求真理、独立思考的精神，亚里士多德虽然师从柏拉图，但并不盲从，敢于提出自己的见解。'
      topic: 亚里士多德
      type: primary
      page: 27
- title: 第三单元 封建时代的欧洲
  lessons:
  - title: 第7课 基督教的兴起和法兰克王国
    items:
    - text: 4世纪末，罗马皇帝将基督教确定为国教，促进了基督教的传播，基督教逐渐成为欧洲占统治地位的宗教，对欧洲的政治、经济、文化产生了深远影响。
      topic: 基督教国教化
      type: textbook
      page: 30
    - text: 481年，克洛维建立法兰克王国，他皈依基督教，承认罗马教会在欧洲的重要地位，得到了教会和信仰基督教的高卢罗马人的支持，法兰克王国不断扩张，版图延伸到高卢南部地区。
      topic: 法兰克王国
      type: textbook
      page: 31
    - text: 8世纪前期，法兰克王国对土地分封形式进行改革，不再像以前那样无偿地赏赐土地，而是要求得到封地的人必须提供兵役服务，赐地的人成为封君，接受封地的人成为封臣，形成了封君封臣制度。
      topic: 封君封臣制度
      type: textbook
      page: 32
    - text: 封君与封臣的关系有着严格的等级性，而且权利、义务交织在一起，有一定的契约意义，封臣对封君要忠诚，在封君需要时无偿服兵役，封君对封臣也有义务，不能任意侵害封臣的荣誉、人身和财产安全。
      topic: 封君封臣关系
      type: textbook
      page: 33
    - text: 800年，教皇在罗马为查理举行加冕礼，称查理为"罗马人的皇帝"，查理被称为"查理大帝"或"查理曼"，他统治时期的法兰克王国，史称"查理曼帝国"。
      topic: 查理曼加冕
      type: textbook
      page: 34
    - text: '"我的封臣的封臣，不是我的封臣"，这一表述体现了西欧封建等级制度的特点，封君封臣关系只存在于直接分封的双方之间，不同等级的贵族之间没有严格的上下级制约关系。'
      topic: 封建等级
      type: primary
      page: 33
  - title: 第8课 西欧庄园
    items:
    - text: 从9世纪开始，西欧庄园逐渐流行开来，大约到11世纪，庄园遍布欧洲各地，庄园是西欧中世纪乡村的基本社会组织形式，是一个独立的自给自足的经济和政治单位。
      topic: 西欧庄园
      type: textbook
      page: 35
    - text: 庄园的土地分为两部分，一部分由领主自己保留，直接经营，称为"直领地"，收入全部归领主所有；剩下的耕地是佃户的"份地"，是佃户的生活来源，佃户取得份地的条件是义务耕种领主的直领地。
      topic: 庄园土地
      type: textbook
      page: 36
    - text: 庄园的居民均为领主的佃户，包括自由的农民和缺少自由的农奴，农奴是庄园中的主要劳动者，他们被束缚在土地上，不能随意离开庄园，需要为领主服劳役，缴纳租税。
      topic: 农奴制度
      type: textbook
      page: 37
    - text: 庄园具有司法权，设有庄园法庭，主持法庭的是领主或其管家，庄园法庭既维护了领主的利益，也在一定程度上限制了领主的特权，佃户可以利用法庭维护自己的权益。
      topic: 庄园法庭
      type: textbook
      page: 38
    - text: '"庄园是西欧中世纪社会的基础"，这一表述说明了庄园在中世纪西欧社会中的核心地位，它不仅是一个经济生产单位，也是基层社会治理和司法审判的场所。'
      topic: 庄园地位
      type: primary
      page: 35
    - text: '"自给自足"是指生产的目的主要是满足生产者自身的需要，而不是为了交换，西欧庄园具有自给自足的特点，庄园内生产大部分生活和生产所需物品，很少与外界进行商品交换。'
      topic: 自给自足
      type: concept
      page: 35
  - title: 第9课 中世纪城市和大学的兴起
    items:
    - text: 从10世纪起，西欧城市开始复苏，以手工业和商业为中心的城市发展更快，意大利、法兰西、英格兰、德意志等国家和地区都出现了许多著名的城市，如威尼斯、巴黎、伦敦等。
      topic: 城市复苏
      type: textbook
      page: 39
    - text: 城市居民采取各种方式反抗封建领主的控制，争取城市的自由和自治，常用的手段包括金钱赎买和武力斗争，到13世纪，许多城市取得了一定程度的自由与特权，成为自由城市。
      topic: 城市自治
      type: textbook
      page: 40
    - text: 随着城市的发展和工商业的繁荣，市民阶级逐渐形成，城市手工业者和商人不断分化，出现了富裕的大手工业作坊主、商人和银行家等，他们成为早期的资产阶级，为资本主义的兴起准备了条件。
      topic: 市民阶级
      type: textbook
      page: 41
    - text: 12世纪，西欧的教育与学术出现了新的气象，大学的兴起被认为是欧洲中世纪教育"最美好的花朵"，巴黎大学、牛津大学、剑桥大学等著名大学都是在这一时期建立的。
      topic: 大学兴起
      type: textbook
      page: 42
    - text: 大学拥有自治地位，主要体现在免赋税特权、司法特权、教育自主权等方面，大学课程设置一方面仍受基督教会的影响，另一方面也反映了经济和社会发展的要求，包括文法、修辞、逻辑、算术、几何、天文和音乐等。
      topic: 大学自治
      type: textbook
      page: 43
    - text: '"城市的空气使人自由"，这是一句中世纪西欧的谚语，反映了城市相对于封建庄园的自由氛围，农奴在城市住满一年零一天，就可以获得自由身份，这一惯例吸引了大量农奴逃往城市。'
      topic: 城市自由
      type: primary
      page: 40
  - title: 第10课 拜占庭帝国和《查士丁尼法典》
    items:
    - text: 395年，罗马帝国分裂为东西两部分，东罗马帝国定都君士坦丁堡，君士坦丁堡原称拜占庭，因此东罗马帝国又称拜占庭帝国，其版图涵盖了希腊以及亚洲西部和非洲北部地区。
      topic: 拜占庭帝国
      type: textbook
      page: 44
    - text: 527年，查士丁尼继任为东罗马帝国皇帝，他组建了一个法典编纂委员会，把自2世纪初以来历任罗马皇帝颁布的法令收集在一起，剔除其中相互矛盾的条例，编成《查士丁尼法典》。
      topic: 查士丁尼法典
      type: textbook
      page: 45
    - text: 法典编纂委员会还编成了《法学汇纂》《法理概要》《新法典》，以上四部法律文献统称为《罗马民法大全》，奠定了欧洲民法的基础，对后世法律制度产生了深远影响。
      topic: 罗马民法大全
      type: textbook
      page: 46
    - text: 拜占庭帝国保存了大量的希腊、罗马古籍，为后来西欧的文艺复兴提供了丰富的精神营养；拜占庭文化对东欧文化，特别是俄罗斯文化产生了重要影响，圣索菲亚大教堂是拜占庭建筑艺术的杰作。
      topic: 拜占庭文化
      type: textbook
      page: 47
    - text: 1453年，奥斯曼帝国攻破君士坦丁堡，拜占庭帝国最终灭亡，君士坦丁堡改名为伊斯坦布尔，成为奥斯曼帝国的首都，拜占庭帝国的灭亡标志着中世纪在东欧的结束。
      topic: 拜占庭灭亡
      type: textbook
      page: 48
    - text: '"皇帝的威严、光荣不但依靠兵器，而且须用法律来巩固，这样，无论在战时或平时，总是可以将国家治理得很好。"——查士丁尼'
      topic: 查士丁尼治国
      type: primary
      page: 45
- title: 第四单元 封建时代的亚洲国家
  lessons:
  - title: 第11课 古代日本
    items:
    - text: 1-2世纪，日本有100多个小国，5世纪，大和政权基本统一了日本，大和国的最高统治者称为"大王"，依靠贵族统治全国，王室和贵族各有自己的私有领地，领地上的居民以"部"的形式组织生产。
      topic: 大和政权
      type: textbook
      page: 49
    - text: 6-9世纪，日本积极吸收中国文化，中国文化直接影响着日本，推动日本进行改革，从646年开始，日本仿效唐朝的典章制度，进行了一系列改革，史称"大化改新"。
      topic: 大化改新
      type: textbook
      page: 50
    - text: 大化改新的主要内容有：政治上，建立以天皇为中心的中央集权制度，地方设国、郡、里三级，由中央派官治理；经济上，废除一切私地、私民，将土地、部民收归国有，国家将土地分给公民，每隔六年授田一次，统一赋税。
      topic: 大化改新内容
      type: textbook
      page: 51
    - text: 大化改新使日本发展成为一个中央集权制的封建国家，是日本从奴隶社会向封建社会过渡的标志，大化改新百余年后，土地私有与土地兼并盛行，庄园形成，武士集团崛起。
      topic: 大化改新影响
      type: textbook
      page: 52
    - text: 12世纪晚期，源氏武士集团击败平氏武士集团，源赖朝获得"征夷大将军"称号，设幕府于镰仓，镰仓幕府拥有独立于朝廷的政治、军事权力，日本由此进入近700年的幕府统治时期。
      topic: 幕府统治
      type: textbook
      page: 53
    - text: '"大化"取自《周易》"大化流衍，生生不息"，意为伟大的教化，日本以"大化"为年号，体现了对中国儒家文化的尊崇，大化改新是日本主动学习中国先进制度的典型事例。'
      topic: 大化年号
      type: primary
      page: 50
  - title: 第12课 阿拉伯帝国
    items:
    - text: 6世纪末7世纪初，阿拉伯半岛尚未形成统一的国家，各部落之间为争夺水源和牧场相互仇杀，半岛盛行多神崇拜，麦加城因克尔白神庙而成为朝圣中心。
      topic: 阿拉伯半岛
      type: textbook
      page: 54
    - text: 7世纪初，穆罕默德在麦加创立伊斯兰教，他阐述了独尊安拉的宗教思想，于622年率领一些信徒迁居麦地那，建立了穆斯林公社，阿拉伯国家的雏形由此诞生。
      topic: 伊斯兰教创立
      type: textbook
      page: 55
    - text: 630年，穆罕默德率穆斯林占领麦加，此后半岛各部落纷纷遣使麦地那，承认穆罕默德的统治地位，阿拉伯半岛基本统一，632年穆罕默德病逝时，阿拉伯半岛已基本统一。
      topic: 阿拉伯统一
      type: textbook
      page: 56
    - text: 至8世纪中期，阿拉伯帝国版图横跨亚、欧、非三大洲，是当时世界上疆域最大的帝国，阿拉伯人创造了光辉灿烂的阿拉伯文化，在文学、数学、医学、天文学等方面取得了卓越成就。
      topic: 阿拉伯帝国
      type: textbook
      page: 57
    - text: 阿拉伯人改造了古印度人从0到9的计数法，形成了"阿拉伯数字"，并创造了完整的代数学；阿拉伯医学家拉齐斯的《医学集成》和伊本·西那的《医典》长期被欧洲医学界奉为经典。
      topic: 阿拉伯文化
      type: textbook
      page: 58
    - text: '"学问虽远在中国，亦当求之"——穆罕默德，这句话体现了阿拉伯人善于学习、重视知识的传统，阿拉伯帝国成为东西方文化交流的桥梁，中国的造纸术、指南针、火药等重大发明和印度的棉花、食糖等都是由阿拉伯人传入欧洲的。'
      topic: 求知精神
      type: primary
      page: 58
- title: 第五单元 走向近代
  lessons:
  - title: 第13课 西欧经济和社会的发展
    items:
    - text: 11世纪以后，欧洲农村发生了一些新的变化，各地纷纷开展垦殖运动，土地面积逐渐扩大，垦殖者成为这些新开发地区的主人，他们按照自己的方式进行耕种，农奴可以用货币购买劳役豁免权，获得对自己劳动力的自由支配。
      topic: 垦殖运动
      type: textbook
      page: 59
    - text: 14世纪中叶以后，越来越多的领主出租直领地，依靠土地租金生活，不再参与生产管理，一些富裕农民通过承租、购买领主的土地，或者转租、购买其他佃户的地产等方式将土地集中起来，建立租地农场。
      topic: 租地农场
      type: textbook
      page: 60
    - text: 租地农场采用新的生产方式进行经营，雇用少地或无地的农民耕种，并将产品推向市场，农产品的富余，加上城市需求的增加，使得更多的农产品和畜产品得以进入市场。
      topic: 农场经营
      type: textbook
      page: 61
    - text: 13世纪，随着分工细化，小型手工作坊得到发展，农村出现了分散的手工工场，后来商人不仅向工人提供原料，而且还提供统一的生产工具，工人成为完全出卖劳动力的雇佣劳动者，形成了集中的手工工场。
      topic: 手工工场
      type: textbook
      page: 62
    - text: 土地关系的变化和手工业的发展，推动农业和手工业生产组织逐渐资本主义化，开始改变中世纪欧洲社会的整体面貌，富裕农民和市民阶层逐渐成为早期资产阶级。
      topic: 资本主义萌芽
      type: textbook
      page: 63
    - text: '"租地农场主成了这种农业工人的实际指挥官，成了他们的剩余劳动的实际剥削者，而土地所有者现在只和这种租地农场主发生直接关系，而且是单纯的货币关系和契约关系。"——马克思，这一论述深刻揭示了租地农场中资本主义雇佣关系的本质。'
      topic: 租地农场本质
      type: primary
      page: 60
  - title: 第14课 文艺复兴运动
    items:
    - text: 14世纪中叶，意大利的佛罗伦萨、威尼斯等地，工商业已经有了一定的发展，一些城市出现了资本主义萌芽，形成中的资产阶级不满罗马教廷对精神世界的控制，要求建立一种以人为中心的生活哲学。
      topic: 文艺复兴背景
      type: textbook
      page: 64
    - text: 文艺复兴是一场反对教会"神权至上"和提倡人文主义的新文化运动，促进了人们思想的大解放，延续了近300年之久，这场运动采取复兴古代希腊罗马文化的方式，但对古典文化并非简单的"复兴"，有继承更有创新。
      topic: 文艺复兴性质
      type: textbook
      page: 65
    - text: 但丁是文艺复兴的先驱，他的长篇诗作《神曲》分"地狱""炼狱""天堂"三部分，作者借梦游三界描写现实生活中的各色人物，抨击教会的贪婪腐化，表达了市民阶层的情感与理想。
      topic: 但丁
      type: textbook
      page: 66
    - text: 达·芬奇与拉斐尔、米开朗琪罗并称为文艺复兴"美术三杰"，达·芬奇的绘画代表作《蒙娜丽莎》和《最后的晚餐》等，将艺术创作和科学探索结合起来，创作了许多完美生动的人物形象。
      topic: 达·芬奇
      type: textbook
      page: 67
    - text: 15、16世纪，文艺复兴开始向西欧其他国家和地区传播，莎士比亚是文艺复兴时期英国最著名的文学艺术家，一生创作了30多部戏剧和许多脍炙人口的诗篇，代表作有《哈姆雷特》《罗密欧与朱丽叶》等。
      topic: 莎士比亚
      type: textbook
      page: 68
    - text: '"人是多么了不起的一件作品！理想是多么高贵，力量是多么无穷，行动多么像天使，洞察多么像天神！宇宙的精华，万物的灵长！"——莎士比亚《哈姆雷特》'
      topic: 人文主义
      type: primary
      page: 68
  - title: 第15课 探寻新航路
    items:
    - text: 15世纪，欧洲商品经济日趋发达，欧洲人渴求开拓新的贸易市场，意大利人马可·波罗描绘的中国、印度等东方国家，激起了欧洲人对东方的无限想象和向往，奥斯曼帝国控制了东西方贸易的所有重要商道，欧洲人希望寻找通往东方的新航路。
      topic: 新航路开辟背景
      type: textbook
      page: 69
    - text: 1492年，哥伦布受西班牙王室资助，率领船队从西班牙出发，横渡大西洋，到达巴哈马群岛中的圣萨尔瓦多岛，后来又"发现"了古巴和海地，哥伦布始终认为他到达的就是亚洲的印度，称当地居民为"印第安人"。
      topic: 哥伦布航行
      type: textbook
      page: 70
    - text: 1497年，达·伽马从葡萄牙出发，绕过好望角，横渡印度洋，1498年到达印度西海岸，开辟了欧洲通往印度的新航路，获得了丰厚的商业利润。
      topic: 达·伽马
      type: textbook
      page: 71
    - text: 1519-1522年，麦哲伦奉西班牙国王之命，率领船队穿越大西洋、太平洋和印度洋，于1522年返回欧洲，完成了人类历史上首次环球航行，证明了地圆说的正确。
      topic: 麦哲伦环球航行
      type: textbook
      page: 72
    - text: 新航路的开辟，使欧洲大西洋沿岸工商业经济繁荣起来，促进了资本主义的产生和发展，欧洲与亚洲、非洲、美洲之间建立起了直接的商业联系，往来日益密切，世界开始连为一个整体，世界的观念也从此逐步确立起来。
      topic: 新航路影响
      type: textbook
      page: 73
    - text: '"黄金是一切商品中最宝贵的，黄金是财富，谁占有黄金，谁就能获得他在世上所需要的一切。"——哥伦布，这句话反映了当时欧洲人对黄金的狂热追求，是新航路开辟的重要动因之一。'
      topic: 黄金热
      type: primary
      page: 69
  - title: 第16课 早期殖民掠夺
    items:
    - text: 最早进行殖民的国家是葡萄牙和西班牙，葡萄牙人在亚、非、拉美建立了一些殖民据点与商站，如巴西、印度果阿、马六甲和中国澳门，控制了从印度洋到太平洋的海上通道。
      topic: 葡萄牙殖民
      type: textbook
      page: 74
    - text: 西班牙凭借"无敌舰队"在美洲建立起一个殖民大帝国，西班牙殖民者使用武力强迫印第安人无偿开采金银矿，还在当地开发种植园，强迫印第安人和非洲黑人作为奴隶在种植园劳作。
      topic: 西班牙殖民
      type: textbook
      page: 75
    - text: 16世纪，英国加入殖民掠夺行列，1588年，英国海军击败西班牙"无敌舰队"，英国逐渐成为海上霸主，开始在海外扩张殖民地，17世纪，英国在北美建立了殖民地。
      topic: 英国殖民
      type: textbook
      page: 76
    - text: 英国殖民者从事贩卖非洲黑奴的活动，这一罪恶贸易被称为"三角贸易"，出程从欧洲港口载上廉价货物到非洲换取黑奴，中程从非洲载黑奴到美洲卖给种植园主，归程从美洲载金银和原料回欧洲。
      topic: 三角贸易
      type: textbook
      page: 77
    - text: 欧洲殖民者在殖民地掠夺了大量的黄金、白银，还将美洲、非洲和亚洲殖民地的马铃薯、玉米、番茄、烟草、可可、茶叶等作物运回欧洲，把欧洲的葡萄酒、啤酒和毛纺织品销往殖民地，这一进程客观上有助于欧洲殖民国家的资本原始积累。
      topic: 殖民掠夺影响
      type: textbook
      page: 78
    - text: '"资本来到世间，从头到脚，每个毛孔都滴着血和肮脏的东西"——马克思，这句话深刻揭露了殖民掠夺和奴隶贸易的罪恶本质，殖民扩张为欧洲资本主义发展积累了原始资本，但给殖民地人民带来了深重灾难。'
      topic: 殖民罪恶
      type: primary
      page: 78
- title: 第六单元 资本主义制度的初步确立
  lessons:
  - title: 第17课 君主立宪制的英国
    items:
    - text: 17世纪初，英国开始了斯图亚特王朝的统治，国王詹姆士一世来自苏格兰，狂热推崇"君权神授"理论，渴望王权专断，他不经议会批准，强行征税，使议会与王权处于对立状态。
      topic: 斯图亚特王朝
      type: textbook
      page: 79
    - text: 1640年，议会重新召开，议员们不断抨击国王专权，查理一世恼羞成怒，派军队闯入议会，挑起了内战，经过几年的反复斗争，议会军队打败国王军队，1649年，查理一世被推上断头台，英国宣布为共和国。
      topic: 英国内战
      type: textbook
      page: 80
    - text: 1688年，英国议会作出决定：废黜詹姆士二世，迎请他的女儿玛丽和女婿威廉入主英国，这次政变史称"光荣革命"，标志着英国资产阶级革命的完成。
      topic: 光荣革命
      type: textbook
      page: 81
    - text: 1689年，议会通过了《权利法案》，重申英国人"自古就有的权利"，规定国王不经议会许可，不能随意废除法律，也不能停止法律的执行，不得征收捐税，此后英国议会的权力日益超过国王，君主立宪制逐渐形成。
      topic: 权利法案
      type: textbook
      page: 82
    - text: 英国资产阶级革命推翻了封建君主专制，为英国的资本主义发展开辟了道路，并对世界近代历史的发展产生了重要的影响，揭开了欧美资产阶级革命的序幕。
      topic: 英国革命影响
      type: textbook
      page: 83
    - text: '"凡未经议会同意，以国王权威停止法律或停止法律实施之僭越权力，为非法权力。"——《权利法案》，这一条款确立了议会高于王权的原则，奠定了英国君主立宪制的法律基础。'
      topic: 权利法案条款
      type: primary
      page: 82
  - title: 第18课 美国的独立
    items:
    - text: 从17世纪开始，英国先后在北美建立起13个殖民地，英国殖民者驱赶和屠杀印第安人，剥削欧洲移民和从非洲贩来的黑奴，1765年以后，英国政府在北美殖民地颁布了一系列新税法，激化了北美人民与英国殖民者之间的矛盾。
      topic: 北美殖民地
      type: textbook
      page: 84
    - text: 1775年4月19日，来克星顿的枪声标志着美国独立战争的爆发，1775年5月，北美13个殖民地的代表聚集费城，召开了第二届大陆会议，会议决定把民兵整编为大陆军，委任华盛顿为总司令。
      topic: 独立战争爆发
      type: textbook
      page: 85
    - text: 1776年7月4日，大陆会议通过了由杰斐逊起草的《独立宣言》，宣告北美13个殖民地脱离英国而独立，宣言宣布人人生而平等，享有生命权、自由权和追求幸福的权利，被称为"第一个人权宣言"。
      topic: 独立宣言
      type: textbook
      page: 86
    - text: 1781年，美法联军在约克镇与英军激战，英将康华利率部下投降，1783年，英国被迫承认美国独立，美国独立战争既是一次民族解放战争，也是一场资产阶级革命。
      topic: 美国独立
      type: textbook
      page: 87
    - text: 1787年，各州派出代表齐聚费城，由华盛顿主持召开了制宪会议，经过争论和妥协，最终制定出美国宪法，宪法依据分权制衡原则设计了一个联邦制共和国，行政、立法、司法三权分立，总统、国会与最高法院各司其职，相互制衡。
      topic: 1787年宪法
      type: textbook
      page: 88
    - text: '"我们认为这些真理是不言而喻的：人人生而平等，造物者赋予他们若干不可剥夺的权利，其中包括生命权、自由权和追求幸福的权利。"——《独立宣言》'
      topic: 独立宣言原则
      type: primary
      page: 86
  - title: 第19课 法国大革命和拿破仑帝国
    items:
    - text: 18世纪开始，法国封建制度日益腐朽没落，国王路易十五通过加重税收等方式阻碍资本主义的发展，社会矛盾激化，财政危机严重，1789年5月，国王路易十六召开三级会议，讨论征税问题。
      topic: 法国大革命背景
      type: textbook
      page: 89
    - text: 1789年7月14日，巴黎民众以死伤近百人的代价，攻占了象征国王统治的巴士底狱，由此引发了全国城乡的暴动，法国大革命开始了，7月14日后来被定为法国的国庆日。
      topic: 攻占巴士底狱
      type: textbook
      page: 90
    - text: 1789年8月，制宪议会通过了《人权宣言》，宣告了人权、法治、自由、分权、平等和保护私有财产等基本原则，体现了反对君主专制和封建等级制度的思想。
      topic: 人权宣言
      type: textbook
      page: 91
    - text: 1792年，法国宣布废除君主制，成立法兰西第一共和国，1793年，国王路易十六以叛国罪被送上断头台，以罗伯斯庇尔为首的雅各宾派掌握政权，把法国大革命推向高潮。
      topic: 法兰西第一共和国
      type: textbook
      page: 92
    - text: 1799年11月，拿破仑·波拿巴发动雾月政变，组成了一个新的政府，他主持制定了民法典，名为《拿破仑法典》，体现了自由平等和私有财产神圣不可侵犯等原则，1804年，拿破仑加冕称帝，建立法兰西第一帝国。
      topic: 拿破仑帝国
      type: textbook
      page: 93
    - text: '"在权利方面，人们生来是而且始终是自由平等的。"——《人权宣言》第一条，这一条款否定了封建等级制度和特权思想，确立了天赋人权、自由平等的原则，对世界各国的民主革命产生了深远影响。'
      topic: 人权宣言原则
      type: primary
      page: 91
- title: 第七单元 工业革命和国际共产主义运动的兴起
  lessons:
  - title: 第20课 第一次工业革命
    items:
    - text: 17世纪末，英国君主立宪制建立后，政局稳定，资本主义经济迅速发展，随着国内外市场的不断扩大，对棉纺织品的需求迅速增长，刺激了棉纺织生产方式的改进和新技术的发明。
      topic: 工业革命背景
      type: textbook
      page: 94
    - text: 1765年，哈格里夫斯发明"珍妮纺纱机"，一次可以纺出多根纱线，大大提高了生产效率，珍妮机的发明标志着工业革命的开始，揭开了工业革命的序幕。
      topic: 珍妮机
      type: textbook
      page: 95
    - text: 1785年，瓦特改进的蒸汽机投入使用，提供了更加便利的动力，蒸汽机首先在纺织部门投入使用，后来化工、冶金、采矿等许多生产部门都开始使用蒸汽机，到19世纪30年代，蒸汽机成为主要的动力来源。
      topic: 蒸汽机
      type: textbook
      page: 96
    - text: 蒸汽机的广泛应用是生产领域的一次意义重大的飞跃，它极大地提高了生产力，使工业革命得以更快地向纵深发展，19世纪传统的手工工场逐渐被大工厂替代，现代工厂制度最终确立。
      topic: 现代工厂制度
      type: textbook
      page: 97
    - text: 1825年，由斯蒂芬森设计的蒸汽机车拖着车厢载着450名乘客正式试车，标志着铁路时代的开始，1830年以后，英国掀起投资建设铁路的狂潮，到1851年，英国建成了总长约1万千米的铁路网。
      topic: 铁路时代
      type: textbook
      page: 98
    - text: '"资产阶级在它的不到一百年的阶级统治中所创造的生产力，比过去一切世代创造的全部生产力还要多，还要大。"——马克思、恩格斯《共产党宣言》，这句话高度评价了工业革命带来的生产力飞跃。'
      topic: 工业革命影响
      type: primary
      page: 98
  - title: 第21课 马克思主义的诞生和国际共产主义运动的兴起
    items:
    - text: 随着工业革命的发展，资产阶级越来越富有，工人的待遇却很差，19世纪三四十年代，广大工人为改善劳动和生活条件、提高政治地位积极进行斗争，工人运动在欧洲蓬勃兴起，法国里昂工人起义、英国宪章运动和德国西里西亚纺织工人起义是其中的代表。
      topic: 工人运动兴起
      type: textbook
      page: 99
    - text: 马克思、恩格斯批判地继承了前人思想的精华，形成了马克思主义理论，马克思主义理论主要包括马克思主义哲学、政治经济学和科学社会主义三个组成部分。
      topic: 马克思主义理论
      type: textbook
      page: 100
    - text: 1848年，马克思、恩格斯为共产主义者同盟起草的纲领《共产党宣言》在伦敦正式出版，宣言指出，有文字记载的全部历史都是阶级斗争的历史，资本主义社会必将被没有阶级剥削和压迫的共产主义社会所取代。
      topic: 共产党宣言
      type: textbook
      page: 101
    - text: 《共产党宣言》的发表，标志着马克思主义的诞生，从此无产阶级的斗争有了科学理论的指导，国际共产主义运动兴起并蓬勃发展，马克思主义成为国际无产阶级革命的思想武器。
      topic: 马克思主义诞生
      type: textbook
      page: 102
    - text: 1871年3月18日，巴黎的无产阶级和人民群众举行武装起义，推翻了资产阶级反动统治，3月28日，建立了世界上第一个无产阶级政权——巴黎公社，5月28日，资产阶级反动政府勾结普军联合反扑，公社失败。
      topic: 巴黎公社
      type: textbook
      page: 103
    - text: '"一个幽灵，共产主义的幽灵，在欧洲游荡。为了对这个幽灵进行神圣的围剿，旧欧洲的一切势力，教皇和沙皇、梅特涅和基佐、法国的激进派和德国的警察，都联合起来了。"——《共产党宣言》开篇'
      topic: 共产党宣言开篇
      type: primary
      page: 101
