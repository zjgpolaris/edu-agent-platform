name: EduAgent CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  backend-verify:
    name: Backend syntax and smoke verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend smoke verifier
        env:
          PYTHONPATH: backend
        run: python3 scripts/verify_core.py --smoke

  quick-eval:
    name: Quick eval report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run quick eval
        env:
          PYTHONPATH: backend
        run: python3 eval/run_core_evals.py --quick --json

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-eval-report
          path: |
            eval/reports/latest.json
            eval/reports/latest.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Post eval summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = 'eval/reports/latest.md';
            const body = fs.existsSync(mdPath)
              ? `<details><summary>⚡ Quick Eval Report</summary>\n\n${fs.readFileSync(mdPath, 'utf8')}\n</details>`
              : '⚠️ Quick eval did not produce a report (likely missing LLM credentials).';
            const marker = '<!-- quick-eval-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: fullBody,
              });
            }

  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t eduagent-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t eduagent-frontend:ci frontend
