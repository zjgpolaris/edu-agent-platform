grade: 九年级下
book: 世界历史九年级下册（人教版）
units:
- title: 第一单元 殖民地人民的反抗与资本主义制度的扩展
  lessons:
  - title: 第1课 殖民地人民的反抗斗争
    items:
    - text: 18世纪末19世纪初，拉丁美洲独立运动兴起，受美国独立战争和法国大革命的影响，拉丁美洲人民掀起了反抗西班牙和葡萄牙殖民统治的浪潮。
      topic: 拉丁美洲独立运动
      type: textbook
      page: 2
    - text: 1819年，玻利瓦尔率领军队打败西班牙军队，解放了哥伦比亚、委内瑞拉和厄瓜多尔等地，成立了'大哥伦比亚共和国'，被誉为'南美的解放者'。
      topic: 玻利瓦尔
      type: textbook
      page: 3
    - text: 1857年，印度民族大起义爆发，章西女王领导军民英勇抗击英国殖民者，在战斗中壮烈牺牲，体现了印度人民反抗殖民统治的斗争精神。
      topic: 印度民族大起义
      type: textbook
      page: 4
    - text: 章西女王在牺牲前曾说：'我决不放弃我的章西。'这句话成为印度民族大起义中反抗精神的象征。
      topic: 章西女王
      type: primary
      page: 4
  - title: 第2课 俄国的改革
    items:
    - text: 1861年，沙皇亚历山大二世颁布废除农奴制的法令，规定农奴获得人身自由，可以通过赎买获得一块份地，这次改革是俄国历史上的重要转折点。
      topic: 俄国1861年农奴制改革
      type: textbook
      page: 7
    - text: 1861年农奴制改革废除了农奴制，推动俄国走上了发展资本主义的道路，但农奴赎买份地的价格高昂，改革保留了大量封建残余。
      topic: 农奴制改革影响
      type: textbook
      page: 8
    - text: 彼得一世改革开启了俄国近代化的进程，通过改革军事、发展工业、推行文化教育等措施，使俄国成为欧洲军事强国。
      topic: 彼得一世改革
      type: textbook
      page: 6
    - text: 亚历山大二世在改革前曾说：'与其等农民自下而上起来解放自己，不如自上而下解放农民。'
      topic: 亚历山大二世
      type: primary
      page: 7
    - text: 农奴制是俄国封建社会中农民被束缚在土地上、依附于地主的一种制度，严重阻碍了俄国资本主义的发展。
      topic: 农奴制
      type: concept
      page: 7
  - title: 第3课 美国内战
    items:
    - text: 1861年至1865年，美国爆发内战，北方工业资产阶级与南方种植园奴隶主之间的矛盾是战争爆发的根本原因，焦点是奴隶制的存废问题。
      topic: 美国内战
      type: textbook
      page: 10
    - text: 1862年，林肯政府颁布《解放黑人奴隶宣言》，宣布从1863年元旦起，南方叛乱地区的奴隶永远获得自由，极大地调动了黑人奴隶的革命积极性。
      topic: 《解放黑人奴隶宣言》
      type: textbook
      page: 11
    - text: 1865年，北方军队攻占南方首都里士满，美国内战以北方胜利告终，维护了国家统一，废除了奴隶制，为美国资本主义发展扫清了障碍。
      topic: 内战胜利
      type: textbook
      page: 12
    - text: 林肯在葛底斯堡演说中提出'民有、民治、民享'的政府理念，成为美国民主政治的重要表述。
      topic: 林肯
      type: primary
      page: 12
    - text: 南北战争是美国历史上第二次资产阶级革命，清除了资本主义发展的最大障碍，为美国日后成为世界上最发达的资本主义强国奠定了基础。
      topic: 南北战争性质
      type: concept
      page: 12
  - title: 第4课 日本明治维新
    items:
    - text: 1868年，日本明治政府开始实行一系列资产阶级性质的改革，史称'明治维新'，主要内容包括政治上废藩置县、军事上实行征兵制、经济上推行地税改革和殖产兴业、社会生活上提倡文明开化。
      topic: 日本明治维新
      type: textbook
      page: 14
    - text: 明治维新使日本迅速走上了发展资本主义的道路，实现了富国强兵，开始跻身资本主义强国之列，但改革保留了大量旧制度的残余，日本很快走上了对外侵略扩张的道路。
      topic: 明治维新影响
      type: textbook
      page: 15
    - text: 1853年，美国舰队闯入日本港口，迫使日本打开国门，签订不平等条约，日本面临沦为殖民地的危机，这是明治维新的重要背景。
      topic: 黑船事件
      type: textbook
      page: 14
    - text: 明治天皇在《五条誓文》中宣布'广兴会议，万机决于公论'，表达了向西方学习、进行改革的决心。
      topic: 五条誓文
      type: primary
      page: 14
    - text: 殖产兴业是明治维新的经济政策核心，指运用国家力量引进西方先进技术、设备和管理方法，大力扶植资本主义工业的发展。
      topic: 殖产兴业
      type: concept
      page: 15
- title: 第二单元 第二次工业革命和近代科学文化
  lessons:
  - title: 第5课 第二次工业革命
    items:
    - text: 19世纪六七十年代，第二次工业革命开始，以电力的广泛应用、内燃机的发明和新交通工具的创制、化学工业和新材料的出现为主要标志，人类进入'电气时代'。
      topic: 第二次工业革命
      type: textbook
      page: 18
    - text: 1831年，英国科学家法拉第发现电磁感应现象，为发电机的研制奠定了理论基础；19世纪70年代，发电机进入生产领域，电力开始作为动力带动机器。
      topic: 电力应用
      type: textbook
      page: 19
    - text: 1876年，德国人奥托制造出煤气内燃机；1883年，戴姆勒研制出汽油内燃机；1892年，狄塞尔发明柴油内燃机，内燃机的发明解决了交通运输工具的发动机问题。
      topic: 内燃机
      type: textbook
      page: 20
    - text: 1885年，德国人本茨制造出第一辆由内燃机驱动的汽车；1903年，美国莱特兄弟发明的飞机试飞成功，人类实现了翱翔天空的梦想。
      topic: 汽车与飞机
      type: textbook
      page: 20
    - text: 1869年，美国人海厄特发明赛璐珞，现代塑料工业诞生；1884年，法国人夏尔多内发明人造纤维，开辟了新的纺织品生产领域。
      topic: 现代化学工业和新材料
      type: textbook
      page: 21
    - text: 爱迪生说：'天才是1%的灵感加上99%的汗水。'他一生拥有1000多项发明专利，被誉为'发明大王'。
      topic: 爱迪生
      type: primary
      page: 19
  - title: 第6课 工业化国家的社会变化
    items:
    - text: 工业革命极大地推动了生产力的发展，促进了人口的迅速增长，19世纪前50年，英国人口从约900万增加到约1800万，美国人口增长更为显著。
      topic: 人口增长
      type: textbook
      page: 23
    - text: 随着工业革命的发展，工人阶级队伍不断壮大，劳动力结构发生巨大变化，越来越多的人放弃农业生产，专门从事工业和商业，妇女地位提高，成为工业劳动者。
      topic: 劳动力结构变化
      type: textbook
      page: 24
    - text: 19世纪中期以后，为了适应工业化发展的需要，欧洲国家开始推广大众教育，德国和法国最早建立起国家教育体系，提高了欧美各国的大众文化水平。
      topic: 大众教育
      type: textbook
      page: 24
    - text: 工业革命带来了城市化的浪潮，农村人口不断流向城市，城市规模越来越大，但也带来了环境污染、交通拥堵、贫富分化加剧等社会问题。
      topic: 城市化与社会问题
      type: textbook
      page: 25
    - text: 19世纪英国作家狄更斯在《雾都孤儿》中描绘了伦敦贫民窟的悲惨生活，反映了工业革命带来的社会分化。
      topic: 狄更斯
      type: primary
      page: 25
  - title: 第7课 近代科学与文化
    items:
    - text: 英国科学家牛顿是近代自然科学的奠基人之一，他在天文学上发现万有引力定律、在数学上创建微积分、在力学上建立完整的力学理论体系，其中牛顿三定律对近代自然科学的发展影响最大。
      topic: 牛顿
      type: textbook
      page: 28
    - text: 1859年，英国生物学家达尔文出版《物种起源》，提出进化论观点，打破了神创论和物种不变论，在生物科学领域掀起了一场伟大革命。
      topic: 达尔文
      type: textbook
      page: 29
    - text: 法国作家巴尔扎克是19世纪法国伟大的作家，其代表作《人间喜剧》由91部小说组成，描绘了法国社会特别是巴黎上流社会的变迁，被誉为'资本主义社会的百科全书'。
      topic: 巴尔扎克
      type: textbook
      page: 30
    - text: 德国作曲家贝多芬是近代最伟大的音乐家之一，他的代表作《英雄交响曲》完成于1804年，最初是为拿破仑而作，表达了贝多芬对自由、平等和博爱的追求。
      topic: 贝多芬
      type: textbook
      page: 31
    - text: 牛顿曾说：'如果我看得比别人更远些，那是因为我站在巨人的肩膀上。'这句话体现了他谦虚的科学态度。
      topic: 牛顿名言
      type: primary
      page: 28
    - text: 自然选择学说是达尔文进化论的核心，指生物在生存斗争中适者生存、不适者被淘汰的过程，是生物进化的主要机制。
      topic: 自然选择学说
      type: concept
      page: 29
- title: 第三单元 第一次世界大战和战后初期的世界
  lessons:
  - title: 第8课 第一次世界大战
    items:
    - text: 19世纪末20世纪初，帝国主义国家之间的矛盾十分尖锐，后起的帝国主义国家如德国要求重新瓜分世界，与英、法、俄等老牌帝国主义国家展开激烈争夺，形成了三国同盟（德、奥、意）和三国协约（英、法、俄）两大军事集团。
      topic: 三国同盟与三国协约
      type: textbook
      page: 34
    - text: 1914年6月28日，奥匈帝国皇储斐迪南大公夫妇在萨拉热窝被塞尔维亚民族主义者普林西普刺杀，这一事件成为第一次世界大战的导火索。
      topic: 萨拉热窝事件
      type: textbook
      page: 35
    - text: 1914年7月，奥匈帝国向塞尔维亚宣战，第一次世界大战爆发，战争主要在欧洲战场进行，后来扩大到非洲、亚洲和太平洋地区，先后有30多个国家卷入战争。
      topic: 一战爆发
      type: textbook
      page: 35
    - text: 1916年的凡尔登战役历时约10个月，双方伤亡近百万人，被称为'凡尔登绞肉机'，是一战中破坏性最大、持续时间最长的战役。
      topic: 凡尔登战役
      type: textbook
      page: 36
    - text: 一位战地记者描述凡尔登战役：'这不是战争，这是屠杀。'
      topic: 凡尔登战役描述
      type: primary
      page: 36
  - title: 第9课 列宁与十月革命
    items:
    - text: 1917年3月，俄国爆发二月革命，推翻了沙皇专制统治，建立了资产阶级临时政府，但临时政府继续参加第一次世界大战，引起人民不满。
      topic: 二月革命
      type: textbook
      page: 39
    - text: 1917年11月7日（俄历10月25日），列宁领导布尔什维克党发动武装起义，攻占冬宫，推翻了资产阶级临时政府，十月革命取得胜利，建立了世界上第一个无产阶级专政的国家。
      topic: 十月革命
      type: textbook
      page: 40
    - text: 十月革命是人类历史上第一次胜利的社会主义革命，建立了第一个无产阶级专政的国家，推动了国际无产阶级革命运动，鼓舞了殖民地半殖民地人民的解放斗争。
      topic: 十月革命意义
      type: textbook
      page: 41
    - text: 列宁在《四月提纲》中指出俄国革命必须从资产阶级民主革命过渡到社会主义革命，提出'全部政权归苏维埃'的口号。
      topic: 《四月提纲》
      type: primary
      page: 39
    - text: 苏维埃是俄语'会议'或'代表会议'的音译，是俄国无产阶级专政的政治形式，十月革命后成为苏联国家权力机关的名称。
      topic: 苏维埃
      type: concept
      page: 40
  - title: 第10课 《凡尔赛条约》和《九国公约》
    items:
    - text: 1919年1月，战胜的协约国集团在巴黎召开和会，与德国签订了《凡尔赛条约》，条约规定德国承认奥地利独立、归还阿尔萨斯和洛林给法国、莱茵河西岸由协约国占领、德国海外殖民地由英、法、日等国瓜分、德国支付巨额赔款等。
      topic: 《凡尔赛条约》
      type: textbook
      page: 43
    - text: 《凡尔赛条约》对德国的严厉制裁，不仅没有消除帝国主义国家之间的矛盾，反而加深了战败国与战胜国之间的矛盾，为第二次世界大战的爆发埋下了隐患。
      topic: 凡尔赛体系影响
      type: textbook
      page: 44
    - text: 1921年至1922年，美、英、法、日、意、荷、比、葡和中国等九国在华盛顿召开会议，签订了《九国公约》等条约，确立了帝国主义在东亚和太平洋地区的统治秩序。
      topic: 华盛顿会议
      type: textbook
      page: 45
    - text: 《九国公约》宣称尊重中国的主权、独立与领土完整，遵守各国在中国的'门户开放''机会均等'原则，实际上使中国回复到几个帝国主义国家共同支配的局面。
      topic: 《九国公约》
      type: textbook
      page: 45
    - text: 法国元帅福煦在听到《凡尔赛条约》签字的消息后说：'这不是和平，这是20年的休战。'
      topic: 福煦预言
      type: primary
      page: 44
  - title: 第11课 苏联的社会主义建设
    items:
    - text: 1921年，苏维埃政府开始实施新经济政策，以征收粮食税代替余粮征集制，允许私人经营中小企业，恢复商品货币关系，这一政策调动了生产者的积极性，迅速缓解了危机，巩固了工农联盟。
      topic: 新经济政策
      type: textbook
      page: 47
    - text: 1924年列宁逝世后，斯大林领导苏联人民进行社会主义建设，1928年至1937年，苏联先后完成了第一个和第二个五年计划，由落后的农业国变成了强大的工业国。
      topic: 苏联社会主义建设
      type: textbook
      page: 48
    - text: 苏联在农业上推行集体化运动，把个体小农经济改造为大规模的集体经济，到1937年，苏联全国基本完成农业集体化，为工业化提供了资金和原料，但也存在强迫命令、损害农民利益等问题。
      topic: 农业集体化
      type: textbook
      page: 49
    - text: 1936年，苏联颁布新宪法，宣布苏联是工农社会主义国家，标志着苏联模式（即斯大林模式）的形成，这一模式在特定历史条件下促进了苏联经济社会快速发展，但也存在严重弊端。
      topic: 苏联新宪法
      type: textbook
      page: 49
    - text: 斯大林说：'延缓速度就是落后，而落后者是要挨打的。'这句话反映了苏联优先发展重工业的迫切性。
      topic: 斯大林
      type: primary
      page: 48
    - text: 苏联模式是一种高度集中的政治经济体制，经济上以行政手段管理经济、优先发展重工业，政治上权力高度集中，对苏联和世界社会主义运动产生了深远影响。
      topic: 苏联模式
      type: concept
      page: 49
  - title: 第12课 亚非拉民族民主运动的高涨
    items:
    - text: 1920年，甘地号召印度人民开展非暴力不合作运动，抵制英国殖民统治，包括抵制英货、拒绝在英国学校读书、拒绝在英国机构工作、拒绝纳税等，运动打击了英国的殖民统治，增强了印度人民的民族自尊心和自信心。
      topic: 印度非暴力不合作运动
      type: textbook
      page: 52
    - text: 一战后，埃及资产阶级政党华夫脱党提出让埃及完全独立的要求，1922年，英国被迫有条件地承认埃及独立，但保留了在埃及的驻军权、苏伊士运河管辖权等特权。
      topic: 埃及华夫脱运动
      type: textbook
      page: 53
    - text: 1934年，墨西哥总统卡德纳斯推行改革，内容包括确立中央集权的资产阶级民主政治体制、推行土地改革、将服务业和大型工业收归国有、发展教育等，体现了1917年宪法的要求。
      topic: 墨西哥卡德纳斯改革
      type: textbook
      page: 54
    - text: 甘地说：'非暴力是最强大的力量，比人类发明的最厉害的毁灭性武器还要强大。'
      topic: 甘地
      type: primary
      page: 52
    - text: 华夫脱是阿拉伯语'代表团'的音译，华夫脱党是埃及资产阶级政党，领导了埃及的民族独立运动。
      topic: 华夫脱
      type: concept
      page: 53
- title: 第四单元 经济大危机和第二次世界大战
  lessons:
  - title: 第13课 罗斯福新政
    items:
    - text: 1929年10月下旬，美国纽约股票市场崩溃，一场规模空前的经济大危机迅速席卷了整个资本主义世界，从1929年到1933年，整个资本主义世界的工业产量下降了40%以上，贸易额减少了三分之二。
      topic: 1929—1933年经济大危机
      type: textbook
      page: 58
    - text: 1933年3月，罗斯福就任美国总统，宣布实行'新政'，采用国家干预手段来扭转经济形势，新政的主要措施包括整顿金融体系、加强对工业的计划指导、调整农业政策、推行'以工代赈'、建立社会保障制度等。
      topic: 罗斯福新政
      type: textbook
      page: 59
    - text: 罗斯福新政使美国经济开始缓慢复苏，工业生产有所恢复，就业人数逐步增加，人民生活得到改善，增强了美国政府的宏观调控能力，对资本主义世界产生了深远影响，但新政是在维护资本主义制度的前提下作出的政策调整，没有改变资本主义的本质。
      topic: 新政影响
      type: textbook
      page: 61
    - text: 罗斯福在就职演说中说：'我们唯一值得恐惧的就是恐惧本身。'这句话鼓舞了美国人民战胜危机的信心。
      topic: 罗斯福
      type: primary
      page: 59
    - text: 国家干预经济是指政府运用财政、货币等政策手段对经济进行宏观调控，罗斯福新政开创了资本主义国家干预经济的先河。
      topic: 国家干预经济
      type: concept
      page: 61
  - title: 第14课 法西斯国家的侵略扩张
    items:
    - text: 1922年，墨索里尼在意大利建立法西斯政权，法西斯政权对内实行独裁统治，对外推行侵略扩张政策，1935年，意大利入侵埃塞俄比亚。
      topic: 意大利法西斯政权
      type: textbook
      page: 63
    - text: 1933年，希特勒出任德国总理，开始建立法西斯独裁统治，纳粹党利用'国会纵火案'打击德国共产党，解散工会，加强思想控制，迫害犹太人，实行国民经济军事化，积极扩军备战。
      topic: 德国纳粹政权
      type: textbook
      page: 64
    - text: 1936年，受军部控制的广田弘毅上台组阁，建立法西斯专政，日本法西斯专政以军部为核心，对外侵略扩张，1931年发动九一八事变侵占中国东北，1937年发动全面侵华战争。
      topic: 日本法西斯专政
      type: textbook
      page: 65
    - text: 希特勒在《我的奋斗》中宣扬种族主义、反犹主义和扩张主义思想，成为纳粹党的纲领性文件。
      topic: 希特勒
      type: primary
      page: 64
    - text: 法西斯主义是一种极端民族主义、专制主义和扩张主义的政治思潮和运动，强调国家至上、领袖独裁、暴力统治和对外侵略。
      topic: 法西斯主义
      type: concept
      page: 63
  - title: 第15课 第二次世界大战
    items:
    - text: 1939年9月1日，德国军队突袭波兰，英、法被迫对德宣战，第二次世界大战全面爆发，1940年，德国先后占领北欧、西欧多个国家，法国投降，英国坚持抵抗。
      topic: 二战爆发
      type: textbook
      page: 67
    - text: 1941年6月，德国撕毁《苏德互不侵犯条约》，向苏联发动突然进攻，苏联军民进行了英勇的莫斯科保卫战，打破了德军不可战胜的神话。
      topic: 莫斯科保卫战
      type: textbook
      page: 68
    - text: 1941年12月7日，日本偷袭美国海军基地珍珠港，太平洋战争爆发，第二次世界大战达到最大规模，美国、中国等20多个国家相继对日宣战。
      topic: 日本偷袭珍珠港
      type: textbook
      page: 69
    - text: 1942年1月，美、英、苏、中等26个国家的代表在华盛顿签署《联合国家宣言》，标志着世界反法西斯联盟的正式形成，各国为了一个共同的目标，相互支援，协同作战。
      topic: 世界反法西斯联盟
      type: textbook
      page: 70
    - text: 1942年7月至1943年2月的斯大林格勒保卫战是第二次世界大战的转折点，此后，苏军连续进攻，扭转了苏德战场的形势。
      topic: 斯大林格勒保卫战
      type: textbook
      page: 71
    - text: 丘吉尔在评价斯大林格勒保卫战时说：'斯大林格勒是德国法西斯军队走向灭亡的起点。'
      topic: 丘吉尔
      type: primary
      page: 71
  - title: 第16课 冷战
    items:
    - text: 1944年6月，美英盟军成功登陆法国诺曼底，开辟了欧洲第二战场，德国陷入东西两个战场的夹击之中，加速了德国法西斯的灭亡。
      topic: 诺曼底登陆
      type: textbook
      page: 72
    - text: 1945年2月，美、英、苏三国首脑罗斯福、丘吉尔、斯大林在雅尔塔召开会议，决定战后对德国实行分区占领、战后成立联合国、苏联承诺在欧洲战事结束后三个月内参加对日作战等，奠定了战后世界格局的基础。
      topic: 雅尔塔会议
      type: textbook
      page: 73
    - text: 1945年5月8日，德国正式签署无条件投降书，欧洲战事结束；1945年8月15日，日本宣布无条件投降，9月2日，日本正式签署投降书，第二次世界大战结束。
      topic: 德国投降与日本投降
      type: textbook
      page: 73
    - text: 斯大林在雅尔塔会议上说：'这场战争和过去不同了，谁解放了领土，谁就把自己的社会制度推行到他们军队所到之处。'
      topic: 斯大林
      type: primary
      page: 73
    - text: 世界反法西斯战争是正义战胜邪恶、光明战胜黑暗、进步战胜反动的伟大战争，彻底粉碎了法西斯主义和军国主义通过侵略称霸世界的野心，彻底结束了列强通过争夺殖民地瓜分世界的历史。
      topic: 二战性质
      type: concept
      page: 74
- title: 第五单元 二战后的世界变化
  lessons:
  - title: 第17课 二战后资本主义的新变化
    items:
    - text: 1947年3月，美国总统杜鲁门在国会发表演说，提出的政策被称为'杜鲁门主义'，标志着美、苏战时同盟关系正式破裂，冷战开始，杜鲁门主义实质是遏制共产主义、干涉别国内政、加紧控制其他国家。
      topic: 杜鲁门主义
      type: textbook
      page: 75
    - text: 1948年，美国国务卿马歇尔提出'欧洲复兴计划'，即马歇尔计划，企图通过援助西欧恢复经济，稳定资本主义制度，同时加强对西欧的控制，遏制苏联和共产主义。
      topic: 马歇尔计划
      type: textbook
      page: 76
    - text: 1949年，美、英、法等12个国家在华盛顿成立'北大西洋公约组织'（北约），1955年，苏联同7个东欧社会主义国家成立'华沙条约组织'（华约），两大军事政治集团对峙局面形成，标志着两极格局正式确立。
      topic: 北约和华约
      type: textbook
      page: 76
    - text: 1949年，德国分裂为德意志联邦共和国（西德）和德意志民主共和国（东德），欧洲冷战对峙的局面基本形成。
      topic: 德国分裂
      type: textbook
      page: 76
    - text: 杜鲁门说：'我相信，支持自由人民抵抗少数武装分子或外部压力，这是美国的政策。'
      topic: 杜鲁门
      type: primary
      page: 75
    - text: 冷战是指第二次世界大战后的40多年间，以美、苏为首的两大集团之间既非战争又非和平的对峙与竞争状态。
      topic: 冷战
      type: concept
      page: 75
  - title: 第18课 社会主义的发展与挫折
    items:
    - text: 二战后，苏联通过一系列改革试图克服斯大林模式的弊端，赫鲁晓夫改革主要针对斯大林时期的一些弊端，在经济上改革农业和工业管理体制，在政治上批判斯大林个人崇拜，但改革没有从根本上突破斯大林模式。
      topic: 苏联改革
      type: textbook
      page: 79
    - text: 1985年，戈尔巴乔夫上台后推行改革，提出'人道的、民主的社会主义'路线，取消苏共的领导地位，实行多党制，倡导'公开性'，导致思想混乱，民族矛盾加剧，各加盟共和国分离趋势加强。
      topic: 戈尔巴乔夫改革
      type: textbook
      page: 80
    - text: 20世纪80年代末90年代初，东欧各国执政党纷纷丧失政权，社会制度发生根本性变化，政治上实行议会民主制和多党制，经济上实行私有化基础上的市场经济，史称'东欧剧变'。
      topic: 东欧剧变
      type: textbook
      page: 81
    - text: 1991年12月25日，苏联总统戈尔巴乔夫宣布辞职，苏联解体，苏联不复存在，两极格局随之结束，世界格局朝着多极化方向发展。
      topic: 苏联解体
      type: textbook
      page: 82
    - text: 戈尔巴乔夫在辞职演说中说：'命运作了这样的安排，我当上国家元首之时，也正是这个国家需要改变的时候。'
      topic: 戈尔巴乔夫
      type: primary
      page: 82
  - title: 第19课 亚非拉国家的新发展
    items:
    - text: 二战后，亚非拉民族解放运动空前高涨，帝国主义殖民体系走向瓦解，1955年4月，29个亚非国家和地区的代表在印度尼西亚万隆召开会议，即万隆会议，会议通过了和平相处、友好合作的十项原则，提高了亚非国家和地区的民族自信。
      topic: 万隆会议
      type: textbook
      page: 85
    - text: 1960年，非洲有17个国家获得独立，这一年因此被称为'非洲年'，此后，非洲民族独立运动继续发展，1990年纳米比亚独立，标志着所有非洲国家都摆脱了殖民主义的枷锁。
      topic: 非洲独立运动
      type: textbook
      page: 86
    - text: 1959年，古巴人民在卡斯特罗领导下推翻美国支持的独裁政权，建立革命政府，走上社会主义发展道路；1999年，巴拿马人民从美国手中收回巴拿马运河区的全部主权。
      topic: 拉美民族独立
      type: textbook
      page: 87
    - text: 周恩来在万隆会议上提出'求同存异'的方针，促进了会议的圆满成功，加强了中国同亚非各国的团结与合作。
      topic: 求同存异
      type: primary
      page: 85
    - text: 不结盟运动是1961年由南斯拉夫、印度、埃及等国发起，奉行独立、自主和非集团的宗旨和原则，标志着广大发展中国家已经成为国际政治舞台上的一支重要力量。
      topic: 不结盟运动
      type: concept
      page: 86
  - title: 第20课 联合国与世界贸易组织
    items:
    - text: 1945年10月，联合国正式成立，总部设在美国纽约，联合国是人类构建世界和平的成果，也是影响最大的国际组织，其首要宗旨是维护国际和平与安全，主要机构包括联合国大会、联合国安全理事会、联合国秘书处等。
      topic: 联合国
      type: textbook
      page: 90
    - text: 1995年1月1日，世界贸易组织（WTO）正式成立，其宗旨是以非歧视性、开放、公平为原则，促进全球贸易和经济发展，保证就业、收入与需求的增长，提高人类生活水平，世界贸易组织与联合国成为支撑、协调世界经济和政治的两大支柱。
      topic: 世界贸易组织
      type: textbook
      page: 91
    - text: 20世纪八九十年代以来，世界局势趋于缓和，和平与发展成为时代主题，各国把发展经济作为首要任务，生产力和科技水平有了新的提高，国家之间的经济联系日益紧密，世界经济全球化的趋势加强。
      topic: 经济全球化
      type: textbook
      page: 92
    - text: 苏联解体后，美国成为唯一的超级大国，企图建立一个以美国为主导的'单极世界'，但欧盟、日本、中国和俄罗斯等一些具备较强综合实力的国家联盟或国家在国际和地区事务中发挥着重要作用，推动世界朝着多极化方向发展。
      topic: 世界多极化趋势
      type: textbook
      page: 93
    - text: 《联合国宪章》序言中写道：'我联合国人民同兹决心欲免后世再遭战祸。'
      topic: 联合国宪章
      type: primary
      page: 90
- title: 第六单元 走向和平发展的世界
  lessons:
  - title: 第21课 冷战后的世界格局
    items:
    - text: 冷战结束后，世界格局发生了很大变化，和平与发展成为时代的主题，但威胁世界和平与安全的因素依然存在，如地区冲突、民族矛盾、宗教纷争、恐怖主义等，美国推行霸权主义和强权政治，不断插手别国事务和地区争端。
      topic: 冷战后世界格局
      type: textbook
      page: 96
    - text: 20世纪90年代以来，计算机网络技术得到广泛应用，将世界各地联结成一个整体，创造了人类新的生活模式和文化观念，极大地拓展了人类的生活空间，对人类的经济活动产生了直接影响，推动了全球经济的一体化。
      topic: 计算机网络
      type: textbook
      page: 97
    - text: 19世纪末20世纪初，西方资本主义国家的妇女开始获得选举权，二战后，随着妇女解放运动的发展，欧美发达国家妇女的独立意识增强，妇女的地位有了明显提高，但实现妇女和男性的完全平等还需要人类社会不断努力。
      topic: 妇女地位提高
      type: textbook
      page: 98
    - text: 随着全球范围内工业化的推进，环境恶化成为严重的问题，人类使用煤炭、石油等矿物燃料，排放了大量的二氧化碳，加剧了温室效应，导致全球气候变暖、冰川融化、海平面上升，化学污染破坏了臭氧层，直接威胁到人类的生存。
      topic: 生态与人口问题
      type: textbook
      page: 99
    - text: 人口过快增长带来了巨大的环境压力，世界粮食问题日益凸显，在教育、就业、住房、社会保障等方面，人口过快增长也带来了新的挑战。
      topic: 人口问题
      type: textbook
      page: 100
    - text: 1992年，联合国环境与发展大会通过了《21世纪议程》，提出了可持续发展的战略思想，强调经济发展与环境保护相协调。
      topic: 可持续发展
      type: primary
      page: 100
  - title: 第22课 不断发展的现代社会
    items:
    - text: 冷战结束后，世界多极化趋势继续发展，欧盟、日本、中国和俄罗斯等国家和国家联盟在国际事务中发挥着越来越重要的作用，推动世界朝着多极化方向发展，有利于抑制和削弱霸权主义和强权政治，有利于世界的和平与发展。
      topic: 世界多极化
      type: textbook
      page: 103
    - text: 经济全球化使各国经济相互联系、相互依赖的程度不断加深，一方面为经济发展提供了新的机会，另一方面也使风险与危机跨国界传递，面对经济全球化，各国既要顺应历史潮流，保持积极、开放的心态，主动参与竞争，也要居安思危，增强风险意识。
      topic: 经济全球化影响
      type: textbook
      page: 104
    - text: 社会信息化是信息时代的重要特征，互联网渗透到政治、经济、文化、娱乐、人际交往等领域，对现代社会生活产生了前所未有的冲击，网络安全问题日益引起关注。
      topic: 社会信息化
      type: textbook
      page: 105
    - text: 文化多样性是人类社会的基本特征，是世界文化充满活力的表现，也是人类文明进步的重要动力，每个民族的文化都是独特的，都有其存在的价值，都有值得尊重的经验和智慧，不同文化间的碰撞呼唤人们正确认识文化差异，相互尊重，通过平等交流、对话，达成彼此的理解和包容。
      topic: 文化多样性
      type: textbook
      page: 106
    - text: 习近平指出：'人类生活在同一个地球村里，生活在历史和现实交汇的同一个时空里，越来越成为你中有我、我中有你的命运共同体。'
      topic: 人类命运共同体
      type: primary
      page: 107
    - text: 人类命运共同体指在追求本国利益时兼顾他国合理关切，在谋求本国发展中促进各国共同发展，建设持久和平、普遍安全、共同繁荣、开放包容、清洁美丽的世界。
      topic: 人类命运共同体
      type: concept
      page: 107
